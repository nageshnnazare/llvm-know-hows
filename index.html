<blockquote>
<p>The frontend is the part of the compiler <em>you</em> write. It turns source text into LLVM IR.
Stage one is the <strong>lexer</strong>: collapse a stream of characters into a stream of <strong>tokens</strong>.
We define a small language, <strong>Toy</strong>, that we will carry through the entire guide — frontend,
AOT, JIT, and MLIR.</p>
</blockquote>
<hr />
<h2 id="1-the-language-well-compile-toy">1. The language we&rsquo;ll compile: &ldquo;Toy&rdquo;</h2>
<p>A tiny but non-trivial functional/imperative language (a cousin of LLVM&rsquo;s Kaleidoscope).
Enough to exercise functions, arithmetic, control flow, and calls — the things that make
codegen interesting.</p>
<pre><code>  # comments start with '#'
  def add(a b) a + b;            # function definition; body is an expression
  def fib(n)
      if n &lt; 2 then n
      else fib(n-1) + fib(n-2);

  extern sin(x);                 # declare an external function (from libm)

  fib(10);                       # a top-level expression — gets evaluated
</code></pre>
<p>Design choices (kept deliberately small so the <em>compiler</em> concepts stay front and center):</p>
<pre><code>  • One numeric type: f64 (double). Keeps the type system trivial.
  • Functions take a fixed list of params, return one value.
  • Expressions only: if/then/else is an expression, not a statement.
  • 'extern' declares functions implemented elsewhere (libc/libm).
  • Operators: + - * &lt; (we add more later; precedence matters — see parser).
</code></pre>
<p>We don&rsquo;t pick this because it&rsquo;s powerful; we pick it because <strong>every concept in real LLVM
frontends appears here in miniature</strong>, and you can hold the whole thing in your head.</p>
<hr />
<h2 id="2-what-a-token-is">2. What a token is</h2>
<p>A <strong>token</strong> is a lexical atom: a keyword, identifier, number, operator, or punctuation. The
lexer&rsquo;s job:</p>
<pre><code>   raw text                        token stream
  ───────────                     ──────────────────────────────────────
  &quot;def fib(n)&quot;      ───────────▶   TOK_DEF
                                   TOK_IDENT(&quot;fib&quot;)
                                   '('
                                   TOK_IDENT(&quot;n&quot;)
                                   ')'
</code></pre>
<p>Crucially the lexer <strong>discards whitespace and comments</strong> and <strong>classifies</strong> each chunk. It
does <em>not</em> understand structure — that&rsquo;s the parser&rsquo;s job. The lexer is a flat,
left-to-right scan.</p>
<pre><code>        ┌────────────────────────────────────────────────────────┐
        │  LEXER = a loop that, each call, skips whitespace,     │
        │  reads the next maximal lexeme, and returns one token. │
        └────────────────────────────────────────────────────────┘
              getNextToken() ──▶ getNextToken() ──▶ getNextToken() ──▶ ...
                  TOK_DEF           IDENT(&quot;fib&quot;)          '('
</code></pre>
<hr />
<h2 id="3-token-representation">3. Token representation</h2>
<p>We use an enum for fixed tokens and side-channel variables for the <em>payload</em> (the spelling
of an identifier, the value of a number). This is the classic Kaleidoscope style — minimal
and clear.</p>
<pre><code class="language-cpp">// Token.h
enum Token {
  tok_eof        = -1,   // end of file

  // keywords
  tok_def        = -2,
  tok_extern     = -3,
  tok_if         = -4,
  tok_then       = -5,
  tok_else       = -6,

  // primary
  tok_identifier = -7,   // payload in IdentifierStr
  tok_number     = -8,   // payload in NumVal
};

// Side-channel payloads, filled in by the lexer when it returns the above:
inline std::string IdentifierStr;  // valid when last token was tok_identifier
inline double      NumVal;         // valid when last token was tok_number
</code></pre>
<blockquote>
<p>Why negative numbers? So that any <em>single character</em> token (like <code>+</code>, <code>(</code>, <code>;</code>) can be
returned as its own positive ASCII value, never colliding with these enums. <code>getNextToken</code>
returns an <code>int</code>: negative = a known token kind, positive = &ldquo;this literal character.&rdquo;</p>
</blockquote>
<pre><code>   return value of getNextToken():
   ────────────────────────────────
    -8 .. -2   a keyword / ident / number / eof   (look up payload as needed)
    '+' (43)   a literal '+' character
    '(' (40)   a literal '(' character
    ';' (59)   a literal ';' character
</code></pre>
<hr />
<h2 id="4-the-lexer-fully">4. The lexer, fully</h2>
<p>A hand-written, character-at-a-time scanner. Read the comments — each block handles one
<em>lexeme class</em>.</p>
<pre><code class="language-cpp">// Lexer.cpp
#include &lt;cctype&gt;
#include &lt;cstdio&gt;
#include &lt;string&gt;

static int LastChar = ' ';   // one-character lookahead, primed with a space

// gettok - return the next token from standard input.
int gettok() {
  // 1. Skip any whitespace.
  while (isspace(LastChar))
    LastChar = getchar();

  // 2. Identifiers and keywords: [a-zA-Z][a-zA-Z0-9]*
  if (isalpha(LastChar)) {
    IdentifierStr = LastChar;
    while (isalnum((LastChar = getchar())))
      IdentifierStr += LastChar;

    if (IdentifierStr == &quot;def&quot;)    return tok_def;
    if (IdentifierStr == &quot;extern&quot;) return tok_extern;
    if (IdentifierStr == &quot;if&quot;)     return tok_if;
    if (IdentifierStr == &quot;then&quot;)   return tok_then;
    if (IdentifierStr == &quot;else&quot;)   return tok_else;
    return tok_identifier;          // anything else is a name
  }

  // 3. Numbers: [0-9.]+   (no error checking for brevity)
  if (isdigit(LastChar) || LastChar == '.') {
    std::string NumStr;
    do {
      NumStr += LastChar;
      LastChar = getchar();
    } while (isdigit(LastChar) || LastChar == '.');
    NumVal = strtod(NumStr.c_str(), nullptr);
    return tok_number;
  }

  // 4. Comments: '#' to end of line, then recurse.
  if (LastChar == '#') {
    do
      LastChar = getchar();
    while (LastChar != EOF &amp;&amp; LastChar != '\\n' &amp;&amp; LastChar != '\\r');
    if (LastChar != EOF)
      return gettok();              // skip the comment, get the real next token
  }

  // 5. End of file.
  if (LastChar == EOF)
    return tok_eof;

  // 6. Otherwise return the character itself as its ASCII value (e.g. '+', '(').
  int ThisChar = LastChar;
  LastChar = getchar();
  return ThisChar;
}
</code></pre>
<h3 id="trace-it">Trace it</h3>
<p>Input <code>def add(a b) a + b;</code>:</p>
<pre><code>  state of LastChar / output token
  ──────────────────────────────────────────────────────────────────
  read 'd','e','f' → IdentifierStr=&quot;def&quot; → keyword       ▶ tok_def
  skip ' '
  read 'a','d','d' → IdentifierStr=&quot;add&quot;                 ▶ tok_identifier
  '(' is not alnum/digit/#/eof → returned literally       ▶ '('
  read 'a'          → IdentifierStr=&quot;a&quot;                   ▶ tok_identifier
  skip ' '
  read 'b'          → IdentifierStr=&quot;b&quot;                   ▶ tok_identifier
  ')'                                                     ▶ ')'
  skip ' '
  'a'                                                     ▶ tok_identifier
  '+'                                                     ▶ '+'
  'b'                                                     ▶ tok_identifier
  ';'                                                     ▶ ';'
  EOF                                                     ▶ tok_eof
</code></pre>
<p>The &ldquo;maximal munch&rdquo; principle is visible: <code>def</code> is read as one keyword, not <code>d</code>,<code>e</code>,<code>f</code>. The
<code>while (isalnum(...))</code> loop greedily consumes the whole identifier.</p>
<hr />
<h2 id="5-the-one-token-lookahead-pattern-curtok">5. The one-token lookahead pattern (CurTok)</h2>
<p>Parsers need to &ldquo;peek&rdquo; at the current token and &ldquo;advance.&rdquo; The universal idiom:</p>
<pre><code class="language-cpp">// Parser uses these instead of calling gettok() directly.
static int CurTok;
static int getNextToken() { return CurTok = gettok(); }
</code></pre>
<pre><code>   ┌─────────────────────────────────────────────────────────────┐
   │ CurTok always holds &quot;the token the parser is looking at.&quot;   │
   │ getNextToken() consumes it and loads the next one.          │
   └─────────────────────────────────────────────────────────────┘

      CurTok = tok_def
         │  getNextToken()
         ▼
      CurTok = tok_identifier(&quot;add&quot;)
         │  getNextToken()
         ▼
      CurTok = '('   ...
</code></pre>
<p>This single-token lookahead (called <strong>LL(1)</strong>) is enough for our grammar and most
hand-written parsers. The parser in the next chapter is built entirely on <code>CurTok</code> +
<code>getNextToken()</code>.</p>
<hr />
<h2 id="6-lexer-design-notes-that-scale-to-real-languages">6. Lexer design notes that scale to real languages</h2>
<p>What we skipped, and what real lexers add — so you know the shape of the full problem:</p>
<pre><code>  ┌──────────────────────────────────────────────────────────────────────────┐
  │ • Source locations: track (line, col) per token for error messages &amp;     │
  │   debug info. Real frontends thread a SourceLocation through everything. │
  │ • String/char literals with escape sequences (\\n, \\t, \\xNN, unicode).    │
  │ • Number lexing: hex/oct/bin, floats with exponents, suffixes (u/l/f).   │
  │ • Multi-char operators: ==, !=, &lt;=, &gt;&gt;, -&gt;, ::  (need &gt;1 char lookahead).│
  │ • Keywords table (hash map) instead of if-chains once you have dozens.   │
  │ • Error recovery: emit a diagnostic and keep going, don't just abort.    │
  │ • Generators: Flex/RE2C build a DFA from regexes; fine, but hand-written │
  │   lexers are common in production (clang, rustc) for speed &amp; control.    │
  └──────────────────────────────────────────────────────────────────────────┘
</code></pre>
<p>Multi-character operators are the most common &ldquo;gotcha.&rdquo; Pattern for <code>&lt;=</code>:</p>
<pre><code class="language-cpp">  if (LastChar == '&lt;') {
    LastChar = getchar();
    if (LastChar == '=') { LastChar = getchar(); return tok_le; /* &lt;= */ }
    return '&lt;';                  // just '&lt;'
  }
</code></pre>
<p>The principle: <strong>lex the longest valid token</strong> (maximal munch), peeking as far as needed.</p>

<blockquote>
<p>The parser consumes the token stream and builds an <strong>Abstract Syntax Tree</strong> that encodes
structure and operator precedence. We use <strong>recursive descent</strong> for statements and <strong>Pratt
/ operator-precedence</strong> parsing for expressions — the combination used by clang, rustc, and
most hand-written production parsers.</p>
</blockquote>
<hr />
<h2 id="1-the-ast-nodes-that-mirror-the-language">1. The AST: nodes that mirror the language</h2>
<p>Each construct in Toy gets a class. They form a tree; codegen (next chapter) walks it.</p>
<pre><code>   Expr (abstract base)
     ├── NumberExpr        3.14
     ├── VariableExpr      x
     ├── BinaryExpr        lhs OP rhs        (+ - * &lt;)
     ├── CallExpr          callee(args...)
     └── IfExpr            if C then T else E

   Prototype               name + param names   (a signature)
   Function                Prototype + body Expr (a definition)
</code></pre>
<pre><code class="language-cpp">// AST.h
#include &lt;memory&gt;
#include &lt;string&gt;
#include &lt;vector&gt;

// Base class for all expression nodes.
class ExprAST {
public:
  virtual ~ExprAST() = default;
  virtual llvm::Value *codegen() = 0;   // we'll fill this in next chapter
};

// Numeric literal like &quot;1.0&quot;.
class NumberExprAST : public ExprAST {
  double Val;
public:
  NumberExprAST(double Val) : Val(Val) {}
  llvm::Value *codegen() override;
};

// A variable reference like &quot;x&quot;.
class VariableExprAST : public ExprAST {
  std::string Name;
public:
  VariableExprAST(std::string Name) : Name(std::move(Name)) {}
  llvm::Value *codegen() override;
};

// A binary operator: LHS Op RHS.
class BinaryExprAST : public ExprAST {
  char Op;                                 // '+', '-', '*', '&lt;'
  std::unique_ptr&lt;ExprAST&gt; LHS, RHS;
public:
  BinaryExprAST(char Op, std::unique_ptr&lt;ExprAST&gt; L, std::unique_ptr&lt;ExprAST&gt; R)
      : Op(Op), LHS(std::move(L)), RHS(std::move(R)) {}
  llvm::Value *codegen() override;
};

// A function call: Callee(Args...).
class CallExprAST : public ExprAST {
  std::string Callee;
  std::vector&lt;std::unique_ptr&lt;ExprAST&gt;&gt; Args;
public:
  CallExprAST(std::string Callee, std::vector&lt;std::unique_ptr&lt;ExprAST&gt;&gt; Args)
      : Callee(std::move(Callee)), Args(std::move(Args)) {}
  llvm::Value *codegen() override;
};

// if Cond then Then else Else  — an EXPRESSION (yields a value).
class IfExprAST : public ExprAST {
  std::unique_ptr&lt;ExprAST&gt; Cond, Then, Else;
public:
  IfExprAST(std::unique_ptr&lt;ExprAST&gt; C, std::unique_ptr&lt;ExprAST&gt; T,
            std::unique_ptr&lt;ExprAST&gt; E)
      : Cond(std::move(C)), Then(std::move(T)), Else(std::move(E)) {}
  llvm::Value *codegen() override;
};

// A function signature: name and argument names (all doubles in Toy).
class PrototypeAST {
  std::string Name;
  std::vector&lt;std::string&gt; Args;
public:
  PrototypeAST(std::string Name, std::vector&lt;std::string&gt; Args)
      : Name(std::move(Name)), Args(std::move(Args)) {}
  const std::string &amp;getName() const { return Name; }
  llvm::Function *codegen();
};

// A function definition: a prototype plus a body expression.
class FunctionAST {
  std::unique_ptr&lt;PrototypeAST&gt; Proto;
  std::unique_ptr&lt;ExprAST&gt; Body;
public:
  FunctionAST(std::unique_ptr&lt;PrototypeAST&gt; P, std::unique_ptr&lt;ExprAST&gt; B)
      : Proto(std::move(P)), Body(std::move(B)) {}
  llvm::Function *codegen();
};
</code></pre>
<blockquote>
<p>Note <code>codegen()</code> is a virtual method on each node — the <strong>visitor-by-virtual-dispatch</strong>
style. Real compilers often use a separate visitor class; for a small language, methods on
nodes are clean. Either way, codegen is &ldquo;walk the tree, emit IR per node.&rdquo;</p>
</blockquote>
<hr />
<h2 id="2-the-grammar-informal-ebnf">2. The grammar (informal EBNF)</h2>
<pre><code>   toplevel   ::= definition | external | expression | ';'
   definition ::= 'def' prototype expression
   external   ::= 'extern' prototype
   prototype  ::= identifier '(' identifier* ')'

   expression ::= primary (binop primary)*          ← precedence handled specially
   primary    ::= numberexpr | parenexpr | identifierexpr | ifexpr
   numberexpr ::= number
   parenexpr  ::= '(' expression ')'
   identifierexpr ::= identifier
                    | identifier '(' (expression (',' expression)*)? ')'   ← a call
   ifexpr     ::= 'if' expression 'then' expression 'else' expression
</code></pre>
<p>Recursive descent means: <strong>one function per grammar rule</strong>, and the call graph of those
functions mirrors the grammar. <code>ParseExpression</code> calls <code>ParsePrimary</code>, which may call
<code>ParseExpression</code> again (for parens) — recursion mirrors nesting.</p>
<hr />
<h2 id="3-parsing-primary-expressions-recursive-descent">3. Parsing primary expressions (recursive descent)</h2>
<p>Helpers and error reporting first:</p>
<pre><code class="language-cpp">// Parser.cpp
static std::unique_ptr&lt;ExprAST&gt; LogError(const char *Str) {
  fprintf(stderr, &quot;Error: %s\\n&quot;, Str);
  return nullptr;
}
static std::unique_ptr&lt;PrototypeAST&gt; LogErrorP(const char *Str) {
  LogError(Str); return nullptr;
}

static std::unique_ptr&lt;ExprAST&gt; ParseExpression();   // forward decl
</code></pre>
<p><code>numberexpr ::= number</code>:</p>
<pre><code class="language-cpp">static std::unique_ptr&lt;ExprAST&gt; ParseNumberExpr() {
  auto Result = std::make_unique&lt;NumberExprAST&gt;(NumVal);  // NumVal set by lexer
  getNextToken();                                          // consume the number
  return std::move(Result);
}
</code></pre>
<p><code>parenexpr ::= '(' expression ')'</code>:</p>
<pre><code class="language-cpp">static std::unique_ptr&lt;ExprAST&gt; ParseParenExpr() {
  getNextToken();                       // eat '('
  auto V = ParseExpression();           // recurse!
  if (!V) return nullptr;
  if (CurTok != ')') return LogError(&quot;expected ')'&quot;);
  getNextToken();                       // eat ')'
  return V;
}
</code></pre>
<p><code>identifierexpr ::= identifier | identifier '(' args ')'</code> — the lookahead at <code>(</code> decides
between a variable and a call:</p>
<pre><code class="language-cpp">static std::unique_ptr&lt;ExprAST&gt; ParseIdentifierExpr() {
  std::string IdName = IdentifierStr;
  getNextToken();                       // eat identifier

  if (CurTok != '(')                    // simple variable reference
    return std::make_unique&lt;VariableExprAST&gt;(IdName);

  // It's a call: identifier '(' ... ')'
  getNextToken();                       // eat '('
  std::vector&lt;std::unique_ptr&lt;ExprAST&gt;&gt; Args;
  if (CurTok != ')') {
    while (true) {
      if (auto Arg = ParseExpression()) Args.push_back(std::move(Arg));
      else return nullptr;
      if (CurTok == ')') break;
      if (CurTok != ',') return LogError(&quot;expected ')' or ',' in argument list&quot;);
      getNextToken();                   // eat ','
    }
  }
  getNextToken();                       // eat ')'
  return std::make_unique&lt;CallExprAST&gt;(IdName, std::move(Args));
}
</code></pre>
<p><code>ifexpr</code>:</p>
<pre><code class="language-cpp">static std::unique_ptr&lt;ExprAST&gt; ParseIfExpr() {
  getNextToken();                       // eat 'if'
  auto Cond = ParseExpression();
  if (!Cond) return nullptr;
  if (CurTok != tok_then) return LogError(&quot;expected 'then'&quot;);
  getNextToken();                       // eat 'then'
  auto Then = ParseExpression();
  if (!Then) return nullptr;
  if (CurTok != tok_else) return LogError(&quot;expected 'else'&quot;);
  getNextToken();                       // eat 'else'
  auto Else = ParseExpression();
  if (!Else) return nullptr;
  return std::make_unique&lt;IfExprAST&gt;(std::move(Cond), std::move(Then), std::move(Else));
}
</code></pre>
<p>The dispatcher for <code>primary</code>:</p>
<pre><code class="language-cpp">static std::unique_ptr&lt;ExprAST&gt; ParsePrimary() {
  switch (CurTok) {
  case tok_identifier: return ParseIdentifierExpr();
  case tok_number:     return ParseNumberExpr();
  case '(':            return ParseParenExpr();
  case tok_if:         return ParseIfExpr();
  default:             return LogError(&quot;unknown token when expecting an expression&quot;);
  }
}
</code></pre>
<hr />
<h2 id="4-operator-precedence--the-pratt--precedence-climbing-core">4. Operator precedence — the Pratt / precedence-climbing core</h2>
<p>The naive grammar <code>expression ::= primary (binop primary)*</code> is ambiguous about precedence:
should <code>a + b * c</code> parse as <code>(a+b)*c</code> or <code>a+(b*c)</code>? We need <code>*</code> to bind tighter than <code>+</code>.
The elegant solution is <strong>operator-precedence parsing</strong>.</p>
<p>Assign each binary operator a precedence number:</p>
<pre><code class="language-cpp">#include &lt;map&gt;
static std::map&lt;char, int&gt; BinopPrecedence = {
    {'&lt;', 10},
    {'+', 20}, {'-', 20},
    {'*', 40},                 // higher = binds tighter
};

static int GetTokPrecedence() {
  if (!isascii(CurTok)) return -1;
  auto it = BinopPrecedence.find(CurTok);
  if (it == BinopPrecedence.end()) return -1;   // not a known binop
  return it-&gt;second;
}
</code></pre>
<p>The algorithm, visualized for <code>a + b * c</code>:</p>
<pre><code>  parse 'a' as LHS.
  see '+' (prec 20). Loop: parse RHS starting at 'b'.
    parse 'b' as RHS-so-far.
    peek next op '*' (prec 40). Is 40 &gt; 20? YES → '*' binds tighter,
      so 'b' belongs to the '*' on its right, not the '+' on its left.
      RECURSE: parse the right-hand side at higher precedence → builds (b * c).
    RHS = (b * c).
  build (a + (b * c)).  ✔ correct precedence
</code></pre>
<pre><code>        a + b * c

   step:  LHS=a
          op=+ (20)
              RHS=b, but next op * (40) &gt; 20  ⇒ pull b into a tighter subtree
              RHS := (b * c)
          ⇒ (a + (b * c))

                +
               ╱ ╲
              a   *
                 ╱ ╲
                b   c
</code></pre>
<p>The code (<code>ParseBinOpRHS</code> is the famous heart of precedence-climbing):</p>
<pre><code class="language-cpp">static std::unique_ptr&lt;ExprAST&gt;
ParseBinOpRHS(int ExprPrec, std::unique_ptr&lt;ExprAST&gt; LHS) {
  while (true) {
    int TokPrec = GetTokPrecedence();

    // If this op binds less tightly than the minimum we're allowed to take,
    // we're done — return LHS to the caller (who holds the looser operator).
    if (TokPrec &lt; ExprPrec) return LHS;

    int BinOp = CurTok;
    getNextToken();                          // eat the operator

    auto RHS = ParsePrimary();               // parse the primary after the op
    if (!RHS) return nullptr;

    // If the NEXT operator binds tighter than this one, let it take RHS first.
    int NextPrec = GetTokPrecedence();
    if (TokPrec &lt; NextPrec) {
      RHS = ParseBinOpRHS(TokPrec + 1, std::move(RHS));   // recurse with higher floor
      if (!RHS) return nullptr;
    }

    // Merge LHS and RHS, then loop to handle further operators at this level.
    LHS = std::make_unique&lt;BinaryExprAST&gt;(BinOp, std::move(LHS), std::move(RHS));
  }
}

static std::unique_ptr&lt;ExprAST&gt; ParseExpression() {
  auto LHS = ParsePrimary();
  if (!LHS) return nullptr;
  return ParseBinOpRHS(0, std::move(LHS));   // 0 = accept any operator
}
</code></pre>
<blockquote>
<p>This ~20-line function correctly handles <em>any</em> set of precedences and associativities.
It&rsquo;s worth tracing by hand on <code>a &lt; b + c * d</code> until it&rsquo;s obvious. The recursion&rsquo;s
&ldquo;precedence floor&rdquo; (<code>ExprPrec</code>) is the whole trick: it says &ldquo;only fold operators at least
this tight into me; looser ones belong to my caller.&rdquo;</p>
</blockquote>
<hr />
<h2 id="5-parsing-definitions-externs-and-the-top-level">5. Parsing definitions, externs, and the top level</h2>
<pre><code class="language-cpp">// prototype ::= id '(' id* ')'
static std::unique_ptr&lt;PrototypeAST&gt; ParsePrototype() {
  if (CurTok != tok_identifier) return LogErrorP(&quot;expected function name in prototype&quot;);
  std::string FnName = IdentifierStr;
  getNextToken();
  if (CurTok != '(') return LogErrorP(&quot;expected '(' in prototype&quot;);

  std::vector&lt;std::string&gt; ArgNames;
  while (getNextToken() == tok_identifier)
    ArgNames.push_back(IdentifierStr);
  if (CurTok != ')') return LogErrorP(&quot;expected ')' in prototype&quot;);
  getNextToken();                       // eat ')'
  return std::make_unique&lt;PrototypeAST&gt;(FnName, std::move(ArgNames));
}

// definition ::= 'def' prototype expression
static std::unique_ptr&lt;FunctionAST&gt; ParseDefinition() {
  getNextToken();                       // eat 'def'
  auto Proto = ParsePrototype();
  if (!Proto) return nullptr;
  if (auto E = ParseExpression())
    return std::make_unique&lt;FunctionAST&gt;(std::move(Proto), std::move(E));
  return nullptr;
}

// external ::= 'extern' prototype
static std::unique_ptr&lt;PrototypeAST&gt; ParseExtern() {
  getNextToken();                       // eat 'extern'
  return ParsePrototype();
}

// Top-level expressions become anonymous zero-arg functions, so we can codegen/run them.
static std::unique_ptr&lt;FunctionAST&gt; ParseTopLevelExpr() {
  if (auto E = ParseExpression()) {
    auto Proto = std::make_unique&lt;PrototypeAST&gt;(&quot;__anon_expr&quot;, std::vector&lt;std::string&gt;());
    return std::make_unique&lt;FunctionAST&gt;(std::move(Proto), std::move(E));
  }
  return nullptr;
}
</code></pre>
<p>Wrapping a bare top-level expression in an anonymous function (<code>__anon_expr</code>) is a neat trick:
it gives us something callable, which is exactly what the JIT needs to <em>evaluate</em> a REPL
line (section 04).</p>
<hr />
<h2 id="6-the-driver-loop">6. The driver loop</h2>
<pre><code class="language-cpp">static void MainLoop() {
  while (true) {
    switch (CurTok) {
    case tok_eof:    return;
    case ';':        getNextToken(); break;          // ignore stray semicolons
    case tok_def:    HandleDefinition();   break;
    case tok_extern: HandleExtern();       break;
    default:         HandleTopLevelExpr(); break;
    }
  }
}
// (each Handle* calls the matching Parse*, then codegen() — wired up next chapter)
</code></pre>
<pre><code>        getNextToken (prime CurTok)
                 │
                 ▼
        ┌─────── MainLoop ────────┐
        │  look at CurTok:        │
        │   'def'    → definition │──▶ ParseDefinition  ──▶ FunctionAST
        │   'extern' → external   │──▶ ParseExtern      ──▶ PrototypeAST
        │   ';'      → skip       │
        │   eof      → done       │
        │   else     → top expr   │──▶ ParseTopLevelExpr──▶ FunctionAST(__anon_expr)
        └─────────────────────────┘
</code></pre>
<hr />
<h2 id="7-the-output-an-ast-ready-for-codegen">7. The output: an AST ready for codegen</h2>
<p>For <code>def add(a b) a + b;</code> the parser yields:</p>
<pre><code>   FunctionAST
     ├── Prototype  name=&quot;add&quot;  args=[a, b]
     └── Body: BinaryExprAST('+')
                 ├── LHS: VariableExprAST(&quot;a&quot;)
                 └── RHS: VariableExprAST(&quot;b&quot;)
</code></pre>
<p>For <code>if n &lt; 2 then n else fib(n-1)+fib(n-2)</code>:</p>

<blockquote>
<p>This is where your frontend meets LLVM. We walk the AST and, for each node, emit IR using
<code>IRBuilder</code>. By the end you can turn the entire Toy language into a valid <code>Module</code>. This is
the exact <code>Module</code> that AOT, JIT, and (conceptually) MLIR pipelines consume downstream.</p>

<hr />
<h2 id="1-the-three-global-objects-every-codegen-needs">1. The three global objects every codegen needs</h2>
<pre><code class="language-cpp">// Codegen.cpp
#include &quot;llvm/IR/IRBuilder.h&quot;
#include &quot;llvm/IR/LLVMContext.h&quot;
#include &quot;llvm/IR/Module.h&quot;
#include &quot;llvm/IR/Verifier.h&quot;
#include &lt;map&gt;

static std::unique_ptr&lt;llvm::LLVMContext&gt; TheContext;
static std::unique_ptr&lt;llvm::Module&gt;      TheModule;
static std::unique_ptr&lt;llvm::IRBuilder&lt;&gt;&gt; Builder;
static std::map&lt;std::string, llvm::Value*&gt; NamedValues;   // symbol table for params

static void InitializeModule() {
  TheContext = std::make_unique&lt;llvm::LLVMContext&gt;();
  TheModule  = std::make_unique&lt;llvm::Module&gt;(&quot;toy&quot;, *TheContext);
  Builder    = std::make_unique&lt;llvm::IRBuilder&lt;&gt;&gt;(*TheContext);
}
</code></pre>
<p>What each is for:</p>
<pre><code>  ┌───────────────┬────────────────────────────────────────────────────────────┐
  │ LLVMContext   │ owns all the uniqued types/constants. One per thread.      │
  │ Module        │ the container we fill with functions &amp; globals.            │
  │ IRBuilder     │ the &quot;cursor&quot; + factory: it inserts new instructions at a   │
  │               │ chosen point and hands back the resulting Value*.          │
  │ NamedValues   │ maps a source variable name → its LLVM Value (here, the    │
  │               │ function argument). Our scope is flat (params only) so a   │
  │               │ single map suffices; real langs use a stack of scopes.     │
  └───────────────┴────────────────────────────────────────────────────────────┘
</code></pre>
<p>The IRBuilder mental model:</p>
<pre><code>   IRBuilder is a typewriter positioned in a basic block.
   SetInsertPoint(BB)  ── move the cursor to the end of block BB
   CreateAdd(a,b)      ── type a new 'add' instruction here, return its Value*
   CreateRet(v)        ── type a 'ret', which also TERMINATES the block
</code></pre>
<hr />
<h2 id="2-leaf-nodes-numbers-and-variables">2. Leaf nodes: numbers and variables</h2>
<pre><code class="language-cpp">llvm::Value *NumberExprAST::codegen() {
  // A double literal is a ConstantFP. Constants are uniqued in the context.
  return llvm::ConstantFP::get(*TheContext, llvm::APFloat(Val));
}

llvm::Value *VariableExprAST::codegen() {
  // Look up the name in our symbol table (function params live here).
  llvm::Value *V = NamedValues[Name];
  if (!V) { fprintf(stderr, &quot;Unknown variable name: %s\\n&quot;, Name.c_str()); return nullptr; }
  return V;
}
</code></pre>
<pre><code>   NumberExprAST(3.14)  ──▶  ConstantFP  ──▶  IR literal: double 3.140000e+00
   VariableExprAST(&quot;a&quot;) ──▶  NamedValues[&quot;a&quot;]  ──▶  the %a argument Value*
</code></pre>
<blockquote>
<p>In Toy, variables are only function parameters, which are already SSA values, so we can
store them directly in <code>NamedValues</code>. When we add <em>mutable</em> locals, we switch to
alloca-backed storage and <code>load</code>/<code>store</code> (see §7) so <code>mem2reg</code> can rebuild SSA — exactly
the technique from <a href="../00-foundations/04-ssa-and-cfg.md">../00-foundations/04-ssa-and-cfg.md</a>.</p>
</blockquote>
<hr />
<h2 id="3-binary-expressions">3. Binary expressions</h2>
<pre><code class="language-cpp">llvm::Value *BinaryExprAST::codegen() {
  llvm::Value *L = LHS-&gt;codegen();      // recurse: codegen children first
  llvm::Value *R = RHS-&gt;codegen();
  if (!L || !R) return nullptr;

  switch (Op) {
  case '+': return Builder-&gt;CreateFAdd(L, R, &quot;addtmp&quot;);
  case '-': return Builder-&gt;CreateFSub(L, R, &quot;subtmp&quot;);
  case '*': return Builder-&gt;CreateFMul(L, R, &quot;multmp&quot;);
  case '&lt;':
    // fcmp ult yields i1; convert that bool to a double (0.0 or 1.0).
    L = Builder-&gt;CreateFCmpULT(L, R, &quot;cmptmp&quot;);
    return Builder-&gt;CreateUIToFP(L, llvm::Type::getDoubleTy(*TheContext), &quot;booltmp&quot;);
  default:
    fprintf(stderr, &quot;invalid binary operator\\n&quot;); return nullptr;
  }
}
</code></pre>
<p>Codegen is <strong>post-order</strong>: emit the operands&rsquo; IR, then the operator that combines them. For
<code>a + b</code>:</p>
<pre><code>   BinaryExprAST('+')
      │  L = LHS-&gt;codegen()  ─▶  %a  (the argument value)
      │  R = RHS-&gt;codegen()  ─▶  %b
      ▼
   CreateFAdd(%a, %b)        ─▶  %addtmp = fadd double %a, %b
</code></pre>
<p>Note <code>&lt;</code> produces an <code>i1</code> from <code>fcmp</code>, and we convert back to <code>double</code> (Toy has only one
type). This <code>CreateUIToFP</code> step is a small but instructive example of inserting the casts a
typed IR demands.</p>
<hr />
<h2 id="4-function-calls">4. Function calls</h2>
<pre><code class="language-cpp">llvm::Value *CallExprAST::codegen() {
  // Look up the callee by name in the module's symbol table.
  llvm::Function *CalleeF = TheModule-&gt;getFunction(Callee);
  if (!CalleeF) { fprintf(stderr, &quot;Unknown function: %s\\n&quot;, Callee.c_str()); return nullptr; }

  if (CalleeF-&gt;arg_size() != Args.size()) {
    fprintf(stderr, &quot;Incorrect # arguments passed\\n&quot;); return nullptr;
  }

  std::vector&lt;llvm::Value*&gt; ArgsV;
  for (auto &amp;A : Args) {
    ArgsV.push_back(A-&gt;codegen());      // codegen each argument expression
    if (!ArgsV.back()) return nullptr;
  }
  return Builder-&gt;CreateCall(CalleeF, ArgsV, &quot;calltmp&quot;);
}
</code></pre>
<pre><code>   CallExprAST(fib, [n-1])
      │ getFunction(&quot;fib&quot;)  ─▶  the Function* (must be declared/defined)
      │ codegen each arg     ─▶  %subtmp = fsub double %n, 1.0
      ▼
   CreateCall(fib, [%subtmp]) ─▶  %calltmp = call double @fib(double %subtmp)
</code></pre>
<hr />
<h2 id="5-the-ifthenelse-expression--emitting-control-flow">5. The <code>if</code>/then/else expression — emitting control flow</h2>
<p>This is the most instructive node: it creates basic blocks, branches, and a <strong>PHI</strong> to merge
the two arms&rsquo; values. It puts the entire SSA chapter into practice.</p>
<pre><code class="language-cpp">llvm::Value *IfExprAST::codegen() {
  llvm::Value *CondV = Cond-&gt;codegen();
  if (!CondV) return nullptr;

  // Convert condition (a double) to an i1 by comparing != 0.0.
  CondV = Builder-&gt;CreateFCmpONE(
      CondV, llvm::ConstantFP::get(*TheContext, llvm::APFloat(0.0)), &quot;ifcond&quot;);

  // Get the function we're currently emitting into.
  llvm::Function *TheFunction = Builder-&gt;GetInsertBlock()-&gt;getParent();

  // Create three blocks. 'then' is attached to the function now;
  // 'else' and 'merge' we create now but attach later (clarity).
  auto *ThenBB  = llvm::BasicBlock::Create(*TheContext, &quot;then&quot;, TheFunction);
  auto *ElseBB  = llvm::BasicBlock::Create(*TheContext, &quot;else&quot;);
  auto *MergeBB = llvm::BasicBlock::Create(*TheContext, &quot;ifcont&quot;);

  Builder-&gt;CreateCondBr(CondV, ThenBB, ElseBB);     // br i1 %ifcond, then, else

  // --- THEN branch ---
  Builder-&gt;SetInsertPoint(ThenBB);
  llvm::Value *ThenV = Then-&gt;codegen();
  if (!ThenV) return nullptr;
  Builder-&gt;CreateBr(MergeBB);
  ThenBB = Builder-&gt;GetInsertBlock();   // codegen may have changed the current block

  // --- ELSE branch ---
  TheFunction-&gt;insert(TheFunction-&gt;end(), ElseBB);  // now attach else
  Builder-&gt;SetInsertPoint(ElseBB);
  llvm::Value *ElseV = Else-&gt;codegen();
  if (!ElseV) return nullptr;
  Builder-&gt;CreateBr(MergeBB);
  ElseBB = Builder-&gt;GetInsertBlock();

  // --- MERGE ---
  TheFunction-&gt;insert(TheFunction-&gt;end(), MergeBB);
  Builder-&gt;SetInsertPoint(MergeBB);
  llvm::PHINode *PN =
      Builder-&gt;CreatePHI(llvm::Type::getDoubleTy(*TheContext), 2, &quot;iftmp&quot;);
  PN-&gt;addIncoming(ThenV, ThenBB);       // value if we came from 'then'
  PN-&gt;addIncoming(ElseV, ElseBB);       // value if we came from 'else'
  return PN;
}
</code></pre>
<p>The IR and CFG this produces, for <code>if x then 1.0 else 2.0</code>:</p>
<pre><code>   entry:
     %ifcond = fcmp one double %x, 0.0
     br i1 %ifcond, label %then, label %else
                                  │
            ┌─────────────────────┴─────────────────────┐
            ▼                                           ▼
   then:                                         else:
     ; ThenV = 1.0                                 ; ElseV = 2.0
     br label %ifcont                              br label %ifcont
            │                                           │
            └─────────────────────┬─────────────────────┘
                                  ▼
   ifcont:
     %iftmp = phi double [ 1.0, %then ], [ 2.0, %else ]
     ; %iftmp is the value of the whole if-expression
</code></pre>
<p>Two subtleties worth their own callout:</p>
<pre><code>  ┌──────────────────────────────────────────────────────────────────────────┐
  │ (1) &quot;ThenBB = Builder-&gt;GetInsertBlock()&quot; AFTER codegen'ing the arm.      │
  │     Why? The arm might itself contain an if, leaving us in a DIFFERENT   │
  │     block than ThenBB. The PHI must reference the block control ACTUALLY │
  │     came from. Always re-read the current block before addIncoming.      │
  ├──────────────────────────────────────────────────────────────────────────┤
  │ (2) Blocks are created detached, then inserted into the function in      │
  │     program order for readable IR. Order doesn't affect correctness      │
  │     (the CFG is defined by branches, not textual order) but aids reading.│
  └──────────────────────────────────────────────────────────────────────────┘
</code></pre>
<hr />
<h2 id="6-prototypes-and-functions">6. Prototypes and functions</h2>
<pre><code class="language-cpp">llvm::Function *PrototypeAST::codegen() {
  // All Toy values are double. Build the function type: double(double, double, ...).
  std::vector&lt;llvm::Type*&gt; Doubles(Args.size(),
                                   llvm::Type::getDoubleTy(*TheContext));
  llvm::FunctionType *FT = llvm::FunctionType::get(
      llvm::Type::getDoubleTy(*TheContext), Doubles, /*isVarArg=*/false);

  llvm::Function *F = llvm::Function::Create(
      FT, llvm::Function::ExternalLinkage, Name, TheModule.get());

  // Give the parameters their source names (nice IR, and our symbol table uses them).
  unsigned Idx = 0;
  for (auto &amp;Arg : F-&gt;args())
    Arg.setName(Args[Idx++]);
  return F;
}

llvm::Function *FunctionAST::codegen() {
  // Reuse an existing declaration (from 'extern') if present, else codegen the proto.
  llvm::Function *TheFunction = TheModule-&gt;getFunction(Proto-&gt;getName());
  if (!TheFunction) TheFunction = Proto-&gt;codegen();
  if (!TheFunction) return nullptr;

  // Create the entry block and point the builder at it.
  auto *BB = llvm::BasicBlock::Create(*TheContext, &quot;entry&quot;, TheFunction);
  Builder-&gt;SetInsertPoint(BB);

  // Make params visible to the body via the symbol table.
  NamedValues.clear();
  for (auto &amp;Arg : TheFunction-&gt;args())
    NamedValues[std::string(Arg.getName())] = &amp;Arg;

  if (llvm::Value *RetVal = Body-&gt;codegen()) {
    Builder-&gt;CreateRet(RetVal);          // 'ret' terminates the entry block
    llvm::verifyFunction(*TheFunction);  // catch malformed IR early
    return TheFunction;
  }

  TheFunction-&gt;eraseFromParent();        // body failed; remove the half-built fn
  return nullptr;
}
</code></pre>
<p>End-to-end, <code>def add(a b) a + b;</code> becomes:</p>
<pre><code class="language-llvm">define double @add(double %a, double %b) {
entry:
  %addtmp = fadd double %a, %b
  ret double %addtmp
}
</code></pre>
<p>And <code>def fib(n) if n &lt; 2 then n else fib(n-1)+fib(n-2);</code> becomes (abbreviated):</p>
<pre><code class="language-llvm">define double @fib(double %n) {
entry:
  %cmptmp = fcmp ult double %n, 2.0
  %booltmp = uitofp i1 %cmptmp to double
  %ifcond = fcmp one double %booltmp, 0.0
  br i1 %ifcond, label %then, label %else
then:
  br label %ifcont
else:
  %subtmp  = fsub double %n, 1.0
  %calltmp = call double @fib(double %subtmp)
  %subtmp1 = fsub double %n, 2.0
  %calltmp2= call double @fib(double %subtmp1)
  %addtmp  = fadd double %calltmp, %calltmp2
  br label %ifcont
ifcont:
  %iftmp = phi double [ %n, %then ], [ %addtmp, %else ]
  ret double %iftmp
}
</code></pre>
<p>That is a complete, valid LLVM function generated entirely by walking the AST. <strong>This Module
is the launch pad for everything downstream.</strong></p>
<hr />
<h2 id="7-adding-mutable-variables-the-alloca-pattern">7. Adding mutable variables (the alloca pattern)</h2>
<p>When you extend Toy with assignable locals (<code>var x = ...</code>), don&rsquo;t try to keep SSA by hand.
Use the alloca trick from the SSA chapter:</p>
<pre><code class="language-cpp">// Helper: create an alloca in the function's ENTRY block (so mem2reg can promote it).
static llvm::AllocaInst *CreateEntryBlockAlloca(llvm::Function *F,
                                                const std::string &amp;Name) {
  llvm::IRBuilder&lt;&gt; TmpB(&amp;F-&gt;getEntryBlock(), F-&gt;getEntryBlock().begin());
  return TmpB.CreateAlloca(llvm::Type::getDoubleTy(*TheContext), nullptr, Name);
}
</code></pre>
<p>Then variable <em>reads</em> become <code>load</code>, <em>writes</em> become <code>store</code>, and <code>NamedValues</code> maps names
to the <code>AllocaInst*</code> instead of directly to a value:</p>
<pre><code>   var x = 3;  x = x + 1;
   ───────────────────────────────────────────────
   %x = alloca double                 ; in entry block
   store double 3.0, ptr %x           ; var x = 3
   %x1 = load double, ptr %x          ; read x
   %add = fadd double %x1, 1.0
   store double %add, ptr %x          ; x = x + 1
</code></pre>
<p>Run <code>mem2reg</code> (see <a href="../02-ir-and-passes/02-optimization-passes.md">../02-ir-and-passes/02-optimization-passes.md</a>)
and all that memory traffic collapses into clean SSA with PHIs inserted automatically. You
get correct SSA <em>for free</em> without ever computing a dominance frontier.</p>

<h2 id="8-the-mapping-table--your-codegen-cheat-sheet">8. The mapping table — your codegen cheat sheet</h2>
<pre><code> ┌─────────────────────┬──────────────────────────────────┬──────────────────────────┐
 │ AST node            │ IRBuilder call                   │ IR emitted               │
 ├─────────────────────┼──────────────────────────────────┼──────────────────────────┤
 │ NumberExprAST       │ ConstantFP::get                  │ double 3.14              │
 │ VariableExprAST     │ (lookup) or CreateLoad           │ %x  or  load ...         │
 │ BinaryExprAST '+'   │ CreateFAdd                       │ fadd double ...          │
 │ BinaryExprAST '&lt;'   │ CreateFCmpULT + CreateUIToFP     │ fcmp + uitofp            │
 │ CallExprAST         │ CreateCall                       │ call double @f(...)      │
 │ IfExprAST           │ CreateCondBr + CreatePHI         │ br + blocks + phi        │
 │ PrototypeAST        │ Function::Create                 │ define/declare double @f │
 │ FunctionAST         │ entry block + body + CreateRet   │ a full function          │
 │ mutable local       │ CreateAlloca + load/store        │ alloca/store/load        │
 └─────────────────────┴──────────────────────────────────┴──────────────────────────┘
</code></pre>
<p>This single table is the soul of a frontend. Everything else (more types, more operators,
loops, structs) is <em>more of the same</em>: a node maps to a short sequence of IRBuilder calls.</p>

<blockquote>
<p><code>IRBuilder</code> is the single most-used class when generating IR. This chapter is a reference
<em>and</em> a tutorial: how the builder works, every category of instruction you&rsquo;ll create, how
to manipulate the CFG, types and constants, and the inspection/use-def APIs that let you
write transformations.</p>
</blockquote>
<hr />
<h2 id="1-the-builder-as-a-positioned-factory">1. The builder as a positioned factory</h2>
<pre><code>   An IRBuilder has TWO jobs:
     (1) remember an INSERTION POINT  (a basic block + position within it)
     (2) CREATE instructions there and return their Value*

          ┌──────────── BasicBlock &quot;entry&quot; ──────────────┐
          │  %a = ...                                    │
          │  %b = ...                                    │
          │           ◀── insertion point (cursor)       │
          └──────────────────────────────────────────────┘
   Builder.CreateAdd(x,y)  inserts here, pushing the cursor down.
</code></pre>
<p>Positioning the cursor:</p>
<pre><code class="language-cpp">IRBuilder&lt;&gt; B(Ctx);
B.SetInsertPoint(BB);              // at the END of block BB
B.SetInsertPoint(&amp;BB, BB.begin()); // before the first instruction of BB
B.SetInsertPoint(SomeInstruction); // immediately BEFORE that instruction
auto saved = B.saveIP();           // save current insertion point
B.restoreIP(saved);                // restore it later
</code></pre>
<blockquote>
<p>Saving/restoring the insertion point matters when, e.g., you must add an <code>alloca</code> to the
entry block while in the middle of emitting code elsewhere (the mutable-variable pattern).</p>
</blockquote>
<p>The template parameters (<code>IRBuilder&lt;&gt;</code>) let you plug in a <em>constant folder</em> and <em>inserter</em>.
The default <code>IRBuilder&lt;&gt;</code> folds constants as you build:</p>
<pre><code class="language-cpp">B.CreateAdd(B.getInt32(2), B.getInt32(3));  // returns the constant \`i32 5\`, no instruction!
</code></pre>
<p>This free constant folding is why naive frontend code already produces decent IR.</p>
<hr />
<h2 id="2-types--how-to-spell-them">2. Types — how to spell them</h2>
<p>Types are uniqued in the <code>LLVMContext</code>; you ask the context (or the builder) for them.</p>
<pre><code class="language-cpp">// Via the builder (convenient):
B.getInt1Ty(); B.getInt8Ty(); B.getInt32Ty(); B.getInt64Ty();
B.getFloatTy(); B.getDoubleTy(); B.getVoidTy();
B.getPtrTy();                       // opaque pointer (optionally an address space)

// Via Type:: static methods:
llvm::Type::getInt32Ty(Ctx);
llvm::Type::getDoubleTy(Ctx);

// Derived types:
auto *ArrTy  = llvm::ArrayType::get(B.getInt32Ty(), 10);          // [10 x i32]
auto *VecTy  = llvm::VectorType::get(B.getFloatTy(), 4, false);   // &lt;4 x float&gt;
auto *StrTy  = llvm::StructType::get(Ctx, {B.getInt32Ty(),        // {i32, ptr}
                                           B.getPtrTy()});
auto *FnTy   = llvm::FunctionType::get(B.getInt32Ty(),            // i32(i32, ptr)
                                       {B.getInt32Ty(), B.getPtrTy()}, false);
</code></pre>
<pre><code>   Type hierarchy (simplified):
     Type
      ├── IntegerType        i1, i8, i32, iN
      ├── floating types     half, float, double, fp128, ...
      ├── PointerType        ptr  (opaque; addrspace optional)
      ├── FunctionType       ret(params...)
      ├── StructType         {T, T, ...}  named or literal
      ├── ArrayType          [N x T]
      ├── VectorType         &lt;N x T&gt; / &lt;vscale x N x T&gt; (scalable)
      └── VoidType, LabelType, ...
</code></pre>
<hr />
<h2 id="3-constants">3. Constants</h2>
<p>Constants are <code>Value</code>s too, and uniqued — <code>getInt32(5)</code> always returns the same object.</p>
<pre><code class="language-cpp">B.getInt32(42);                                   // i32 42
B.getInt1(true);                                  // i1 true
llvm::ConstantInt::get(B.getInt64Ty(), 100);      // i64 100
llvm::ConstantFP::get(Ctx, llvm::APFloat(3.14));  // double 3.14
llvm::ConstantPointerNull::get(B.getPtrTy());     // null ptr
llvm::UndefValue::get(B.getInt32Ty());            // i32 undef
llvm::PoisonValue::get(B.getInt32Ty());           // i32 poison
llvm::ConstantAggregateZero::get(ArrTy);          // zeroinitializer
// String:
B.CreateGlobalStringPtr(&quot;hello\\n&quot;);               // creates a private global, returns ptr
</code></pre>
<p><code>undef</code> vs <code>poison</code>: both mean &ldquo;no particular value,&rdquo; but <code>poison</code> is &ldquo;more toxic&rdquo; — it
taints dependent computations and enables more aggressive optimization. Use <code>poison</code> for
genuinely-unreachable/uninitialized values in modern IR.</p>
<hr />
<h2 id="4-the-instruction-creation-api-by-category">4. The instruction-creation API, by category</h2>
<p>Every <code>CreateXxx</code> returns a <code>Value*</code> (the result) — usually an <code>Instruction*</code> you can keep.</p>
<h3 id="arithmetic--bitwise">Arithmetic / bitwise</h3>
<pre><code class="language-cpp">B.CreateAdd(L, R, &quot;t&quot;);   B.CreateSub(L, R);   B.CreateMul(L, R);
B.CreateSDiv(L, R);       B.CreateUDiv(L, R);  B.CreateSRem(L, R);
B.CreateFAdd(L, R);       B.CreateFSub(L, R);  B.CreateFMul(L, R);  B.CreateFDiv(L, R);
B.CreateAnd(L, R);        B.CreateOr(L, R);    B.CreateXor(L, R);
B.CreateShl(L, R);        B.CreateLShr(L, R);  B.CreateAShr(L, R);
B.CreateNeg(V);           B.CreateNot(V);
// With wrap flags:
B.CreateNSWAdd(L, R);     B.CreateNUWAdd(L, R);
</code></pre>

<pre><code class="language-cpp">auto *slot = B.CreateAlloca(B.getInt32Ty(), nullptr, &quot;x&quot;);  // stack slot, returns ptr
B.CreateStore(B.getInt32(7), slot);                         // store i32 7, ptr %x
auto *v = B.CreateLoad(B.getInt32Ty(), slot, &quot;v&quot;);          // %v = load i32, ptr %x

auto *ep = B.CreateGEP(ArrTy, base, {B.getInt32(0), B.getInt32(3)}, &quot;elem&quot;);
auto *ip = B.CreateInBoundsGEP(ElemTy, base, {B.getInt64(idx)}, &quot;p&quot;); // with inbounds
</code></pre>
<h3 id="comparisons-return-i1">Comparisons (return i1)</h3>
<pre><code class="language-cpp">B.CreateICmpEQ(L, R);  B.CreateICmpNE(L, R);
B.CreateICmpSLT(L, R); B.CreateICmpSGT(L, R);   // signed
B.CreateICmpULT(L, R); B.CreateICmpUGT(L, R);   // unsigned
B.CreateFCmpOLT(L, R); B.CreateFCmpONE(L, R);   // ordered float compares
</code></pre>
<h3 id="casts--conversions">Casts / conversions</h3>
<pre><code class="language-cpp">B.CreateZExt(v, B.getInt32Ty());     // zero-extend
B.CreateSExt(v, B.getInt64Ty());     // sign-extend
B.CreateTrunc(v, B.getInt8Ty());     // narrow
B.CreateSIToFP(v, B.getDoubleTy());  // signed int → float
B.CreateFPToSI(v, B.getInt32Ty());   // float → signed int
B.CreateUIToFP(v, B.getDoubleTy());  // unsigned int → float
B.CreateBitCast(v, DstTy);           // reinterpret (same size)
B.CreatePtrToInt(p, B.getInt64Ty());
B.CreateIntToPtr(i, B.getPtrTy());
</code></pre>
<h3 id="control-flow-terminators">Control flow (terminators)</h3>
<pre><code class="language-cpp">B.CreateRet(v);                    // ret &lt;v&gt;
B.CreateRetVoid();                 // ret void
B.CreateBr(destBB);                // unconditional branch
B.CreateCondBr(cond, thenBB, elseBB);   // conditional (cond is i1)
auto *sw = B.CreateSwitch(val, defaultBB, /*numCases hint=*/3);
sw-&gt;addCase(B.getInt32(0), caseBB0);
B.CreateUnreachable();
</code></pre>
<h3 id="calls-phis-select">Calls, PHIs, select</h3>
<pre><code class="language-cpp">B.CreateCall(callee /*Function* or FunctionCallee*/, {arg0, arg1}, &quot;r&quot;);
auto *phi = B.CreatePHI(B.getInt32Ty(), /*numIncoming=*/2, &quot;p&quot;);
phi-&gt;addIncoming(valA, blockA);
phi-&gt;addIncoming(valB, blockB);
B.CreateSelect(cond, vTrue, vFalse, &quot;sel&quot;);   // branchless ternary: cond ? vTrue : vFalse
</code></pre>
<h3 id="intrinsics">Intrinsics</h3>
<pre><code class="language-cpp">// Call an intrinsic by ID (LLVM provides math, memcpy, overflow-checked arith, etc.)
auto *fn = llvm::Intrinsic::getDeclaration(M, llvm::Intrinsic::sqrt, {B.getDoubleTy()});
B.CreateCall(fn, {x});

B.CreateMemCpy(dst, dstAlign, src, srcAlign, sizeVal);
</code></pre>

<h2 id="5-creating-functions-and-blocks">5. Creating functions and blocks</h2>
<pre><code class="language-cpp">auto *FT = llvm::FunctionType::get(B.getInt32Ty(), {B.getInt32Ty()}, false);
auto *F  = llvm::Function::Create(FT, llvm::Function::ExternalLinkage, &quot;g&quot;, M);
F-&gt;getArg(0)-&gt;setName(&quot;n&quot;);

auto *loop  = llvm::BasicBlock::Create(Ctx, &quot;loop&quot;);      // detached; attach later:

<pre><code>   Function::Create(type, linkage, name, Module)
        │   creates the Function and adds it to the Module
        ▼
   BasicBlock::Create(ctx, name, Function)

<h2 id="6-inspecting-ir-use-def-chains-iteration-rtti">6. Inspecting IR: use-def chains, iteration, RTTI</h2>
<p>To write <em>transformations</em> you must read existing IR. The key APIs:</p>
<pre><code class="language-cpp">// Iterate the structure:
for (Function &amp;F : *M)
  for (BasicBlock &amp;BB : F)
    for (Instruction &amp;I : BB)
      ... ;

// Operands (def → I) and users (I → uses): the use-def graph.
for (Use &amp;U : I.operands())  Value *operand = U.get();
for (User *U : V-&gt;users())   ... ;          // who uses V?
unsigned n = V-&gt;getNumUses();

// RTTI: identify instruction kinds with dyn_cast / isa.
if (auto *BO = llvm::dyn_cast&lt;llvm::BinaryOperator&gt;(&amp;I)) {
  if (BO-&gt;getOpcode() == llvm::Instruction::Mul) { ... }
}
if (auto *CI = llvm::dyn_cast&lt;llvm::CallInst&gt;(&amp;I)) {
  llvm::Function *callee = CI-&gt;getCalledFunction();
}

// Replace and erase (the core rewriting primitives):
I.replaceAllUsesWith(NewValue);   // RAUW: redirect every user of I to NewValue
I.eraseFromParent();              // remove I from its block and delete it
</code></pre>
<p>The use-def graph is the foundation of every optimization:</p>
<pre><code>        %a = mul i32 %x, %x        def: %a
            ╲
             ╲── used by ──▶  %b = add i32 %a, 1     (%a has one user: %b)

   &quot;replaceAllUsesWith(%a, %c)&quot; rewires %b to use %c instead, then %a is dead.
</code></pre>
<blockquote>
<p><code>llvm::dyn_cast&lt;T&gt;(V)</code> is LLVM&rsquo;s fast custom RTTI (not C++ <code>dynamic_cast</code>): returns <code>T*</code> if
<code>V</code> is a <code>T</code>, else <code>nullptr</code>. <code>isa&lt;T&gt;(V)</code> returns bool. <code>cast&lt;T&gt;(V)</code> asserts. These three
are everywhere in pass code.</p>
</blockquote>
<hr />
<h2 id="7-a-from-scratch-function-with-a-loop-putting-it-together">7. A from-scratch function with a loop (putting it together)</h2>
<p>Build <code>i32 sum_to(i32 n)</code> returning <code>0+1+...+n</code> using a loop and a PHI — no source language,
pure API. This is the canonical &ldquo;I can drive IRBuilder&rdquo; exercise.</p>
<pre><code class="language-cpp">llvm::Function *makeSumTo(llvm::Module *M, llvm::LLVMContext &amp;Ctx) {
  llvm::IRBuilder&lt;&gt; B(Ctx);
  auto *i32 = B.getInt32Ty();
  auto *F = llvm::Function::Create(
      llvm::FunctionType::get(i32, {i32}, false),
      llvm::Function::ExternalLinkage, &quot;sum_to&quot;, M);
  auto *n = F-&gt;getArg(0); n-&gt;setName(&quot;n&quot;);

  auto *entry = llvm::BasicBlock::Create(Ctx, &quot;entry&quot;, F);
  auto *loop  = llvm::BasicBlock::Create(Ctx, &quot;loop&quot;, F);
  auto *done  = llvm::BasicBlock::Create(Ctx, &quot;done&quot;, F);

  // entry: jump into the loop
  B.SetInsertPoint(entry);
  B.CreateBr(loop);

  // loop: i and acc are PHIs (loop-carried values)
  B.SetInsertPoint(loop);
  auto *i   = B.CreatePHI(i32, 2, &quot;i&quot;);
  auto *acc = B.CreatePHI(i32, 2, &quot;acc&quot;);
  i-&gt;addIncoming(B.getInt32(0), entry);     // i starts at 0
  acc-&gt;addIncoming(B.getInt32(0), entry);   // acc starts at 0

  auto *accNext = B.CreateAdd(acc, i, &quot;acc.next&quot;);
  auto *iNext   = B.CreateAdd(i, B.getInt32(1), &quot;i.next&quot;);
  auto *cond    = B.CreateICmpSGT(iNext, n, &quot;cond&quot;);  // iNext &gt; n ?

  i-&gt;addIncoming(iNext, loop);              // loop-carried updates
  acc-&gt;addIncoming(accNext, loop);
  B.CreateCondBr(cond, done, loop);         // exit when iNext &gt; n

  // done: return acc.next
  B.SetInsertPoint(done);
  B.CreateRet(accNext);
  return F;
}
</code></pre>
<p>The resulting IR + CFG:</p>
<pre><code>   entry:  br label %loop
              │
              ▼
   loop:   %i   = phi [0,entry], [%i.next,  loop]
           %acc = phi [0,entry], [%acc.next,loop]
           %acc.next = add %acc, %i
           %i.next   = add %i, 1
           %cond     = icmp sgt %i.next, %n
           br %cond, done, loop          ◀── back-edge to itself
              │ (cond true)
              ▼
   done:   ret %acc.next
</code></pre>
<p>Notice the two loop-carried PHIs (<code>i</code>, <code>acc</code>) with incoming values from <em>both</em> <code>entry</code> (the
initial values) and <code>loop</code> (the updated values). This is the canonical SSA loop shape — every
<code>for</code> loop you ever compile looks like this underneath.</p>

<blockquote>
<p>The &ldquo;middle end&rdquo; is a sequence of <strong>passes</strong> that transform IR into better IR. This chapter
explains the pass model, the difference between analysis and transformation, the major
passes you should recognize, and how to write your own pass in the <strong>new PassManager</strong>.</p>

<hr />
<h2 id="1-what-a-pass-is">1. What a pass is</h2>
<pre><code>   A PASS is a unit of work over some IR scope. It either:
     • ANALYZES   — computes information, mutates nothing (e.g. dominator tree)
     • TRANSFORMS — rewrites the IR to be faster/smaller (e.g. dead-code elim)

           ┌──────────┐   pass    ┌──────────┐   pass    ┌──────────┐
   IR ────▶│ Module   │─────────▶ │ Module'  │─────────▶ │ Module'' │────▶ ...
           └──────────┘           └──────────┘           └──────────┘
            each pass sees the whole (or a slice) and improves it
</code></pre>
<p>Passes are scoped by what IR unit they operate on:</p>
<pre><code>  ┌────────────────────┬───────────────────────────────────────────────────────┐
  │ Module pass        │ sees the entire module (all functions + globals)      │
  │ Function pass      │ runs once per function (most common)                  │
  │ Loop pass          │ runs per loop (loop-invariant code motion, unrolling) │
  │ CGSCC pass         │ per strongly-connected component of the call graph    │
  │                    │ (enables interprocedural work like inlining order)    │
  └────────────────────┴───────────────────────────────────────────────────────┘
</code></pre>
<hr />
<h2 id="2-the-passes-you-must-recognize">2. The passes you must recognize</h2>
<p>You don&rsquo;t need to memorize all ~200, but these are the workhorses. Knowing what they do lets
you read <code>-O2</code> output and build sensible custom pipelines.</p>
<pre><code>  ┌───────────────┬────────────────────────────────────────────────────────────┐
  │ mem2reg       │ promote alloca/load/store to SSA registers + PHIs.         │
  │ (SROA)        │ THE pass that makes frontend alloca-style codegen clean.   │
  ├───────────────┼────────────────────────────────────────────────────────────┤
  │ instcombine   │ peephole: algebraic simplifications (x*2 → x&lt;&lt;1, x+0 → x). │
  │ reassociate   │ reorder associative ops to expose constants/CSE.           │
  │ gvn / earlycse│ global value numbering / common-subexpression elimination. │
  │ sccp          │ sparse conditional constant propagation (folds constants,  │
  │               │ removes provably-dead branches simultaneously).            │
  │ simplifycfg   │ clean up the CFG: merge blocks, remove dead/empty blocks,  │
  │               │ turn branches into selects, fold trivial conditions.       │
  │ dce / adce    │ dead-code elimination (aggressive variant uses liveness).  │
  ├───────────────┼────────────────────────────────────────────────────────────┤
  │ inline        │ replace a call with the callee's body (huge enabler).      │
  │ licm          │ loop-invariant code motion: hoist invariants out of loops. │
  │ loop-unroll   │ replicate loop bodies to cut branch overhead.              │
  │ loop-vectorize│ turn scalar loops into SIMD (&lt;N x T&gt;) operations.          │
  │ slp-vectorize │ combine independent scalar ops into vectors.               │
  │ tailcallelim  │ turn tail-recursion into loops.                            │
  └───────────────┴────────────────────────────────────────────────────────────┘
</code></pre>
<h3 id="watch-a-few-in-action">Watch a few in action</h3>
<p><code>instcombine</code> peephole:</p>
<pre><code>   before                        after
   ─────────────                 ─────────────
   %t = mul i32 %x, 2            %t = shl i32 %x, 1      ; cheaper
   %a = add i32 %y, 0            (replaced by %y)         ; identity removed
   %b = sub i32 %z, %z          (replaced by 0)
</code></pre>
<p><code>sccp</code> (constant propagation + dead branch removal together):</p>
<pre><code>   before                              after
   ─────────────────────────           ─────────────────
   %c = icmp eq i32 5, 5               ; %c is always true →
   br i1 %c, label %a, label %b        br label %a        ; %b becomes dead
</code></pre>
<p><code>licm</code> hoisting an invariant out of a loop:</p>
<pre><code>   before (recompute n*4 every iter)     after (hoisted once)
   ────────────────────────────────      ────────────────────────
   loop:                                  %inv = mul i32 %n, 4   ; before loop
     %t = mul i32 %n, 4   ; invariant!   loop:
     ...use %t...                          ...use %inv...
</code></pre>
<hr />
<h2 id="3-the-two-pass-managers-and-why-the-new-one-exists">3. The two pass managers (and why the new one exists)</h2>
<pre><code>   LEGACY PassManager (deprecated)        NEW PassManager (use this)
   ─────────────────────────────          ──────────────────────────
   passes register dependencies           passes declare results;
   on each other dynamically;             a PassManager&lt;IRUnit&gt; is
   analyses recomputed implicitly;        templated by IR unit;
   harder to compose, slower.             analyses cached in an
                                          AnalysisManager, results
                                          shared &amp; invalidated explicitly.
</code></pre>
<p>The new PM (NPM) is faster, more predictable, and the default since LLVM 13ish. Its core
objects:</p>
<pre><code>   PassBuilder        builds standard pipelines (-O2 etc.) and parses pass strings
   ModuleAnalysisManager  (MAM)  caches module-level analyses
   FunctionAnalysisManager(FAM)  caches function-level analyses
   ModulePassManager  (MPM)  a sequence of module passes
   FunctionPassManager(FPM)  a sequence of function passes
</code></pre>
<pre><code>        PassBuilder
            │ registers analyses into the managers, builds pipelines
            ▼
   ┌───────────────────────────────────────────────────┐
   │ ModulePassManager                                 │
   │   ├── (module passes...)                          │
   │   └── ModuleToFunctionPassAdaptor                 │
   │          └── FunctionPassManager                  │
   │                 ├── PromotePass (mem2reg)         │
   │                 ├── InstCombinePass               │
   │                 └── ...                           │
   └───────────────────────────────────────────────────┘
            │ run(Module, MAM)
            ▼
        transformed Module
</code></pre>
<hr />
<h2 id="4-running-standard-pipelines-from-your-code">4. Running standard pipelines from your code</h2>
<p>The most common need: &ldquo;optimize my Module like <code>-O2</code>.&rdquo; Here it is in the new PM:</p>
<pre><code class="language-cpp">#include &quot;llvm/Passes/PassBuilder.h&quot;
#include &quot;llvm/Passes/OptimizationLevel.h&quot;
using namespace llvm;

void optimizeModule(Module &amp;M, OptimizationLevel level = OptimizationLevel::O2) {
  // 1. Create the four analysis managers.
  LoopAnalysisManager     LAM;
  FunctionAnalysisManager FAM;
  CGSCCAnalysisManager    CGAM;
  ModuleAnalysisManager   MAM;

  // 2. The PassBuilder wires them up.
  PassBuilder PB;
  PB.registerModuleAnalyses(MAM);
  PB.registerCGSCCAnalyses(CGAM);
  PB.registerFunctionAnalyses(FAM);
  PB.registerLoopAnalyses(LAM);
  PB.crossRegisterProxies(LAM, FAM, CGAM, MAM);   // let managers see each other

  // 3. Build the standard -O2 pipeline and run it.
  ModulePassManager MPM = PB.buildPerModuleDefaultPipeline(level);
  MPM.run(M, MAM);
}
</code></pre>
<p>This is exactly what AOT and JIT drivers call before codegen. The <code>OptimizationLevel</code> enum
spans <code>O0, O1, O2, O3, Os, Oz</code>.</p>
<hr />
<h2 id="5-building-a-custom-pipeline">5. Building a <em>custom</em> pipeline</h2>
<p>Sometimes you want a specific, minimal pipeline — e.g., a frontend that just needs <code>mem2reg</code></p>
<ul>
<li>a few cleanups (common in a JIT for fast compiles):</li>
</ul>
<pre><code class="language-cpp">#include &quot;llvm/Transforms/Utils/Mem2Reg.h&quot;
#include &quot;llvm/Transforms/InstCombine/InstCombine.h&quot;
#include &quot;llvm/Transforms/Scalar/GVN.h&quot;
#include &quot;llvm/Transforms/Scalar/SimplifyCFG.h&quot;
#include &quot;llvm/Transforms/Scalar/Reassociate.h&quot;

FunctionPassManager FPM;
FPM.addPass(PromotePass());          // mem2reg
FPM.addPass(InstCombinePass());
FPM.addPass(ReassociatePass());
FPM.addPass(GVNPass());
FPM.addPass(SimplifyCFGPass());

// Adapt the function pipeline to run over a whole module:
ModulePassManager MPM;
MPM.addPass(createModuleToFunctionPassAdaptor(std::move(FPM)));
MPM.run(M, MAM);
</code></pre>
<p>You can also parse a textual pipeline (handy for experimentation, mirrors <code>opt</code>):</p>
<pre><code class="language-cpp">PB.parsePassPipeline(MPM, &quot;function(mem2reg,instcombine,gvn,simplifycfg)&quot;);
</code></pre>
<p>The CLI equivalent — invaluable for figuring out <em>which</em> passes do what:</p>
<pre><code class="language-bash">&gt;&gt;&gt; opt -passes='mem2reg,instcombine,gvn,simplifycfg' -S in.ll -o out.ll
&gt;&gt;&gt; opt -print-after-all -passes='mem2reg' -S in.ll -o /dev/null   # watch IR change
&gt;&gt;&gt; opt --print-passes                                              # list every pass name
</code></pre>
<hr />
<h2 id="6-writing-your-own-pass-new-pm">6. Writing your own pass (new PM)</h2>
<p>A new-PM pass is just a struct with a <code>run</code> method and a result type. Here&rsquo;s a transform pass
that replaces <code>x * 2</code> with <code>x + x</code> (silly but illustrative of the rewriting APIs from the
IRBuilder chapter).</p>
<pre><code class="language-cpp">#include &quot;llvm/IR/PassManager.h&quot;
#include &quot;llvm/IR/InstrTypes.h&quot;
#include &quot;llvm/IR/Instructions.h&quot;
using namespace llvm;

struct MulToAddPass : PassInfoMixin&lt;MulToAddPass&gt; {
  PreservedAnalyses run(Function &amp;F, FunctionAnalysisManager &amp;) {
    bool changed = false;
    for (BasicBlock &amp;BB : F) {
      // Collect first; we'll erase while iterating, so don't mutate during the loop.
      SmallVector&lt;BinaryOperator *, 8&gt; Worklist;
      for (Instruction &amp;I : BB)
        if (auto *BO = dyn_cast&lt;BinaryOperator&gt;(&amp;I))
          if (BO-&gt;getOpcode() == Instruction::Mul)
            if (auto *C = dyn_cast&lt;ConstantInt&gt;(BO-&gt;getOperand(1)))
              if (C-&gt;equalsInt(2))
                Worklist.push_back(BO);

      for (BinaryOperator *BO : Worklist) {
        IRBuilder&lt;&gt; B(BO);                              // insert before BO
        Value *X = BO-&gt;getOperand(0);
        Value *Sum = B.CreateAdd(X, X, &quot;mul2add&quot;);
        BO-&gt;replaceAllUsesWith(Sum);                    // redirect users
        BO-&gt;eraseFromParent();                          // delete the old mul
        changed = true;
      }
    }
    // Tell the manager what we preserved. If we changed the CFG we'd return none().
    return changed ? PreservedAnalyses::none() : PreservedAnalyses::all();
  }
};
</code></pre>
<pre><code>   For each:   %t = mul i32 %x, 2
   We do:      %mul2add = add i32 %x, %x
               replaceAllUsesWith(%t → %mul2add)
               erase %t
   Result:     %mul2add = add i32 %x, %x   (every former user of %t now uses this)
</code></pre>
<h3 id="plugging-it-in-two-ways">Plugging it in two ways</h3>
<p><strong>(a) Directly in your compiler:</strong></p>
<pre><code class="language-cpp">FunctionPassManager FPM;
FPM.addPass(MulToAddPass());
MPM.addPass(createModuleToFunctionPassAdaptor(std::move(FPM)));
</code></pre>
<p><strong>(b) As a loadable plugin for <code>opt</code></strong> — register a callback so <code>opt -passes=mul-to-add</code>
finds it:</p>
<pre><code class="language-cpp">extern &quot;C&quot; ::llvm::PassPluginLibraryInfo LLVM_ATTRIBUTE_WEAK llvmGetPassPluginInfo() {
  return {LLVM_PLUGIN_API_VERSION, &quot;MulToAdd&quot;, &quot;v1&quot;, [](PassBuilder &amp;PB) {
    PB.registerPipelineParsingCallback(
        [](StringRef Name, FunctionPassManager &amp;FPM,
           ArrayRef&lt;PassBuilder::PipelineElement&gt;) {
          if (Name == &quot;mul-to-add&quot;) { FPM.addPass(MulToAddPass()); return true; }
          return false;
        });
  }};
}
</code></pre>
<p>Build as a shared lib and run:</p>
<pre><code class="language-bash">&gt;&gt;&gt; opt -load-pass-plugin=./MulToAdd.so -passes=mul-to-add -S in.ll -o out.ll
</code></pre>
<hr />
<h2 id="7-analysis-passes-and-preservedanalyses">7. Analysis passes and <code>PreservedAnalyses</code></h2>
<p>Transforms invalidate analyses. The new PM tracks this precisely so cached results stay
correct.</p>
<pre><code>   You ran InstCombine (changed instructions but not the CFG):
     return PreservedAnalyses::none();   // conservative: drop everything
   ─ or, if you know you kept the CFG intact ─
     PreservedAnalyses PA;
     PA.preserveSet&lt;CFGAnalyses&gt;();      // keep dominator tree, loop info, etc.
     return PA;
</code></pre>
<p>To <em>consume</em> an analysis in your pass:</p>
<pre><code class="language-cpp">PreservedAnalyses run(Function &amp;F, FunctionAnalysisManager &amp;FAM) {
  DominatorTree &amp;DT = FAM.getResult&lt;DominatorTreeAnalysis&gt;(F);  // cached or computed
  LoopInfo     &amp;LI = FAM.getResult&lt;LoopAnalysis&gt;(F);
  // ...use DT, LI...
}
</code></pre>
<pre><code>   AnalysisManager caches results keyed by (analysis, IRunit).
   getResult&lt;T&gt;(unit):  return cached  OR  compute, cache, return.
   A transform's PreservedAnalyses tells the manager which cached
   results survive — the rest are invalidated and recomputed on next demand.
</code></pre>
<p>This explicit invalidation model is the headline improvement over the legacy PM, which
recomputed analyses pessimistically.</p>

<blockquote>
<p>Individual passes are Lego bricks. The <em>pipeline</em> is the model. This chapter shows how
LLVM assembles its <code>-O0..-O3</code> pipelines, the phase ordering logic, and how to inspect,
customize, and reason about pass ordering — knowledge you need to tune both AOT and JIT.</p>

<hr />
<h2 id="1-why-ordering-matters-the-phase-ordering-problem">1. Why ordering matters (the phase-ordering problem)</h2>
<p>Passes enable each other. Run them in the wrong order and you leave optimizations on the
table. A classic chain:</p>
<pre><code>   mem2reg          turns memory into SSA registers
      │             ── now values are visible to...
      ▼
   instcombine      simplifies expressions
      │             ── exposes constants for...
      ▼
   sccp / gvn       constant prop + redundancy elimination
      │             ── creates dead code &amp; trivial branches for...
      ▼
   simplifycfg      cleans up the CFG
      │             ── may expose MORE simplifications, so we LOOP back
      ▼
   (repeat key passes; inline first to expose cross-call opportunities)
</code></pre>
<pre><code>   ┌────────────────────────────────────────────────────────────────────────┐
   │ KEY INSIGHT: optimization is not a single forward pass. Pipelines      │
   │ INTERLEAVE and REPEAT passes because each creates opportunities for    │
   │ others. Inlining especially is run early so everything after it sees   │
   │ the combined code. This is &quot;phase ordering,&quot; an open research problem. │
   └────────────────────────────────────────────────────────────────────────┘
</code></pre>
<hr />
<h2 id="2-the-shape-of-the-default--o2-pipeline">2. The shape of the default <code>-O2</code> pipeline</h2>
<p><code>PassBuilder::buildPerModuleDefaultPipeline(O2)</code> produces (heavily abbreviated) something
like:</p>
<pre><code>   Module pipeline
   ├── early cleanup (always-inline, coro, etc.)
   ├── GLOBAL phase
   │     ├── ipsccp            interprocedural constant prop
   │     ├── globalopt         optimize globals
   │     └── ...
   ├── CGSCC phase (bottom-up over the call graph)
   │     ├── inliner            ◀── the big one; inlines hot/small callees
   │     └── function simplification pipeline, per function:
   │           ├── sroa / mem2reg
   │           ├── early-cse
   │           ├── instcombine
   │           ├── simplifycfg
   │           ├── reassociate
   │           ├── loop pipeline: licm, indvars, unroll, ...
   │           ├── gvn
   │           ├── sccp
   │           ├── instcombine (again!)
   │           └── simplifycfg (again!)
   ├── LOOP/VECTORIZE phase
   │     ├── loop-vectorize
   │     ├── slp-vectorize
   │     └── instcombine + simplifycfg cleanup
   └── late module cleanup (globaldce, constmerge, ...)
</code></pre>
<pre><code>       source IR
          │
   [ interprocedural ] ── ipsccp, globalopt
          │
   [ inline + per-fn  ] ── the &quot;function simplification pipeline&quot;, run after inlining
   [ simplification   ]    so callee bodies get optimized in caller context
          │
   [ loop opts        ] ── licm, unroll, vectorize
          │
   [ vectorize        ]
          │
   [ cleanup          ] ── globaldce
          │
       optimized IR ──▶ backend
</code></pre>
<p>Notice <code>instcombine</code> and <code>simplifycfg</code> appear <strong>multiple times</strong>. That&rsquo;s intentional —
they&rsquo;re cheap &ldquo;cleanup&rdquo; passes run after anything that creates mess.</p>
<hr />
<h2 id="3--o0-to--o3--os--oz-what-changes">3. <code>-O0</code> to <code>-O3</code>, <code>-Os</code>, <code>-Oz</code>: what changes</h2>
<pre><code>  ┌───────┬─────────────────────────────────────────────────────────────────┐
  │ -O0   │ almost nothing. (Note: even -O0 runs mem2reg-like cleanup only  │
  │       │ if you ask; clang -O0 keeps allocas → debuggable but slow.)     │
  │ -O1   │ light: basic simplification, no aggressive inlining/vectorize.  │
  │ -O2   │ the standard &quot;fast&quot; build: inlining, GVN, loop opts, vectorize. │
  │ -O3   │ -O2 + more aggressive inlining &amp; vectorization (bigger code).   │
  │ -Os   │ optimize but bias toward SMALL code size.                       │
  │ -Oz   │ minimize size even harder (e.g. avoid unrolling/vectorizing).   │
  └───────┴─────────────────────────────────────────────────────────────────┘
</code></pre>
<p>The same <code>PassBuilder</code> builds all of them; the <code>OptimizationLevel</code> tweaks thresholds (inline
cost, unroll factor) and toggles a few passes. There&rsquo;s no separate hand-written pipeline per
level — it&rsquo;s parameterized.</p>
<hr />
<h2 id="4-inspecting-and-debugging-pipelines">4. Inspecting and debugging pipelines</h2>
<p>These <code>opt</code> flags are how you <em>learn</em> the pipeline and debug pass interactions:</p>
<pre><code class="language-bash"># Print the exact pass structure for a given -O level:
&gt;&gt;&gt; opt -passes='default&lt;O2&gt;' -print-pipeline-passes -S in.ll -o /dev/null

# Dump IR after every pass (firehose — pipe to a pager / file):
&gt;&gt;&gt; opt -passes='default&lt;O2&gt;' -print-after-all -S in.ll -o /dev/null 2&gt; trace.ll

# Dump IR only after a specific pass:
&gt;&gt;&gt; opt -passes='default&lt;O2&gt;' -print-after=gvn -S in.ll -o /dev/null

# See which passes changed the IR (skip no-op passes):
&gt;&gt;&gt; opt -passes='default&lt;O2&gt;' -print-changed -S in.ll -o /dev/null

# Time each pass (find the expensive ones):
&gt;&gt;&gt; opt -passes='default&lt;O2&gt;' -time-passes -S in.ll -o /dev/null
</code></pre>
<pre><code>   -print-after-all is your microscope: it shows the IR mutate pass by pass,
   so you can SEE mem2reg create PHIs, instcombine fold expressions, etc.
   Run it once on a small function — it teaches the pipeline better than any docs.
</code></pre>
<hr />
<h2 id="5-constructing-pipelines-in-code-the-api-recap">5. Constructing pipelines in code (the API recap)</h2>
<p>From <a href="02-optimization-passes.md">02-optimization-passes.md</a>, the three ways:</p>
<pre><code class="language-cpp">// (a) Standard pipeline by level:
ModulePassManager MPM = PB.buildPerModuleDefaultPipeline(OptimizationLevel::O2);

// (b) Parse a textual pipeline (mirrors opt -passes=...):
ModulePassManager MPM;
cantFail(PB.parsePassPipeline(MPM, &quot;default&lt;O2&gt;&quot;));
// or a custom one:
cantFail(PB.parsePassPipeline(MPM, &quot;function(mem2reg,instcombine,gvn,simplifycfg)&quot;));

// (c) Hand-assemble:
FunctionPassManager FPM;
FPM.addPass(PromotePass());
FPM.addPass(InstCombinePass());
ModulePassManager MPM2;
MPM2.addPass(createModuleToFunctionPassAdaptor(std::move(FPM)));
</code></pre>
<h3 id="hooking-custom-passes-into-a-standard-pipeline">Hooking custom passes into a standard pipeline</h3>
<p>You can inject your pass at well-defined &ldquo;extension points&rdquo; without rebuilding the whole
pipeline — e.g., run your pass right after the simplification pipeline:</p>
<pre><code class="language-cpp">PB.registerScalarOptimizerLateEPCallback(
    [](FunctionPassManager &amp;FPM, OptimizationLevel) {
      FPM.addPass(MyCustomPass());
    });
ModulePassManager MPM = PB.buildPerModuleDefaultPipeline(OptimizationLevel::O2);
</code></pre>
<pre><code>   Extension points (EP callbacks) let you say &quot;run my pass HERE in the
   standard flow&quot; rather than reconstructing the pipeline:
     PipelineStartEP            — very beginning
     PeepholeEP                 — alongside instcombine cleanup spots
     ScalarOptimizerLateEP      — after scalar simplification
     OptimizerLastEP            — at the very end (module level)
     VectorizerStartEP, ...     — around vectorization
</code></pre>
<hr />
<h2 id="6-pipelines-for-aot-vs-jit-vs-mlir--practical-differences">6. Pipelines for AOT vs JIT vs MLIR — practical differences</h2>
<p>The <em>pipeline</em> differs by use case even though the <em>passes</em> are the same:</p>
<pre><code>  ┌───────────┬─────────────────────────────────────────────────────────────┐
  │ AOT       │ usually -O2/-O3 full pipeline. Compile time is paid once,   │
  │           │ offline, so spend it freely. Often + LTO across modules.    │
  ├───────────┼─────────────────────────────────────────────────────────────┤
  │ JIT       │ tension: every ms of compile time delays execution. Choices:│
  │           │  • baseline: a CHEAP pipeline (mem2reg + a few) for fast    │
  │           │    startup, then RE-OPTIMIZE hot functions at -O2/-O3 in    │
  │           │    the background (&quot;tiered compilation&quot;).                   │
  │           │  • or just -O2 if latency-tolerant.                         │
  ├───────────┼─────────────────────────────────────────────────────────────┤
  │ MLIR      │ TWO pipelines: high-level MLIR passes (on dialects) BEFORE  │
  │           │ lowering, then the standard LLVM pipeline AFTER reaching    │
  │           │ LLVM IR. Domain opts happen up high; classic opts down low. │
  └───────────┴─────────────────────────────────────────────────────────────┘
</code></pre>
<p>Tiered JIT compilation, visualized (foreshadowing <a href="../04-jit/04-advanced-jit.md">../04-jit/04-advanced-jit.md</a>):</p>
<pre><code>   call site cold ──▶ compile FAST (cheap pipeline) ──▶ run, count calls
                                                          │ gets hot
                                                          ▼
                               recompile at -O3 in background, hot-swap pointer
</code></pre>
<hr />
<h2 id="7-lto-optimizing-across-translation-units-aot-specific">7. LTO: optimizing across translation units (AOT-specific)</h2>
<p>Normally each module is optimized in isolation. <strong>Link-Time Optimization</strong> defers some
optimization to link time, when the <em>whole program</em> is visible, enabling cross-module
inlining and global analysis.</p>
<pre><code>   Normal:  a.c→a.o (opt'd alone)   b.c→b.o (opt'd alone)   ── link ──▶ exe
