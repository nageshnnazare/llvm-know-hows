<blockquote>
<p>Ahead-Of-Time compilation is the classic model: translate the <em>entire</em> program to native
machine code <em>now</em>, store it on disk, run it <em>later</em> — possibly on another machine. This
is what <code>clang</code>, <code>gcc</code>, <code>rustc</code>, and <code>go build</code> do. We establish the model, its trade-offs,
and exactly where LLVM fits.</p>
</blockquote>
<hr />
<h2 id="1-the-defining-characteristic">1. The defining characteristic</h2>
<pre><code>   ┌─────────────────────────────────────────────────────────────────────────┐
   │  AOT:  compilation happens BEFORE execution, as a SEPARATE step,        │
   │        producing a persistent artifact (object file / executable)       │
   │        that is run later by a different process (maybe on a different   │
   │        machine, definitely at a different time).                        │
   └─────────────────────────────────────────────────────────────────────────┘
</code></pre>
<p>The timeline makes it concrete:</p>
<pre><code>   COMPILE TIME (developer's machine, once)        RUN TIME (user's machine, many times)
   ─────────────────────────────────────────       ─────────────────────────────────────
   source ─▶ IR ─▶ opt ─▶ machine code ─▶ .o        load executable ─▶ OS maps it ─▶ CPU runs
                                  │                   (NO compiler present here!)
                                  ▼
                          link ─▶ executable ────────────────────────────────▶ ./program
                                  (stored on disk)
</code></pre>
<p>The compiler is <em>gone</em> by the time the program runs. All the work — parsing, optimization,
codegen — was front-loaded. The shipped artifact is pure machine code plus metadata.</p>
<hr />
<h2 id="2-aot-vs-interpretation-vs-jit-the-spectrum">2. AOT vs interpretation vs JIT (the spectrum)</h2>
<pre><code>   PURE INTERPRETER          JIT                          AOT
   ─────────────────         ───────────────────          ────────────────────
   read source/bytecode      compile to native            compile to native
   &amp; execute on the fly,     code at RUNTIME, in          code BEFORE runtime,
   no native code            this process, then run        ship the native code

   startup: instant          startup: warmup cost         startup: instant
   peak speed: slow          peak speed: high (can use     peak speed: high
                             runtime info!)                (only static info)
   ships: source/bytecode    ships: source/bytecode +     ships: native binary
                             a compiler
   examples: CPython,        examples: JVM, V8,            examples: clang, gcc,
   Ruby MRI                  LuaJIT, .NET                  rustc, go, swiftc
</code></pre>
<p>The fundamental trade in one line:</p>
<pre><code>   AOT pays the compile cost ONCE, OFFLINE, but can only use information
   known statically. JIT pays it AT RUNTIME, REPEATEDLY, but can exploit
   actual runtime behavior (hot paths, observed types, real values).
</code></pre>
<hr />
<h2 id="3-strengths-and-weaknesses-of-aot">3. Strengths and weaknesses of AOT</h2>
<pre><code>  ┌────────────────────────────────────┬────────────────────────────────────────┐
  │ STRENGTHS                          │ WEAKNESSES                             │
  ├────────────────────────────────────┼────────────────────────────────────────┤
  │ • Zero startup/warmup cost.        │ • No runtime profile: must guess hot   │
  │   The binary runs immediately.     │   paths, branch probabilities.         │
  │ • No compiler shipped → smaller    │ • Can't specialize to actual inputs    │
  │   runtime footprint, fewer deps.   │   or observed dynamic types.           │
  │ • Predictable performance (no JIT  │ • Must target a fixed ISA baseline     │
  │   pauses, no compilation jitter).  │   (or ship multiple variants / use     │
  │ • Whole-program opts via LTO.      │   runtime CPU dispatch).               │
  │ • Easy to inspect/secure/sign the  │ • Long full rebuilds for big programs. │
  │   final artifact.                  │ • Cross-compilation needs care (right  │
  │ • Works in restricted environments │   triple, sysroot, libs).              │
  │   that forbid runtime codegen      │                                        │
  │   (W^X, iOS App Store, etc.).      │                                        │
  └────────────────────────────────────┴────────────────────────────────────────┘
</code></pre>
<blockquote>
<p><strong>Profile-Guided Optimization (PGO)</strong> is AOT&rsquo;s answer to &ldquo;no runtime profile&rdquo;: do an
instrumented run first to <em>collect</em> a profile, then recompile using it. It recovers much of
JIT&rsquo;s runtime-awareness while staying AOT. (<code>clang -fprofile-generate</code> then
<code>-fprofile-use</code>.)</p>
</blockquote>
<hr />
<h2 id="4-where-llvm-fits-in-an-aot-compiler">4. Where LLVM fits in an AOT compiler</h2>
<p>You build the front; LLVM builds the rest. The AOT-specific piece is the <strong>last step</strong>:
turning an optimized <code>Module</code> into a native <strong>object file</strong> on disk via a <code>TargetMachine</code>.</p>
<pre><code>   YOUR CODE                         LLVM                               OS/toolchain
   ───────────                       ──────────────────────             ──────────────
   frontend → Module                 optimize Module (PassMgr)
                                     TargetMachine::addPassesToEmitFile
                                       → SelectionDAG/GlobalISel
                                       → register allocation
                                       → MC layer encodes bytes
                                       → write .o to disk          ───▶  linker (ld/lld)
                                                                          combines .o +

</code></pre>
<p>The two AOT-defining LLVM concepts, covered next chapter:</p>
<pre><code>   • TargetMachine  — embodies &quot;the machine we compile for&quot;: its ISA, ABI,
                      register set, scheduling model. Created from a target triple.
   • Object emission — TargetMachine drives the backend to write a .o file

</code></pre>
<p>After that, <strong>linking</strong> (final chapter of this section) combines object files and libraries
into a runnable executable. LLVM provides <code>lld</code>, or you can shell out to the system linker.</p>
<hr />
<h2 id="5-the-artifact-chain-from-ir-to-a-runnable-program">5. The artifact chain: from IR to a runnable program</h2>
<pre><code>   square.ll  (LLVM IR, text)
      │  opt -O2            (optimize)
      ▼
   square.opt.ll
      │  llc -filetype=obj  (TargetMachine: codegen + emit)
      ▼
   square.o   (relocatable object: machine code + symbols + relocations)
      │  link with crt0, libc, other .o's       (resolve symbols, lay out memory)
      ▼
   square     (executable: ELF/Mach-O with entry point, segments)
      │  exec()             (OS loads segments, jumps to _start → main)
      ▼

</code></pre>
<p>Each artifact is <em>less abstract and more committed</em> than the last:</p>
<pre><code>   .ll   target-ish but portable-ish IR
   .o    committed to an ISA &amp; object format, but NOT to addresses (relocatable)
   exe   committed to a layout, entry point, and (for static) all code present

<p>We dig into objects, relocations, and linking in
<a href="04-linking-and-runtime.md">04-linking-and-runtime.md</a> — they explain <em>why</em> the <code>.o</code> → <code>exe</code>
step exists at all.</p>
<hr />
<h2 id="6-static-vs-dynamic-and-the-runtime">6. Static vs dynamic, and the runtime</h2>
<p>Even a &ldquo;simple&rdquo; AOT binary depends on a <strong>runtime</strong>:</p>
<pre><code>   ┌──────────────────────────────────────────────────────────────────────────┐
   │ Your main() does NOT run first. The C runtime startup (crt0/_start)      │
   │ runs first: it sets up the stack, argc/argv, calls global constructors,  │
   │ THEN calls main(), and on return calls exit().                           │
   └──────────────────────────────────────────────────────────────────────────┘

   _start (from crt0)
      │ set up stack, argc/argv/envp
      │ run .init / global ctors
      ▼

      │ return
      ▼

<pre><code>   STATIC linking:  copy library code INTO the executable.

     + small, shared libc in memory      − needs the .so/.dylib present at run
</code></pre>
<p>These choices are made at the <strong>link</strong> step, not by LLVM&rsquo;s codegen. Your AOT driver decides
which by how it invokes the linker.</p>

<blockquote>
<p>This is the heart of AOT in LLVM: turning an optimized <code>Module</code> into a native object file
on disk. We cover targets, triples, the <code>TargetMachine</code>, the data layout contract, and the
exact API sequence (<code>addPassesToEmitFile</code>) that writes a <code>.o</code>.</p>

<hr />
<h2 id="1-targets-triples-and-registration">1. Targets, triples, and registration</h2>
<p>A <strong>target</strong> is a backend: x86, AArch64, RISC-V, WASM, etc. LLVM can host many at once. A
<strong>triple</strong> selects one plus its OS/ABI.</p>
<pre><code>   target triple = &quot;arch-vendor-os-environment&quot;
                    ────  ─────  ──  ───────────
   examples:
     x86_64-unknown-linux-gnu       Intel/AMD 64, Linux, glibc ABI  → ELF
     aarch64-apple-darwin           Apple Silicon, macOS            → Mach-O
     x86_64-pc-windows-msvc         Intel 64, Windows, MSVC ABI     → COFF
     riscv64-unknown-elf            RISC-V 64, bare metal           → ELF
     wasm32-unknown-unknown         WebAssembly                     → wasm
</code></pre>
<p>Before you can use a target, you must <strong>register</strong> it. For &ldquo;the host CPU,&rdquo; LLVM provides
one-call initializers:</p>
<pre><code class="language-cpp">#include &quot;llvm/Support/TargetSelect.h&quot;

// Register just what's needed to emit code for the HOST machine:
llvm::InitializeNativeTarget();
llvm::InitializeNativeTargetAsmPrinter();   // for emitting asm/obj
llvm::InitializeNativeTargetAsmParser();    // if you parse inline asm

// OR register ALL targets you compiled in (needed for cross-compilation):
llvm::InitializeAllTargetInfos();
llvm::InitializeAllTargets();
llvm::InitializeAllTargetMCs();
llvm::InitializeAllAsmParsers();
llvm::InitializeAllAsmPrinters();
</code></pre>
<pre><code>   Why &quot;register&quot;? LLVM backends self-register into a global registry. The
   Init* calls flip them on. Forgetting these → &quot;Unable to find target for
   triple&quot; at runtime. It's the #1 first-time AOT bug.
</code></pre>
<hr />
<h2 id="2-looking-up-a-target-and-building-a-targetmachine">2. Looking up a target and building a TargetMachine</h2>
<pre><code class="language-cpp">#include &quot;llvm/MC/TargetRegistry.h&quot;
#include &quot;llvm/Target/TargetMachine.h&quot;
#include &quot;llvm/TargetParser/Host.h&quot;

std::string triple = llvm::sys::getDefaultTargetTriple();   // host triple
// (or hard-code &quot;x86_64-unknown-linux-gnu&quot; for cross-compilation)

std::string err;
const llvm::Target *target = llvm::TargetRegistry::lookupTarget(triple, err);
if (!target) { llvm::errs() &lt;&lt; err; return; }

llvm::TargetOptions opts;
auto RM = std::optional&lt;llvm::Reloc::Model&gt;(llvm::Reloc::PIC_);  // position-independent
llvm::TargetMachine *TM = target-&gt;createTargetMachine(
    triple,
    &quot;generic&quot;,          // CPU: &quot;generic&quot;, &quot;native&quot;, or e.g. &quot;skylake&quot;
    &quot;&quot;,                 // feature string: e.g. &quot;+avx2,+fma&quot;
    opts, RM);
</code></pre>
<p>What a <code>TargetMachine</code> <em>is</em>:</p>
<pre><code>   ┌───────────────────────────────────────────────────────────────────────┐
   │ TargetMachine = the complete description of the machine we target:    │
   │   • instruction set (which opcodes exist)                             │
   │   • register file (how many regs, which classes)                      │
   │   • calling convention / ABI                                          │
   │   • scheduling model (latencies, ports) for instruction scheduling    │
   │   • data layout (sizes/alignments/endianness)                         │
   │ It is the object the backend consults at every codegen decision.      │
   └───────────────────────────────────────────────────────────────────────┘
</code></pre>
<p>The <code>CPU</code> and <code>features</code> strings tune <em>which</em> instructions are allowed. <code>"native"</code> /
<code>getHostCPUName()</code> enables everything your build machine supports (great for local AOT, bad
for distributing — the binary may use AVX-512 the user&rsquo;s CPU lacks).</p>

<h2 id="3-the-data-layout-contract">3. The data layout contract</h2>
<p>The <code>Module</code> must carry the <code>TargetMachine</code>&rsquo;s data layout, or the optimizer/backend will
make wrong assumptions about pointer size and alignment.</p>
<pre><code class="language-cpp">module.setDataLayout(TM-&gt;createDataLayout());
module.setTargetTriple(triple);

<pre><code>   WHY THIS MATTERS:

       what's the alignment of this struct?&quot; to reason about loads/stores.
     - The backend needs it to lay out stack frames and globals.
   Set it RIGHT AFTER creating the module (or right before optimizing). A
   mismatch is silent corruption, not a crash.

<h2 id="4-emitting-an-object-file-addpassestoemitfile">4. Emitting an object file: <code>addPassesToEmitFile</code></h2>

<pre><code class="language-cpp">#include &quot;llvm/IR/LegacyPassManager.h&quot;
#include &quot;llvm/Support/FileSystem.h&quot;

bool emitObjectFile(llvm::Module &amp;M, llvm::TargetMachine *TM,
                    const std::string &amp;outPath) {
  std::error_code EC;
  llvm::raw_fd_ostream dest(outPath, EC, llvm::sys::fs::OF_None);

    llvm::errs() &lt;&lt; &quot;TargetMachine can't emit this file type&quot;;
    return false;
  }

  codegenPM.run(M);   // runs isel → regalloc → MC → writes bytes to \`dest\`

  return true;

<p>What <code>addPassesToEmitFile</code> wires up under the hood (the backend pipeline from section 06):</p>
<pre><code>   addPassesToEmitFile builds:

     MachineInstr (virtual registers)
      │  scheduling, register allocation, prologue/epilogue insertion
      ▼
     MachineInstr (physical registers)
      │  MC layer: encode to bytes, build sections, symbols, relocations
      ▼
     object file written to \`dest\`   (ELF / Mach-O / COFF)

<p><code>CodeGenFileType</code> options:</p>
<pre><code>   ObjectFile     → .o  (machine code bytes; what you usually want)
   AssemblyFile   → .s  (human-readable asm; for inspection/debugging)
   Null           → run codegen but discard output (for timing/testing)

<h2 id="5-full-minimal-aot-codegen-function">5. Full minimal AOT codegen function</h2>
<p>Putting §1–§4 together — give it an optimized <code>Module</code>, get a <code>.o</code>:</p>
<pre><code class="language-cpp">#include &quot;llvm/IR/Module.h&quot;
#include &quot;llvm/IR/LegacyPassManager.h&quot;
#include &quot;llvm/MC/TargetRegistry.h&quot;
#include &quot;llvm/Support/FileSystem.h&quot;
#include &quot;llvm/Support/TargetSelect.h&quot;
#include &quot;llvm/Target/TargetMachine.h&quot;
#include &quot;llvm/TargetParser/Host.h&quot;

bool moduleToObjectFile(llvm::Module &amp;M, const std::string &amp;out) {
  llvm::InitializeNativeTarget();
  llvm::InitializeNativeTargetAsmPrinter();

  auto triple = llvm::sys::getDefaultTargetTriple();
  M.setTargetTriple(triple);

  std::string err;
  const auto *target = llvm::TargetRegistry::lookupTarget(triple, err);
  if (!target) { llvm::errs() &lt;&lt; err &lt;&lt; &quot;\\n&quot;; return false; }

  llvm::TargetOptions opts;
  auto *TM = target-&gt;createTargetMachine(
      triple, &quot;generic&quot;, &quot;&quot;, opts, llvm::Reloc::PIC_);

  M.setDataLayout(TM-&gt;createDataLayout());   // MUST match TM

  llvm::raw_fd_ostream dest(out, EC, llvm::sys::fs::OF_None);
  if (EC) { llvm::errs() &lt;&lt; EC.message() &lt;&lt; &quot;\\n&quot;; return false; }

  llvm::legacy::PassManager pm;
  if (TM-&gt;addPassesToEmitFile(pm, dest, nullptr,
                              llvm::CodeGenFileType::ObjectFile)) {
    llvm::errs() &lt;&lt; &quot;cannot emit object file\\n&quot;; return false;
  }
  pm.run(M);
  dest.flush();
  return true;
}
</code></pre>

<p>Note the two different pass managers in a complete AOT compiler:
<strong>new PM</strong> for the IR optimization pipeline (chapter 02.02), <strong>legacy PM</strong> for the codegen

migrated. Don&rsquo;t let it confuse you — they operate at different stages.</p>

   │  .toy file ─▶ Lexer ─▶ Parser ─▶ AST ─▶ Codegen ─▶ Module                        │
   │              (01.01)  (01.02)         (01.03)                                    │
   │                                                       │                          │
   │                                                       ▼                          │
   │                                            optimizeModule (-O2)  (02.02)         │
   │                                                       │                          │
   │                                                       ▼                          │
   │                                            moduleToObjectFile     (03.02)        │
   │                                                       │                          │
   │                                                       ▼                          │
   │                                                  output.o                        │
   └───────────────────────────────────────────────────────┬──────────────────────────┘
                                                           │ invoke linker (clang/cc)
                                                           ▼
                                                      executable  ──▶ ./output
</code></pre>
<p>We reuse the lexer/parser/codegen from section 01 verbatim. The <em>new</em> code is the driver
that orchestrates: parse the file, codegen all functions into one Module, optimize, emit a
<code>.o</code>, and link.</p>
<hr />
<h2 id="2-the-driver-main">2. The driver <code>main</code></h2>
<pre><code class="language-cpp">// toyc.cpp — the AOT driver
#include &quot;llvm/IR/Module.h&quot;
#include &quot;llvm/IR/Verifier.h&quot;
#include &quot;llvm/Support/raw_ostream.h&quot;
#include &lt;cstdio&gt;
#include &lt;string&gt;

// (declared in our frontend translation units from section 01)
extern std::unique_ptr&lt;llvm::Module&gt; TheModule;
extern void InitializeModule();
void runFrontend(FILE *input);                 // lexes+parses+codegens whole file
bool optimizeModule(llvm::Module &amp;, int optLevel);   // from 02.02 (wrapper)
bool moduleToObjectFile(llvm::Module &amp;, const std::string &amp;out);  // from 03.02

int main(int argc, char **argv) {
  if (argc &lt; 2) { fprintf(stderr, &quot;usage: toyc file.toy [-o out]\\n&quot;); return 1; }
  const char *srcPath = argv[1];
  std::string objPath = &quot;output.o&quot;;

  FILE *in = fopen(srcPath, &quot;r&quot;);
  if (!in) { perror(&quot;open source&quot;); return 1; }

  InitializeModule();          // create LLVMContext, Module, IRBuilder
  runFrontend(in);             // fills TheModule with functions
  fclose(in);

  if (llvm::verifyModule(*TheModule, &amp;llvm::errs())) {   // catch malformed IR
    fprintf(stderr, &quot;internal error: invalid IR generated\\n&quot;);
    return 1;
  }

  optimizeModule(*TheModule, /*optLevel=*/2);            // -O2 pipeline

  if (!moduleToObjectFile(*TheModule, objPath))          // emit .o
    return 1;

  fprintf(stderr, &quot;wrote %s\\n&quot;, objPath.c_str());
  return 0;
}
</code></pre>
<p><code>runFrontend</code> is the section-01 <code>MainLoop</code>, with each <code>Handle*</code> calling <code>codegen()</code>:</p>
<pre><code class="language-cpp">void runFrontend(FILE *in) {
  setInput(in);            // make gettok read from this file
  getNextToken();          // prime CurTok
  while (true) {
    switch (CurTok) {
    case tok_eof: return;
    case ';': getNextToken(); break;
    case tok_def:
      if (auto F = ParseDefinition()) F-&gt;codegen();
      else getNextToken();                          // skip on error
      break;
    case tok_extern:
      if (auto P = ParseExtern()) P-&gt;codegen();
      else getNextToken();
      break;
    default:
      if (auto F = ParseTopLevelExpr()) F-&gt;codegen();
      else getNextToken();
      break;
    }
  }
}
</code></pre>
<blockquote>
<p>Difference from a JIT/REPL: here we <em>accumulate everything into one Module</em>, then optimize
and emit once. A JIT would compile each top-level entry immediately and run it. Same
frontend, different &ldquo;what to do with the Module.&rdquo;</p>
</blockquote>
<hr />
<h2 id="3-the-main-problem-toy-needs-an-entry-point">3. The <code>main</code> problem: Toy needs an entry point</h2>
<p>Toy programs are functions and top-level expressions; there&rsquo;s no <code>main</code>. For an executable we
must supply one. Two clean options:</p>
<pre><code>   OPTION A (synthesize main in IR): generate an i32 @main() that calls the
   anonymous top-level expr(s) and prints results / returns 0.

   OPTION B (provide a C driver): emit only Toy functions; write a small
   main.c that calls them, and link both .o's.
</code></pre>
<p>Option A, generating <code>main</code> ourselves, keeps it self-contained. Suppose we want
<code>main</code> to call a Toy function <code>@main_expr</code> (a renamed <code>__anon_expr</code>) and print it:</p>
<pre><code class="language-cpp">// After frontend, synthesize: i32 main() { printf(&quot;%f\\n&quot;, main_expr()); return 0; }
void synthesizeMain(llvm::Module &amp;M, llvm::LLVMContext &amp;Ctx) {
  llvm::IRBuilder&lt;&gt; B(Ctx);
  auto *i32 = B.getInt32Ty();

  // declare i32 @printf(ptr, ...)
  auto *printfTy = llvm::FunctionType::get(i32, {B.getPtrTy()}, /*vararg=*/true);
  auto printf = M.getOrInsertFunction(&quot;printf&quot;, printfTy);

  auto *mainTy = llvm::FunctionType::get(i32, false);
  auto *mainFn = llvm::Function::Create(mainTy, llvm::Function::ExternalLinkage,
                                        &quot;main&quot;, &amp;M);
  auto *bb = llvm::BasicBlock::Create(Ctx, &quot;entry&quot;, mainFn);
  B.SetInsertPoint(bb);

  llvm::Function *expr = M.getFunction(&quot;main_expr&quot;);   // a double() Toy fn
  llvm::Value *result = B.CreateCall(expr, {}, &quot;res&quot;);
  llvm::Value *fmt = B.CreateGlobalStringPtr(&quot;%f\\n&quot;);
  B.CreateCall(printf, {fmt, result});
  B.CreateRet(B.getInt32(0));
}
</code></pre>
<pre><code>   define i32 @main() {
   entry:
     %res = call double @main_expr()
     %0 = call i32 (ptr, ...) @printf(ptr @fmt, double %res)
     ret i32 0
   }
</code></pre>
<p>Now the Module has a real entry point referencing <code>printf</code> (resolved from libc at link).</p>

<h2 id="4-linking-from-o-to-executable">4. Linking: from <code>.o</code> to executable</h2>
<p>LLVM&rsquo;s codegen stops at the object file. To make a runnable program you <strong>link</strong> it with the
C runtime and libraries. Two approaches:</p>
<h3 id="a-shell-out-to-the-system-compiler-simplest-robust">(a) Shell out to the system compiler (simplest, robust)</h3>
<p><code>clang</code>/<code>cc</code> know how to find crt0, libc, the dynamic linker, and the right flags per
platform. Let them drive the link:</p>
<pre><code class="language-cpp">#include &lt;cstdlib&gt;
bool linkExecutable(const std::string &amp;obj, const std::string &amp;exe) {
  std::string cmd = &quot;cc &quot; + obj + &quot; -o &quot; + exe + &quot; -lm&quot;;   // -lm for Toy's extern sin etc.
  fprintf(stderr, &quot;linking: %s\\n&quot;, cmd.c_str());
  return std::system(cmd.c_str()) == 0;
}
</code></pre>
<pre><code class="language-bash"># what that command does, conceptually:
&gt;&gt;&gt; cc output.o -o output -lm
        │
        ├─ adds crt1.o / crti.o (startup: _start → main)
        ├─ resolves printf, sin from libc/libm
        ├─ lays out segments, sets entry point
        └─ produces a dynamically-linked ELF/Mach-O executable
</code></pre>
<h3 id="b-use-lld-programmatically-or-as-a-tool">(b) Use <code>lld</code> programmatically or as a tool</h3>
<p>LLVM&rsquo;s own linker <code>lld</code> can be invoked as <code>ld.lld</code> (ELF), <code>ld64.lld</code> (Mach-O), <code>lld-link</code>
(COFF), or embedded as a library. For most projects, shelling to <code>clang</code>/<code>cc</code> (which may
<em>use</em> lld via <code>-fuse-ld=lld</code>) is the pragmatic choice. Deep dive on what linking actually
does in <a href="04-linking-and-runtime.md">04-linking-and-runtime.md</a>.</p>

<pre><code class="language-bash"># build the compiler (CMake template from 00.05, linking core/support/native/passes)
&gt;&gt;&gt; cmake -S . -B build -DLLVM_DIR=$(llvm-config --cmakedir) &amp;&amp; cmake --build build

# write a Toy program
&gt;&gt;&gt; cat &gt; prog.toy &lt;&lt;'EOF'
def square(x) x * x;

# compile it (frontend → IR → -O2 → object), then it links
&gt;&gt;&gt; ./build/toyc prog.toy -o prog
wrote output.o
linking: cc output.o -o prog -lm

# run the NATIVE binary — no compiler involved anymore
&gt;&gt;&gt; ./prog
50.000000
</code></pre>
<pre><code>   prog.toy ──[toyc: frontend+opt+codegen]──▶ output.o ──[cc: link]──▶ prog
                                                                         │
                                                                  ./prog (AOT!)
                                                                  prints 50.0
</code></pre>
<p>The compiler is <em>done</em> before <code>./prog</code> runs. That&rsquo;s AOT.</p>
<hr />
<h2 id="6-inspecting-what-we-built">6. Inspecting what we built</h2>
<pre><code class="language-bash">&gt;&gt;&gt; llvm-objdump -d output.o | head -20      # see square's machine code
&gt;&gt;&gt; llvm-nm prog | grep -E 'square|main'     # symbols in the linked binary
&gt;&gt;&gt; ./prog ; echo &quot;exit=$?&quot;                  # run &amp; check exit status
</code></pre>

entry:

...

<blockquote>
<p>The <code>.o</code> → executable step is mysterious until you understand <em>object files</em> and
<em>relocations</em>. This chapter demystifies them — it&rsquo;s also the conceptual key to JIT, because
a JIT does linking <em>in memory at runtime</em>. Master this and ORC&rsquo;s &ldquo;linker&rdquo; makes sense.</p>

<h2 id="1-why-object-files-arent-runnable-yet">1. Why object files aren&rsquo;t runnable yet</h2>
<p>When the backend emits <code>square.o</code>, it doesn&rsquo;t yet know:</p>
<pre><code>   • The final ADDRESS where the code will live in memory.
   • The addresses of symbols defined in OTHER objects/libraries (printf, sin).
</code></pre>
<p>So it leaves <strong>holes</strong> — placeholders — plus a list of instructions for how to fill them.
Those instructions are <strong>relocations</strong>. An object file is &ldquo;machine code with blanks and a
to-do list.&rdquo;</p>
<pre><code>   ┌──────────────── square.o (relocatable) ──────────────────┐
   │ .text  (code)                                            │
   │    square:  fmul ...                                     │
   │    main:    call &lt;????&gt;   ◀── address of printf unknown! │
   │ .rodata     &quot;%f\\n\\0&quot;                                     │
   │ symbol table:  square (defined), main (defined),         │
   │                printf (UNDEFINED — someone else has it)  │
   │ relocations:   at offset 0x12 in .text, patch with the   │
   │                address of \`printf\` (type R_X86_64_PLT32) │
   └──────────────────────────────────────────────────────────┘
</code></pre>
<hr />
<h2 id="2-anatomy-of-an-object-file-elf-as-the-example">2. Anatomy of an object file (ELF as the example)</h2>
<p>ELF (Linux), Mach-O (macOS), and COFF (Windows) differ in detail but share this structure:</p>
<pre><code>   ┌────────────────────────────────────────────────────────────────────┐
   │ HEADER         arch, type (relocatable/exec), entry point          │
   ├────────────────────────────────────────────────────────────────────┤
   │ SECTIONS                                                           │
   │   .text        executable machine code                             │
   │   .rodata      read-only constants (string literals, vtables)      │
   │   .data        initialized writable globals                        │
   │   .bss         zero-initialized globals (takes no file space)      │
   │   .symtab      symbol table: names ↔ addresses/section+offset      │
   │   .rela.text   relocations for .text (the &quot;to-do list&quot;)            │
   │   .debug_*     DWARF debug info (optional)                         │
   └────────────────────────────────────────────────────────────────────┘
</code></pre>
<p>Inspect a real one:</p>
<pre><code class="language-bash">&gt;&gt;&gt; llvm-readobj --sections square.o     # list sections
&gt;&gt;&gt; llvm-nm square.o                       # symbols: T=text def, D=data, U=undefined
0000000000000000 T square

&gt;&gt;&gt; llvm-objdump -dr square.o              # disassemble WITH relocations annotated
   12: e8 00 00 00 00   call 0x17

<h2 id="3-symbols-the-vocabulary-of-linking">3. Symbols: the vocabulary of linking</h2>
<pre><code>   A SYMBOL is a named entity (function or data) with linkage. Two kinds matter:
     DEFINED    &quot;I provide \`square\` — here it is at this offset.&quot;
     UNDEFINED  &quot;I USE \`printf\` — somebody please provide it.&quot;

   Linking = matching every UNDEFINED symbol to a DEFINED one, then patching.
</code></pre>
<pre><code>   square.o                    libc.a / libc.so
   ─────────                   ────────────────
   defines: square, main       defines: printf, sin, malloc, ...
   needs:   printf  ───────────────▶ found here! resolve.

<p>Linkage types (from IR, chapter 00.03) map to symbol-table visibility:</p>

<hr />
<h2 id="4-what-the-linker-actually-does">4. What the linker actually does</h2>
<pre><code>   ┌────────────────────────── linker (ld / lld) ────────────────────────────┐
   │ 1. SECTION MERGING: concatenate all .text into one, all .data into one. │
   │ 2. SYMBOL RESOLUTION: match every undefined symbol to a definition,     │
   │    pulling in needed objects from archives (.a) as required.            │
   │ 3. LAYOUT: assign final addresses to every section/symbol.              │
   │ 4. RELOCATION: walk each relocation, compute the now-known address,     │
   │    and patch the bytes.                                                 │
   │ 5. WRITE: emit the executable (or shared library) with an entry point.  │
   └─────────────────────────────────────────────────────────────────────────┘

<p>For dynamically-linked calls, the address isn&rsquo;t known until load time, so calls go through

      │  first call: jump to resolver ───▶ filled in by dynamic loader
      │  later calls: jump straight ─────▶ printf's real address in libc.so
      ▼

</code></pre>
<pre><code>   PLT = Procedure Linkage Table (code stubs)
   GOT = Global Offset Table (data: resolved addresses)
   &quot;Lazy binding&quot;: the first call resolves &amp; caches the address; subsequent
   calls are direct. This is why the linker emits R_X86_64_PLT32 relocations.
</code></pre>
<p>You don&rsquo;t implement this — but recognizing it explains &ldquo;why is there a PLT32 relocation?&rdquo; and

<p>A linked executable doesn&rsquo;t begin at <code>main</code>. The C runtime (crt) wraps it:</p>

      │  call __libc_start_main(...)

<blockquote>
<p>The compiler&rsquo;s job <em>seems</em> done once the linker writes an executable. But there&rsquo;s a whole
tier of optimization that happens <strong>at or after link time</strong>, driven by <strong>runtime profiles</strong>,

<hr />
<h2 id="1-the-core-problem-the-compiler-is-flying-blind-on-layout">1. The core problem: the compiler is flying blind on layout</h2>
<p><code>-O2</code>/<code>-O3</code> optimize <em>instructions</em>. But on modern CPUs, a huge fraction of performance is
lost not to slow instructions but to <strong>bad code layout</strong>: instruction-cache misses, iTLB
misses, and branch mispredictions caused by how functions and basic blocks are <em>arranged in
memory</em>.</p>
<pre><code>   Where the cycles actually go on a large server binary:
   ┌─────────────────────────────────────────────────────────────────────┐
   │  compute (ALU/FPU) ████████████                                     │
   │  I-cache / iTLB misses ███████████████      ◀── layout problem!     │
   │  branch mispredicts ████████                ◀── layout problem!     │
   │  D-cache misses ██████                                              │
   └─────────────────────────────────────────────────────────────────────┘
   For big apps (databases, browsers, compilers themselves) the front-end
   stalls (fetching instructions) can dominate. Instruction LAYOUT, not
   instruction SELECTION, is the lever.
</code></pre>
<p>The compiler lays out code before it knows which paths are hot. Even PGO (below) helps only
partially, because the <em>linker</em> still shuffles things and inlining decisions are made on
estimates. The fix: optimize the <strong>final binary</strong>, using a profile of how it <em>actually runs</em>.</p>
<pre><code>   ┌─────────────────────────────────────────────────────────────────────────┐
   │ KEY IDEA: optimize the program AFTER it's compiled and linked, using    │
   │ a profile of real execution, when you know EXACTLY what's hot and how   │
   │ control flows. This is &quot;post-link optimization.&quot;                        │
   └─────────────────────────────────────────────────────────────────────────┘
</code></pre>
<hr />
<h2 id="2-where-post-link-optimization-sits-in-the-pipeline">2. Where post-link optimization sits in the pipeline</h2>
<pre><code>   source ─▶ IR ─▶ opt(-O2/-O3) ─▶ codegen ─▶ .o ─▶ LINK ─▶ executable
                       │                                        │
                  (PGO/LTO act                           ┌──────┴────────┐
                   in HERE, at                           │ run with a    │
                   compile/link)                         │ profiler      │
                                                         │ (collect      │
                                                         │  perf data)   │
                                                         └──────┬────────┘
                                                                ▼
                                                       ┌───────────────────┐
                                                       │  BOLT / Propeller │  ◀── POST-LINK
                                                       │  rewrite the      │     (this chapter)
                                                       │  binary using     │
                                                       │  the profile      │
                                                       └────────┬──────────┘
                                                                ▼
                                                       optimized executable
                                                       (re-laid-out, hot code
                                                        packed together)
</code></pre>
<p>Note post-link optimizers operate on <strong>machine code in the linked binary</strong>, not on LLVM IR.
They are <em>binary-to-binary</em> transformers. That&rsquo;s what makes them different from everything
else in this guide.</p>
<hr />
<h2 id="3-bolt--binary-optimization-and-layout-tool">3. BOLT — Binary Optimization and Layout Tool</h2>
<p><strong>BOLT</strong> (originally from Meta, now part of the LLVM project under <code>bolt/</code>) is a post-link
optimizer. You give it a linked executable plus a profile; it emits a faster executable with
the same behavior.</p>
<h3 id="the-bolt-workflow">The BOLT workflow</h3>
<pre><code>   STEP 1: build normally (ideally WITH relocations kept: link with --emit-relocs)
       cc -O2 ... -Wl,--emit-relocs -o app

   STEP 2: profile the running binary
       (a) perf:        perf record -e cycles:u -j any,u -o perf.data -- ./app &lt;workload&gt;
                        perf2bolt -p perf.data -o app.fdata app
       (b) or BOLT's own instrumentation:
                        llvm-bolt app -instrument -o app.inst
                        ./app.inst &lt;workload&gt;     # writes a .fdata profile

   STEP 3: optimize with the profile
       llvm-bolt app -o app.bolt -data=app.fdata \\
                 -reorder-blocks=ext-tsp -reorder-functions=hfsort \\
                 -split-functions -icf=1 -dyno-stats

   STEP 4: ship app.bolt  (typically 2–15% faster on large apps; sometimes more)
</code></pre>
<pre><code>   ┌──────────────────────────────── BOLT ──────────────────────────────────┐
   │                                                                        │
   │   app (ELF)  ──▶  disassemble &amp; rebuild a CFG for every function       │
   │   app.fdata  ──▶  annotate CFG edges with execution counts             │
   │                        │                                               │
   │                        ▼                                               │
   │              run a suite of binary-level passes (see below)            │
   │                        │                                               │
   │                        ▼                                               │
   │   re-emit code with a NEW layout  ──▶  app.bolt (faster ELF)           │
   └────────────────────────────────────────────────────────────────────────┘
</code></pre>
<h3 id="what-bolt-actually-does-its-passes">What BOLT actually does (its passes)</h3>
<pre><code>  ┌─────────────────────┬────────────────────────────────────────────────────┐
  │ Basic-block reorder │ place hot blocks contiguously, push cold/error     │
  │ (ext-tsp)           │ paths away → fewer taken branches, better I-cache. │
  │                     │ &quot;ext-tsp&quot; = extended Traveling-Salesman layout.    │
  ├─────────────────────┼────────────────────────────────────────────────────┤
  │ Function reordering │ cluster hot functions together (hfsort/hfsort+) so │
  │ (hfsort)            │ functions that call each other share cache/TLB.    │
  ├─────────────────────┼────────────────────────────────────────────────────┤
  │ Function splitting  │ split each function into hot + cold fragments;     │
  │                     │ move cold fragments to a separate region so the    │
  │                     │ hot core is dense (less I-cache pollution).        │
  ├─────────────────────┼────────────────────────────────────────────────────┤
  │ ICF                 │ Identical Code Folding: merge functions with       │
  │                     │ identical machine code into one.                   │
  ├─────────────────────┼────────────────────────────────────────────────────┤
  │ Indirect-call promo │ turn hot indirect/virtual calls into a checked     │
  │                     │ direct call (speculative devirtualization).        │
  ├─────────────────────┼────────────────────────────────────────────────────┤
  │ PLT optimization,   │ inline PLT stubs, fix up alignment for branch      │
  │ alignment, etc.     │ predictor &amp; fetch efficiency.                      │
  └─────────────────────┴────────────────────────────────────────────────────┘
</code></pre>
<p>The single biggest win is usually <strong>block + function reordering</strong>:</p>
<pre><code>   BEFORE (compiler order: hot &amp; cold interleaved)
   ┌────────────────────────────────────────────────────────────┐
   │ funcA_hot | funcA_cold | funcB_cold | funcB_hot | funcC... │   ← I-cache lines
   └────────────────────────────────────────────────────────────┘
     cache pulls in cold bytes alongside hot ones → wasted cache, more misses

   AFTER BOLT (hot packed, cold exiled)
   ┌─────────────────────────────┐      ┌─────────────────────────────┐
   │ funcA_hot funcB_hot funcC.. │ .... │ funcA_cold funcB_cold ...   │
   └─────────────────────────────┘      └─────────────────────────────┘
        HOT region (dense, cache-friendly)     COLD region (rarely touched)
</code></pre>
<pre><code>   Inside one function, block reordering makes the common path fall through:

   BEFORE                         AFTER ext-tsp
   ───────────────────            ───────────────────
   entry:                         entry:
     test; jne cold   ──┐           test; je  cold      ; flip: rare path branches
     &lt;hot body&gt;         │           &lt;hot body&gt;          ; hot path is straight-line
     ret                │           ret                 ; (fall-through, predicted)
   cold:  &lt;rare&gt; ◀──────┘         cold:  &lt;rare&gt;         ; moved out of the hot stream
</code></pre>
<h3 id="why-bolt-beats-compiler-pgo-at-layout">Why BOLT beats compiler PGO at layout</h3>
<pre><code>   ┌────────────────────────────────────────────────────────────────────────┐
   │ • The compiler optimizes per-function, before linking &amp; inlining are   │
   │   final. BOLT sees the WHOLE linked binary with FINAL addresses.       │
   │ • Profiles from \`perf\` on the real binary are precise (no IR-to-binary │
   │   mapping drift that degrades source-level PGO).                       │
   │ • BOLT can move things the linker already placed — it's the last word  │
   │   on layout. PGO + LTO + BOLT STACK: each adds gains the others can't. │
   └────────────────────────────────────────────────────────────────────────┘
</code></pre>
<p>Real-world: BOLT is used on Meta&rsquo;s services, the Linux kernel, databases, and — famously —
<strong>Clang/LLVM itself</strong> (a BOLTed clang compiles faster). It&rsquo;s complementary to PGO/LTO, not a
replacement: the recommended recipe is <code>ThinLTO + PGO + BOLT</code>.</p>
<hr />
<h2 id="4-propeller--post-link-layout-the-scalable-way">4. Propeller — post-link layout, the scalable way</h2>
<p>BOLT rewrites the whole binary in one shot, which is memory-hungry for very large programs.
<strong>Propeller</strong> (also LLVM) achieves similar layout gains but integrates with the <strong>compiler
and linker</strong> instead of rewriting the final binary monolithically.</p>
<pre><code>   BOLT model:                          Propeller model:
   ───────────────────────              ──────────────────────────────────
   linked exe + profile                 1. compile with -fbasic-block-sections
       │  monolithic rewrite               (each basic block in its OWN section)
       ▼                                 2. profile, produce a layout plan
   optimized exe                         3. RE-LINK with lld using the plan
                                            (lld places sections per the profile)
                                         → layout decisions deferred to the
                                           linker; distributable &amp; scalable
</code></pre>
<pre><code>   ┌─────────────────────────────────────────────────────────────────────────┐
   │ Propeller = &quot;do BOLT-style layout, but express it as basic-block        │
   │ SECTIONS that the LINKER reorders,&quot; so it scales to huge binaries and   │
   │ fits a distributed build. Trade-off: needs recompilation + relink;      │
   │ BOLT needs only the final binary + profile.                             │
   └─────────────────────────────────────────────────────────────────────────┘
</code></pre>
<p>Use BOLT when you only have/want to touch the final binary; use Propeller when you control
the build and need it to scale.</p>
<hr />
<h2 id="5-the-profile-family-pgo-autofdo-csspgo">5. The profile family: PGO, AutoFDO, CSSPGO</h2>
<p>Post-link tools need profiles. So does compile-time <strong>PGO</strong>. Know the variants — they differ
in <em>how the profile is collected</em> and <em>how precise it is</em>.</p>
<pre><code>  ┌───────────────┬────────────────────────────────────────────────────────────┐
  │ Instrumented  │ Compiler inserts counters (-fprofile-generate). Run the    │
  │ PGO           │ app → exact counts. Most accurate, but instrumented build  │
  │               │ is slow (~2x) and needs a separate profiling build.        │
  ├───────────────┼────────────────────────────────────────────────────────────┤
  │ Sampling PGO  │ Profile a NORMAL optimized build with \`perf\` (hardware     │
  │ / AutoFDO     │ sampling). No instrumentation, low overhead (~1%), can     │
  │               │ profile in production. Less precise; needs debug info to   │
  │               │ map samples back to source/IR.                             │
  ├───────────────┼────────────────────────────────────────────────────────────┤
  │ CSSPGO        │ Context-Sensitive Sampling PGO: AutoFDO + pseudo-call-stack│
  │               │ context (via synthetic probes) so inlining/specialization  │
  │               │ decisions get per-call-site profiles. More accurate FDO.   │
  ├───────────────┼────────────────────────────────────────────────────────────┤
  │ Temporal /    │ Profiles that capture ORDER of execution (e.g. startup vs  │
  │ partial PGO   │ steady-state) to optimize phases differently.              │
  └───────────────┴────────────────────────────────────────────────────────────┘
</code></pre>
<p>How profiles flow into the two consumers:</p>
<pre><code>                ┌──────── collect profile ─────────┐
                │                                  │
        instrumented run                    perf sampling
        (-fprofile-generate)                (AutoFDO/CSSPGO)
                │                                  │
                ▼                                  ▼
        .profdata ──▶ COMPILE-TIME PGO        perf.data ──▶ perf2bolt
        (clang -fprofile-use):                ──▶ .fdata ──▶ POST-LINK (BOLT)
          better inlining, block              layout of the FINAL binary
          ordering, branch hints,
          register allocation
</code></pre>
<p>The punchline: <strong>the same idea (profile-guided) is applied at two stages.</strong> Compile-time PGO
shapes <em>optimization and codegen</em>; post-link BOLT shapes <em>final layout</em>. They stack.</p>
<hr />
<h2 id="6-lto-recap-and-how-it-composes-with-pgo--bolt">6. LTO recap, and how it composes with PGO + BOLT</h2>
<p>LTO (covered in <a href="../02-ir-and-passes/03-pass-pipeline.md">../02-ir-and-passes/03-pass-pipeline.md</a> §7)
optimizes across translation units at link time. It&rsquo;s orthogonal to profiling, and the
full-strength production recipe combines all three:</p>
<pre><code>   ┌─────────────────────────────────────────────────────────────────────────┐
   │  THE &quot;MAX PERFORMANCE&quot; AOT STACK (each layer adds non-overlapping wins):│
   │                                                                         │
   │   1. ThinLTO       cross-module inlining &amp; whole-program opt            │
   │        +                                                                │
   │   2. PGO/AutoFDO    profile-guided inlining, block order, branch hints  │
   │        +                                                                │
   │   3. BOLT/Propeller post-link layout of the final binary                │
   │                                                                         │
   │   Typical compounding: each can add a few %; together, double digits    │
   │   on front-end-bound workloads. Order: LTO+PGO at build, BOLT after.    │
   └─────────────────────────────────────────────────────────────────────────┘
</code></pre>
<pre><code>   build ──[ThinLTO + PGO]──▶ fast binary ──[profile + BOLT]──▶ faster binary
   └──── compiler/linker tier ────┘         └──── post-link tier ────┘
</code></pre>
<hr />
<h2 id="7-polly--polyhedral-loop-optimization-a-different-other-stuff">7. Polly — polyhedral loop optimization (a different &ldquo;other stuff&rdquo;)</h2>
<p>Not post-link, but worth knowing as another LLVM optimization subsystem you&rsquo;ll hear about.
<strong>Polly</strong> is a high-level loop optimizer built on the <em>polyhedral model</em>: it represents loop
nests as mathematical polyhedra and applies transformations (tiling, fusion, interchange,
parallelization, vectorization-enabling reshaping) that classic pass-by-pass optimizers
struggle to do.</p>
<pre><code>   classic LLVM loop opts: pattern-based, one loop at a time.
   Polly: model the entire loop nest's iteration space as polyhedra, then
          use integer linear programming to find a better schedule.

   for i: for j: A[i][j] = A[i][j] + B[j][i]
       │  Polly sees the iteration space {(i,j) | 0&lt;=i&lt;N, 0&lt;=j&lt;M}
       ▼  and can TILE / INTERCHANGE / PARALLELIZE for cache &amp; SIMD
   tiled, cache-blocked, optionally OpenMP-parallel loop nest
</code></pre>
<pre><code>   ┌─────────────────────────────────────────────────────────────────────────┐
   │ Polly is to LOOPS what BOLT is to LAYOUT: a specialized, heavier        │
   │ machine that finds optimizations the default pipeline can't express.    │
   │ It plugs into the pass pipeline (-O3 -mllvm -polly). Big wins on dense  │
   │ numerical / array code; niche for general code.                         │
   └─────────────────────────────────────────────────────────────────────────┘
</code></pre>
<hr />
<h2 id="8-the-whole-landscape-on-one-map">8. The whole landscape on one map</h2>
<pre><code>   ABSTRACTION         TOOL/TECH              WHAT IT OPTIMIZES        WHEN
   ───────────         ────────────           ──────────────────      ───────────
   loop nests          Polly                  loop schedule/tiling    compile time
   whole program IR    LTO / ThinLTO          cross-module inlining   link time
   IR (profile-aware)  PGO/AutoFDO/CSSPGO     inlining, branch, regs  compile time
   machine code        BOLT                   layout of final binary  POST-link
   machine code        Propeller              layout via BB sections  link (+recompile)
   machine code        -O2/-O3 backend        instruction selection,  compile time
                                              scheduling, regalloc
</code></pre>
<pre><code>   &quot;When is each optimization possible?&quot; — the recurring theme of this guide:
   the LATER you optimize, the MORE you know (final addresses, real profiles),
   but the LESS you can change (you're editing bytes, not IR). BOLT trades
   flexibility for perfect information; Polly/LTO trade information for power.
</code></pre>
<hr />
<h2 id="9-practical-when-to-reach-for-what">9. Practical: when to reach for what</h2>
<pre><code>  ┌───────────────────────────────────────┬────────────────────────────────────┐
  │ Situatio n                            │ Reach for                          │
  ├───────────────────────────────────────┼────────────────────────────────────┤
  │ Large, front-end-bound service        │ ThinLTO + PGO, then BOLT           │
  │ (DB, browser, compiler)               │                                    │
  │ Can't recompile, only have the binary │ BOLT (instrumentation mode)        │
  │ Huge binary, distributed build        │ Propeller                          │
  │ Dense numerical / array kernels       │ Polly (or move to MLIR — sec. 05)  │
  │ Can't profile in prod cheaply         │ AutoFDO/CSSPGO (sampling)          │
  │ Multi-TU C++ with lots of inlining    │ ThinLTO                            │
  │ Just want a fast single binary, easy  │ -O2/-O3 (you already have it)      │
  └───────────────────────────────────────┴────────────────────────────────────┘
</code></pre>
<blockquote>
<p>These post-link/profile tools are an <strong>AOT-only</strong> luxury: they require a fixed binary and a
representative workload to profile. A JIT gets analogous benefits <em>for free and
continuously</em> by observing real execution and reoptimizing hot code live — which is exactly
the subject of the next section. (See <a href="../04-jit/04-advanced-jit.md">../04-jit/04-advanced-jit.md</a>
on tiered/profile-guided reoptimization — the JIT analog of PGO+BOLT.)</p>
</blockquote>

  { name: `18. Jit / Jit Theory`, path: `04-jit/01-jit-theory.md`, dir: `04-jit`, words: 1335, mins: 7, body: `<h1 id="0401--jit-compilation--theory">04.01 · JIT Compilation — Theory</h1>
<blockquote>
<p>Just-In-Time compilation generates native machine code <strong>at runtime, inside the running
process</strong>, and jumps to it immediately. This chapter builds the mental model: what JIT is,
why it exists, the in-process execution model, and how it relates to (and reuses) the AOT
machinery you just learned.</p>
</blockquote>
<hr />
<h2 id="1-the-defining-characteristic">1. The defining characteristic</h2>
<pre><code>   ┌─────────────────────────────────────────────────────────────────────────┐
   │  JIT: compilation happens DURING execution, in the SAME process, and    │
   │       the freshly-generated machine code is run IMMEDIATELY via a       │
   │       function pointer. No file on disk, no separate run step.          │
   └─────────────────────────────────────────────────────────────────────────┘
</code></pre>
<p>Contrast the timelines with AOT:</p>
<pre><code>   AOT:  [compile ............] then later, elsewhere: [run]
         two processes, two times, two (maybe) machines.

   JIT:  [............ one process ............]
         [ run a bit ][ compile fn X ][ run X ][ compile fn Y ][ run Y ]...
         compilation and execution INTERLEAVE in the same address space.
</code></pre>
<p>The signature move of a JIT:</p>
<pre><code class="language-cpp">   // 1. produce machine code for \`f\` into executable memory at address P
   // 2. cast that address to a function pointer
   auto fp = (double(*)(double)) P;
   // 3. CALL IT — right now, in this process
   double result = fp(3.0);
</code></pre>
<p>That <code>fp(3.0)</code> jumps into code that <strong>did not exist a millisecond ago</strong>. That&rsquo;s the whole
idea.</p>
<hr />
<h2 id="2-why-jit-the-runtime-information-advantage">2. Why JIT? The runtime-information advantage</h2>
<p>AOT must decide everything statically. A JIT runs <em>while the program runs</em>, so it can use
<strong>facts only knowable at runtime</strong>:</p>
<pre><code>  ┌──────────────────────────────────────────────────────────────────────────┐
  │ • Actual hot paths: profile execution, then optimize only what's hot.    │
  │ • Observed types: in dynamic languages, &quot;this variable has been an int   │
  │   10000 times&quot; → specialize/inline for int, guard for the rest.          │
  │ • Real constant values: a config read at startup becomes a compile-time  │
  │   constant for code generated afterward.                                 │
  │ • The exact host CPU: emit AVX-512 because we KNOW this machine has it.  │
  │ • Late binding / eval: compile code that didn't exist at build time      │
  │   (REPLs, shaders, generated queries, user scripts).                     │
  └──────────────────────────────────────────────────────────────────────────┘
</code></pre>
<pre><code>   This is &quot;speculative optimization&quot;: assume the common case observed at
   runtime, compile a fast path for it, and keep a guard + fallback (deopt)
   for when the assumption breaks. AOT literally cannot do this — it has no
   runtime to observe. It's the JIT's superpower.
</code></pre>
<hr />
<h2 id="3-the-costs-and-the-tension">3. The costs and the tension</h2>
<p>JIT isn&rsquo;t free; the compiler runs <em>during</em> your program&rsquo;s execution:</p>
<pre><code>  ┌─────────────────────────────────────┬────────────────────────────────────────┐
  │ COSTS                               │ MITIGATIONS                            │
  ├─────────────────────────────────────┼────────────────────────────────────────┤
  │ • Startup/warmup latency: first     │ • Tiered compilation: cheap/fast code  │
  │   calls are slow (compile then run).│   first, reoptimize hot code later.    │
  │ • Compiler memory lives in-process. │ • Lazy compilation: compile a function │
  │ • Compilation pauses (jitter) hurt  │   only when first called.              │
  │   tail latency.                     │ • Background compile threads.          │
  │ • Security: writable+executable     │ • W^X discipline: write code, flip to  │
  │   memory is an attack surface.      │   read+execute, never both at once.    │
  │ • Can't run where runtime codegen   │ • (none — use AOT there.)              │
  │   is forbidden (iOS, some consoles).│                                        │
  └─────────────────────────────────────┴────────────────────────────────────────┘
</code></pre>
<p>The central tension, which drives all JIT architecture:</p>
<pre><code>   ┌────────────────────────────────────────────────────────────────────────┐
   │ Every millisecond spent COMPILING is a millisecond NOT spent RUNNING.  │
   │ But better-compiled code RUNS faster. The art of a JIT is spending     │
   │ compile time only where it pays off — i.e., on hot code.               │
   └────────────────────────────────────────────────────────────────────────┘

       compile cheaply      ◀────────────────────▶      compile thoroughly
       (fast start,                                       (slow start,
        slow steady state)                                 fast steady state)
                         tiered compilation walks this line
</code></pre>
<hr />
<h2 id="4-the-in-process-execution-model">4. The in-process execution model</h2>
<p>A JIT must do, <em>at runtime and in memory</em>, what an AOT toolchain does on disk. Recall the
last chapter&rsquo;s punchline: <strong>a JIT is a linker that runs at runtime and targets memory.</strong></p>
<pre><code>   ┌──────────────────────── the JIT, in-process ──────────────────────────┐
   │                                                                       │
   │  IR (Module) ─▶ optimize ─▶ backend codegen ─▶ machine code BYTES     │
   │                                                     │                 │
   │                                                     ▼                 │
   │  allocate memory pages (mmap), write the bytes there                  │
   │                                                     │                 │
   │                                                     ▼                 │
   │  RESOLVE symbols: this code calls printf, sin, other JIT'd fns —      │
   │  find their addresses (in libc, in the host process, in the JIT)      │
   │                                                     │                 │
   │                                                     ▼                 │
   │  apply RELOCATIONS: patch the call targets with real addresses        │
   │                                                     │                 │
   │                                                     ▼                 │
   │  mark pages EXECUTABLE (mprotect RX), flush instruction cache         │
   │                                                     │                 │
   │                                                     ▼                 │
   │  hand back the function's address as a pointer ──▶ CALL IT            │
   └───────────────────────────────────────────────────────────────────────┘
</code></pre>
<p>Every step has an AOT analog:</p>
<pre><code>   AOT (on disk, offline)            JIT (in memory, at runtime)
   ─────────────────────             ───────────────────────────────
   emit .o                           emit bytes into mmap'd pages
   linker merges sections            JIT places sections in memory
   linker resolves symbols           JIT resolver finds addresses
   linker patches relocations        JIT patches relocations in place
   loader marks pages executable     JIT mprotects pages RX
   OS jumps to entry                 you call the function pointer
</code></pre>
<p>Same concepts, different <em>when</em> and <em>where</em>. This is why understanding AOT linking made you
ready for ORC.</p>
<hr />
<h2 id="5-where-the-jit-reuses-aot-machinery">5. Where the JIT reuses AOT machinery</h2>
<p>Crucially, the JIT does <strong>not</strong> reimplement optimization or codegen. It calls the <em>same</em>
<code>PassManager</code> and the <em>same</em> <code>TargetMachine</code> backend you used for AOT — it just sends the
output bytes to memory instead of a file.</p>
<pre><code>        frontend → Module
                     │
                     ▼
        optimize (SAME new-PM pipeline as AOT, ch.02.02)
                     │
                     ▼
        codegen via TargetMachine (SAME backend as AOT, ch.03.02)
                     │
          ┌──────────┴───────────┐
          ▼                      ▼
   AOT: write bytes        JIT: keep bytes in memory,
   to a .o file            link &amp; relocate in-process,
                           return a function pointer
</code></pre>
<p>LLVM&rsquo;s JIT framework that orchestrates the in-memory linking is <strong>ORC</strong> (On-Request
Compilation). The next chapter dissects it. For now, the takeaway:</p>
<pre><code>   ┌─────────────────────────────────────────────────────────────────────┐
   │ A JIT = (your frontend) + (LLVM's optimizer) + (LLVM's backend) +   │
   │         ORC's in-memory dynamic linker + a function-pointer call.   │
   │ Only the last two parts are &quot;new&quot; relative to AOT.                  │
   └─────────────────────────────────────────────────────────────────────┘
</code></pre>
<hr />
<h2 id="6-real-world-jits-and-what-they-teach">6. Real-world JITs and what they teach</h2>
<pre><code>  ┌───────────────┬────────────────────────────────────────────────────────────┐
  │ JVM HotSpot   │ interpret bytecode first; C1 (fast) then C2 (optimizing)   │
  │               │ compile hot methods. The canonical tiered JIT + deopt.     │
  │ V8 (JS)       │ Ignition interpreter → TurboFan optimizer; speculate on    │
  │               │ types, deopt on guard failure.                             │
  │ LuaJIT        │ trace-based: record hot loops as linear traces, compile.   │
  │ .NET CLR      │ JITs IL to native on first call (also has AOT: ReadyToRun).│
  │ PostgreSQL    │ uses LLVM ORC to JIT expression evaluation for queries.    │
  │ Julia         │ LLVM-based; JITs specialized native code per argument type.│
  │ lli / Cling   │ run/REPL LLVM IR / C++ directly via ORC.                   │
  └───────────────┴────────────────────────────────────────────────────────────┘
</code></pre>
<p>The recurring patterns across all of them — <strong>tiering, lazy compilation, speculation +
deoptimization</strong> — are exactly what LLVM ORC is designed to support, and what we cover in
<a href="04-advanced-jit.md">04-advanced-jit.md</a>.</p>
<hr />
<h2 id="7-a-note-on-llvms-jit-history-so-old-tutorials-dont-confuse-you">7. A note on LLVM&rsquo;s JIT history (so old tutorials don&rsquo;t confuse you)</h2>
<pre><code>   timeline of LLVM JIT APIs:
   ───────────────────────────────────────────────────────────────────────
   (old)  ExecutionEngine / &quot;the legacy JIT&quot;   — removed
          MCJIT                                — works, but monolithic, no lazy
          ORCv1                                — layered, but clunky APIs, removed
   (now)  ORCv2  ── LLJIT (batteries-included) and the raw layer APIs

</code></pre>

   │ the custom path. We use ORCv2 throughout.                           │
   └─────────────────────────────────────────────────────────────────────┘
</code></pre>

<blockquote>
<p>ORC (&ldquo;On-Request Compilation&rdquo;) is LLVM&rsquo;s modern JIT framework. It looks intimidating
because it has many small classes, but the model is clean once you see it: a set of
<strong>layers</strong> that transform code, <strong>JITDylibs</strong> that act like in-memory shared libraries, and
a <strong>symbol-resolution</strong> mechanism that mirrors the dynamic linker. We diagram every piece.</p>
</blockquote>
<hr />
<h2 id="1-the-big-picture">1. The big picture</h2>
<pre><code>   ┌──────────────────────────── ExecutionSession ──────────────────────────────┐
   │  (the &quot;JIT universe&quot;: owns everything, coordinates symbol lookup)          │
   │                                                                            │
   │   ┌─────────────┐   ┌─────────────┐        JITDylibs = in-memory .so's     │
   │   │ JITDylib    │   │ JITDylib    │        (namespaces of symbols)         │
   │   │  &quot;main&quot;     │   │  &quot;runtime&quot;  │                                        │
   │   │  fib, main  │   │  printf,sin │                                        │
   │   └─────────────┘   └─────────────┘                                        │
   │                                                                            │
   │   LAYER STACK (top = highest abstraction, code flows DOWN):                │
   │   ┌─────────────────────────────────────────────────────────────────────┐  │
   │   │ (your code adds IR Modules at the top)                              │  │
   │   │   ▼                                                                 │  │
   │   │ IRTransformLayer   — run optimization passes on each Module         │  │
   │   │   ▼                                                                 │  │
   │   │ IRCompileLayer     — compile IR → object (via TargetMachine)        │  │
   │   │   ▼                                                                 │  │
   │   │ ObjectLinkingLayer — link object into memory (JITLink), relocate    │  │
   │   │   ▼                                                                 │  │
   │   │ (machine code now live in executable memory; address resolvable)    │  │
   │   └─────────────────────────────────────────────────────────────────────┘  │
   │                                                                            │
   │   MangleAndInterner, SymbolStringPool, ExecutorProcessControl ...          │
   └────────────────────────────────────────────────────────────────────────────┘
</code></pre>
<p>Read it top-down: you hand IR in at the top; it flows down through layers (optimize →
compile → link-into-memory); at the bottom it&rsquo;s runnable machine code whose symbols live in a
JITDylib, ready to be looked up and called.</p>
<hr />
<h2 id="2-the-core-objects-one-at-a-time">2. The core objects, one at a time</h2>
<h3 id="executionsession--the-universe">ExecutionSession — the universe</h3>
<pre><code>   ExecutionSession (ES)
     • owns all JITDylibs, the symbol string pool, the error-reporting context
     • the central authority for symbol LOOKUP across the whole JIT
     • essentially &quot;the JIT process model&quot;
</code></pre>
<h3 id="jitdylib--an-in-memory-dynamic-library">JITDylib — an in-memory dynamic library</h3>
<pre><code>   A JITDylib is a NAMESPACE of symbols, exactly like a shared library (.so):
     • holds definitions (symbols → addresses, once materialized)
     • has a LINK ORDER: an ordered list of other JITDylibs to search for
       symbols it doesn't define (like a library's dependency list)
     • you can have several: e.g. &quot;main&quot; for user code, plus one exposing
       the host process's symbols (printf, malloc) for resolution.
</code></pre>
<pre><code>   JITDylib &quot;main&quot;  ── link order ──▶  JITDylib &quot;process&quot;  (host symbols)
     defines: fib, square              defines: printf, sin, malloc (from this process)
     uses:    printf  ───────────────────────▶ found via link order
</code></pre>
<h3 id="layers--composable-code-transformers">Layers — composable code transformers</h3>
<p>Each layer takes a unit of code, does one job, and passes it to the layer below.</p>
<pre><code>  ┌────────────────────┬────────────────────────────────────────────────────┐
  │ IRTransformLayer   │ apply an IR transform (your optimization pipeline) │
  │                    │ to each Module as it descends. Optional but common.│
  ├────────────────────┼────────────────────────────────────────────────────┤
  │ IRCompileLayer     │ compile a Module to an object buffer using a       │
  │                    │ TargetMachine (the SAME backend as AOT).           │
  ├────────────────────┼────────────────────────────────────────────────────┤
  │ ObjectLinkingLayer │ link the object into the executor's memory:        │
  │ (uses JITLink)     │ allocate pages, apply relocations, register        │
  │                    │ exception/TLS info, mark executable.               │
  │                    │ (Older RTDyldObjectLinkingLayer used RuntimeDyld.) │
  └────────────────────┴────────────────────────────────────────────────────┘
</code></pre>
<h3 id="materializationunit--the-lazy-core">MaterializationUnit &amp; the lazy core</h3>
<p>This is ORC&rsquo;s cleverest idea and the source of &ldquo;On-Request&rdquo;:</p>
<pre><code>   When you &quot;add&quot; a Module, ORC does NOT compile it immediately. Instead it
   records a PROMISE: &quot;JITDylib \`main\` can provide symbols {fib, square};
   when someone actually NEEDS one, run this MaterializationUnit to produce it.&quot;

   add Module ──▶ register symbol NAMES as &quot;available&quot;  (not yet compiled)
   lookup(&quot;fib&quot;) ──▶ triggers MATERIALIZATION ──▶ NOW the layers run:
                     transform → compile → link → address ready ──▶ returned
</code></pre>
<pre><code>   ┌─────────────────────────────────────────────────────────────────────────┐
   │ &quot;On-Request Compilation&quot;: symbols are compiled lazily, the first time   │
   │ they are looked up (or called). This is how ORC supports compiling      │
   │ only what's actually used — the foundation for lazy &amp; tiered JITs.      │
   └─────────────────────────────────────────────────────────────────────────┘
</code></pre>
<hr />
<h2 id="3-symbol-resolution-how-a-jitd-call-finds-its-target">3. Symbol resolution: how a JIT&rsquo;d call finds its target</h2>
<p>When code calls <code>printf</code>, the JIT must supply <code>printf</code>&rsquo;s address. ORC resolves symbols by
searching JITDylibs in link order, and a special <strong>generator</strong> can expose the host process&rsquo;s
own symbols.</p>
<pre><code>   lookup(&quot;printf&quot;) in JITDylib &quot;main&quot;
       │  not defined here → follow link order
       ▼
   JITDylib &quot;process&quot;
       │  has a DynamicLibrarySearchGenerator that exposes THIS process's
       │  exported symbols (it dlsym's the running executable + loaded libs)
       ▼
   finds &amp;printf in the linked-in libc ──▶ returns its address
       │
       ▼
   relocation in the JIT'd code patched with printf's address ──▶ call works
</code></pre>
<p>The generator that makes host symbols visible (you&rsquo;ll add this in every real JIT):</p>
<pre><code class="language-cpp">// Expose the host process's symbols (printf, sin, malloc, ...) to the JIT.
auto gen = llvm::orc::DynamicLibrarySearchGenerator::GetForCurrentProcess(
    DataLayout.getGlobalPrefix());
MainJITDylib.addGenerator(std::move(gen.get()));
</code></pre>
<pre><code>   ┌────────────────────────────────────────────────────────────────────────┐
   │ A GENERATOR is &quot;what to do when a symbol is requested but not yet      │
   │ defined.&quot; GetForCurrentProcess says: try to find it among the host     │
   │ process's symbols. This is how JIT'd code calls into libc / your app.  │
   └────────────────────────────────────────────────────────────────────────┘
</code></pre>
<hr />
<h2 id="4-mangling-and-the-symbolstringpool">4. Mangling and the SymbolStringPool</h2>
<p>Symbol names must match the platform&rsquo;s name mangling (e.g. macOS prefixes <code>_</code>). ORC interns
names for fast comparison.</p>
<pre><code>   &quot;printf&quot;  ──[Mangler, per DataLayout]──▶  &quot;_printf&quot; (macOS) or &quot;printf&quot; (linux)
            ──[SymbolStringPool interns]──▶  a unique pointer used as the key
</code></pre>
<pre><code class="language-cpp">llvm::orc::MangleAndInterner Mangle(ES, DataLayout);
auto sym = Mangle(&quot;printf&quot;);   // returns an interned, platform-mangled name
</code></pre>
<p>You rarely touch this directly with <code>LLJIT</code> (it does it for you), but it explains the
occasional &ldquo;_&rdquo; prefix in lookups on macOS.</p>
<hr />
<h2 id="5-executorprocesscontrol--out-of-process-jits">5. ExecutorProcessControl &amp; out-of-process JITs</h2>
<p>ORC abstracts <em>where the code runs</em> behind <strong>ExecutorProcessControl (EPC)</strong>:</p>
<pre><code>   IN-PROCESS (default):                 OUT-OF-PROCESS (remote):
   ──────────────────────                ──────────────────────────────
   JIT compiles AND runs code in         JIT compiles in process A; the code
   the same process. Simple, fast.       is shipped to and run in process B
                                          (another process, sandbox, or even
                                          a different MACHINE/architecture).

        ┌────────────────┐                    ┌────────────────┐  ┌────────────────┐
        │ JIT + code     │                    │ JIT (compiler) │  │ executor       │
        │ same process   │                    │  process A     │──│ process B      │
        └────────────────┘                    └────────────────┘  │  runs the code │
                                                                  └────────────────┘
</code></pre>
<pre><code>   Why remote? security isolation (a crash/exploit in JIT'd code doesn't
   take down the compiler/host), cross-target JIT (compile on x86, run on an
   embedded ARM board), and resource separation. EPC + ORC-RT make the memory
   management &amp; symbol lookup work across the process boundary transparently.
</code></pre>
<p>For most uses you&rsquo;ll use the in-process default (<code>SelfExecutorProcessControl</code>), but knowing
EPC exists explains ORC&rsquo;s otherwise-surprising indirection.</p>
<hr />
<h2 id="6-how-the-pieces-collaborate-a-full-lookup-trace">6. How the pieces collaborate (a full lookup trace)</h2>
<p>Putting it together — what happens on <code>jit.lookup("fib")</code> then calling it:</p>
<pre><code>   (1) ES.lookup({MainJD}, &quot;fib&quot;)
         │
   (2) MainJD: &quot;fib&quot; is a not-yet-materialized symbol I promised.&quot;
         │  trigger its MaterializationUnit
         ▼
   (3) IRTransformLayer: run -O2 passes on fib's Module
         ▼
   (4) IRCompileLayer: TargetMachine compiles IR → object buffer
         ▼
   (5) ObjectLinkingLayer (JITLink): allocate exec memory, write bytes,
         resolve fib's external refs (e.g. recursive fib, printf) via
         link order + generators, patch relocations, mark RX
         ▼
   (6) &quot;fib&quot; now has a concrete address in executable memory
         │
   (7) lookup returns that address as an ExecutorAddr
         ▼
   (8) cast to double(*)(double), call it — runs native code
</code></pre>
<pre><code>   You see all of ORC's concepts in this one trace:
   ExecutionSession (drives lookup) · JITDylib (namespace + link order) ·
   MaterializationUnit (lazy compile) · the layer stack (transform→compile→
   link) · generators/link-order (symbol resolution) · ExecutorAddr (result).
</code></pre>
<hr />
<h2 id="7-lljit--the-assembled-batteries-included-jit">7. LLJIT — the assembled, batteries-included JIT</h2>
<p>You usually don&rsquo;t wire layers by hand. <strong>LLJIT</strong> is ORC&rsquo;s pre-assembled JIT with sensible
defaults (the layer stack above, a main JITDylib, a <code>TargetMachine</code> for the host). The next
chapter uses it:</p>
<pre><code>   LLJIT  =  ExecutionSession
           + a main JITDylib (with a process-symbols generator you add)
           + IRCompileLayer (host TargetMachine)
           + ObjectLinkingLayer (JITLink/RuntimeDyld)
           + the DataLayout &amp; Mangler wired up
   You: addIRModule(...) then lookup(...). Done.
</code></pre>
<pre><code>   ┌─────────────────────────────────────────────────────────────────────────┐
   │ Use LLJIT for 95% of cases. Drop to raw ExecutionSession + custom       │
   │ layers only when you need lazy/tiered/remote behavior LLJIT's defaults  │
   │ don't give you (and even then, LLLazyJIT and customization hooks exist).│
   └─────────────────────────────────────────────────────────────────────────┘
</code></pre>
<hr />
