<blockquote>
<p>Now we write real JITs. First the easy, production path with <strong>LLJIT</strong> (a few lines), then
a <strong>REPL</strong> that JIT-compiles Toy expressions interactively, then a <strong>hand-built JIT</strong> from
raw ORC layers so you understand what LLJIT does for you. All code is current ORCv2.</p>
</blockquote>
<hr />
<h2 id="1-the-minimal-lljit">1. The minimal LLJIT</h2>
<p>The smallest useful JIT: build a Module, add it, look up a symbol, call it.</p>
<pre><code class="language-cpp">#include &quot;llvm/ExecutionEngine/Orc/LLJIT.h&quot;
#include &quot;llvm/IR/IRBuilder.h&quot;
#include &quot;llvm/IR/Module.h&quot;
#include &quot;llvm/Support/InitLLVM.h&quot;
#include &quot;llvm/Support/TargetSelect.h&quot;
using namespace llvm;
using namespace llvm::orc;

int main(int argc, char **argv) {
  InitLLVM X(argc, argv);

  // 1. The JIT uses the backend → initialize native target codegen.
  InitializeNativeTarget();
  InitializeNativeTargetAsmPrinter();

  // 2. Build the JIT (LLJITBuilder picks the host TargetMachine, builds layers).
  auto jitOrErr = LLJITBuilder().create();
  if (!jitOrErr) { logAllUnhandledErrors(jitOrErr.takeError(), errs()); return 1; }
  std::unique_ptr&lt;LLJIT&gt; J = std::move(*jitOrErr);

  // 3. Create a Module with the JIT's DataLayout (MUST match the JIT's target).
  auto ctx = std::make_unique&lt;LLVMContext&gt;();
  auto M = std::make_unique&lt;Module&gt;(&quot;jit_demo&quot;, *ctx);
  M-&gt;setDataLayout(J-&gt;getDataLayout());

  IRBuilder&lt;&gt; b(*ctx);
  auto *i32 = b.getInt32Ty();
  auto *fn = Function::Create(FunctionType::get(i32, {i32}, false),
                              Function::ExternalLinkage, &quot;times3&quot;, M.get());
  auto *bb = BasicBlock::Create(*ctx, &quot;entry&quot;, fn);
  b.SetInsertPoint(bb);
  b.CreateRet(b.CreateMul(fn-&gt;getArg(0), b.getInt32(3)));

  // 4. Hand the Module to the JIT (wrapped as a ThreadSafeModule).
  if (auto err = J-&gt;addIRModule(ThreadSafeModule(std::move(M), std::move(ctx)))) {
    logAllUnhandledErrors(std::move(err), errs()); return 1;
  }

  // 5. Look up the symbol → triggers compilation → returns an address.
  auto sym = J-&gt;lookup(&quot;times3&quot;);
  if (!sym) { logAllUnhandledErrors(sym.takeError(), errs()); return 1; }

  // 6. Cast to a function pointer and CALL IT — native code, right now.
  auto *times3 = sym-&gt;toPtr&lt;int(int)&gt;();
  outs() &lt;&lt; &quot;times3(14) = &quot; &lt;&lt; times3(14) &lt;&lt; &quot;\\n&quot;;   // 42
  return 0;
}
</code></pre>
<pre><code>   The 6 steps of ANY LLJIT use:
   ┌───────────────────────────────────────────────────────────────────────┐
   │ init native target → create LLJIT → build Module (with JIT datalayout)│
   │ → addIRModule → lookup(symbol) → toPtr + call                         │
   └───────────────────────────────────────────────────────────────────────┘
</code></pre>
<p>Two non-negotiable details that bite beginners:</p>
<pre><code>   (1) M-&gt;setDataLayout(J-&gt;getDataLayout())  — the Module's layout MUST equal
       the JIT's, or codegen/linking misbehaves.
   (2) ThreadSafeModule bundles the Module WITH its LLVMContext, so ORC can
       move it across threads safely. Don't keep using the context afterward.
</code></pre>
<hr />
<h2 id="2-letting-jitd-code-call-libc-printf-sin">2. Letting JIT&rsquo;d code call libc (<code>printf</code>, <code>sin</code>)</h2>
<p>If your IR calls <code>printf</code>, the JIT must resolve it. Add a generator that exposes the host
process&rsquo;s symbols to the main JITDylib:</p>
<pre><code class="language-cpp">#include &quot;llvm/ExecutionEngine/Orc/ExecutionUtils.h&quot;
// after creating J:
auto &amp;JD = J-&gt;getMainJITDylib();
JD.addGenerator(cantFail(
    DynamicLibrarySearchGenerator::GetForCurrentProcess(
        J-&gt;getDataLayout().getGlobalPrefix())));
</code></pre>
<pre><code>   Now a JIT'd \`call i32 @printf(...)\` resolves like this:
   lookup printf in main JD → not defined → generator dlsym's the process →
   finds libc's printf (linked into THIS executable) → address patched in.
   (Tip: make sure printf isn't dead-stripped from your JIT host; reference
    it or link with -rdynamic / export-dynamic so it's in the symbol table.)
</code></pre>
<hr />
<h2 id="3-a-toy-repl-that-jit-compiles-each-line">3. A Toy REPL that JIT-compiles each line</h2>
<p>This is where JIT shines: an interactive loop that compiles and <em>runs</em> each entered
expression immediately. We reuse the section-01 frontend. Each top-level expression becomes
<code>double __anon_expr()</code> (recall chapter 01.02), which we JIT and call.</p>
<pre><code class="language-cpp">// Toy JIT REPL (sketch; reuses Lexer/Parser/Codegen from section 01)
#include &quot;llvm/ExecutionEngine/Orc/LLJIT.h&quot;
#include &quot;llvm/ExecutionEngine/Orc/ThreadSafeModule.h&quot;
using namespace llvm; using namespace llvm::orc;

static std::unique_ptr&lt;LLJIT&gt; TheJIT;

// Per the chapter-01 codegen, these globals hold the current module/context:
extern std::unique_ptr&lt;LLVMContext&gt; TheContext;
extern std::unique_ptr&lt;Module&gt; TheModule;
void InitializeModule();   // (re)creates TheContext + TheModule + IRBuilder

static void HandleTopLevelExpr() {
  if (auto FnAST = ParseTopLevelExpr()) {
    if (FnAST-&gt;codegen()) {                         // emits @__anon_expr into TheModule
      // Move the current module into the JIT, then start a fresh one.
      auto TSM = ThreadSafeModule(std::move(TheModule), std::move(TheContext));
      cantFail(TheJIT-&gt;addIRModule(std::move(TSM)));
      InitializeModule();                            // fresh module for next line

      // Look up, call, print.
      auto sym = cantFail(TheJIT-&gt;lookup(&quot;__anon_expr&quot;));
      double (*fp)() = sym.toPtr&lt;double()&gt;();
      fprintf(stderr, &quot;Evaluated to %f\\n&quot;, fp());

      // Remove the anonymous expr so the name is reusable next time.
      // (Use a ResourceTracker — see §4 — to remove just this module.)
    }
  } else getNextToken();
}

int main() {
  InitializeNativeTarget(); InitializeNativeTargetAsmPrinter();
  TheJIT = cantFail(LLJITBuilder().create());
  TheJIT-&gt;getMainJITDylib().addGenerator(cantFail(
      DynamicLibrarySearchGenerator::GetForCurrentProcess(
          TheJIT-&gt;getDataLayout().getGlobalPrefix())));
  InitializeModule();
  getNextToken();
  MainLoop();   // dispatches def/extern/top-level; top-level → HandleTopLevelExpr
}
</code></pre>
<pre><code>   REPL flow per line:
   ───────────────────────────────────────────────────────────────────────
   &quot;fib(10);&quot;  ─lex/parse─▶ AST ─codegen─▶ @__anon_expr in a Module
        │
        ▼
   addIRModule(Module)  ── JIT records the promise; fresh Module started
        │
        ▼
   lookup(&quot;__anon_expr&quot;) ── triggers compile of this module (and any defs it
        │                    uses, like fib, resolved across prior modules)
        ▼
   call the function pointer ── prints &quot;Evaluated to 55.0&quot;
</code></pre>
<p>The subtlety: function <em>definitions</em> (<code>def fib...</code>) entered earlier must remain resolvable
when a later expression calls them. ORC handles this because each added module&rsquo;s symbols live
in the JITDylib; cross-module calls resolve through it. (Real Kaleidoscope keeps a map of
function prototypes so codegen can re-declare them in each new module.)</p>
<hr />
<h2 id="4-managing-jitd-code-lifetime-resourcetrackers">4. Managing JIT&rsquo;d code lifetime: ResourceTrackers</h2>
<p>In a REPL you add modules forever — you need to <em>remove</em> them (e.g., redefining a function).
ORC uses <strong>ResourceTracker</strong> to scope a set of symbols you can later free.</p>
<pre><code class="language-cpp">auto RT = TheJIT-&gt;getMainJITDylib().createResourceTracker();
cantFail(TheJIT-&gt;addIRModule(RT, std::move(TSM)));   // associate module with RT
// ... use it ...
cantFail(RT-&gt;remove());   // free that module's code &amp; symbols
</code></pre>
<pre><code>   ResourceTracker = a handle to &quot;everything added under it.&quot;
   remove() reclaims the executable memory and removes the symbols, so you
   can redefine \`fib\` or drop a one-shot __anon_expr. Without it, JIT memory
   grows unbounded and symbol redefinition errors out.
</code></pre>
<hr />
<h2 id="5-optimizing-in-the-jit-adding-an-irtransformlayer">5. Optimizing in the JIT: adding an IRTransformLayer</h2>
<p>LLJIT lets you install a transform run on every module before compilation — your optimization
pipeline (chapter 02.02), tuned for fast compiles:</p>
<pre><code class="language-cpp">#include &quot;llvm/Passes/PassBuilder.h&quot;

TheJIT-&gt;getIRTransformLayer().setTransform(
  [](ThreadSafeModule TSM, const MaterializationResponsibility &amp;)
      -&gt; Expected&lt;ThreadSafeModule&gt; {
    TSM.withModuleDo([](Module &amp;M) {
      // Build a quick pipeline (mem2reg + a few cleanups) — cheap for JIT latency.
      LoopAnalysisManager LAM; FunctionAnalysisManager FAM;
      CGSCCAnalysisManager CGAM; ModuleAnalysisManager MAM;
      PassBuilder PB;
      PB.registerModuleAnalyses(MAM); PB.registerCGSCCAnalyses(CGAM);
      PB.registerFunctionAnalyses(FAM); PB.registerLoopAnalyses(LAM);
      PB.crossRegisterProxies(LAM, FAM, CGAM, MAM);
      ModulePassManager MPM = PB.buildPerModuleDefaultPipeline(OptimizationLevel::O2);
      MPM.run(M, MAM);
    });
    return std::move(TSM);
  });
</code></pre>
<pre><code>   Where it sits (from chapter 04.02's layer stack):
     addIRModule ─▶ [IRTransformLayer: YOUR passes here] ─▶ IRCompileLayer ─▶ link
   This is the JIT equivalent of optimizeModule() in the AOT driver — but you
   choose a CHEAPER pipeline to keep latency low (see ch.02.03 §6, ch.04.04).
</code></pre>
<hr />
<h2 id="6-the-hand-built-jit-what-lljit-assembles-for-you">6. The hand-built JIT (what LLJIT assembles for you)</h2>
<p>To demystify LLJIT, here is the classic &ldquo;KaleidoscopeJIT&rdquo; structure: raw ORC layers wired by
hand. Study it once; then appreciate why you use LLJIT.</p>
<pre><code class="language-cpp">#include &quot;llvm/ExecutionEngine/Orc/Core.h&quot;
#include &quot;llvm/ExecutionEngine/Orc/ExecutionUtils.h&quot;
#include &quot;llvm/ExecutionEngine/Orc/IRCompileLayer.h&quot;
#include &quot;llvm/ExecutionEngine/Orc/CompileUtils.h&quot;
#include &quot;llvm/ExecutionEngine/Orc/RTDyldObjectLinkingLayer.h&quot;
#include &quot;llvm/ExecutionEngine/Orc/ExecutorProcessControl.h&quot;
#include &quot;llvm/ExecutionEngine/SectionMemoryManager.h&quot;
using namespace llvm; using namespace llvm::orc;

class MyJIT {
  std::unique_ptr&lt;ExecutionSession&gt; ES;
  DataLayout DL;
  MangleAndInterner Mangle;
  RTDyldObjectLinkingLayer ObjectLayer;   // link objects into memory
  IRCompileLayer CompileLayer;             // compile IR → objects
  JITDylib &amp;MainJD;

public:
  MyJIT(std::unique_ptr&lt;ExecutionSession&gt; ES, JITTargetMachineBuilder JTMB, DataLayout DL)
    : ES(std::move(ES)), DL(std::move(DL)), Mangle(*this-&gt;ES, this-&gt;DL),
      ObjectLayer(*this-&gt;ES, []{ return std::make_unique&lt;SectionMemoryManager&gt;(); }),
      CompileLayer(*this-&gt;ES, ObjectLayer,
                   std::make_unique&lt;ConcurrentIRCompiler&gt;(std::move(JTMB))),
      MainJD(this-&gt;ES-&gt;createBareJITDylib(&quot;&lt;main&gt;&quot;)) {
    // Resolve host process symbols (printf, etc.).
    MainJD.addGenerator(cantFail(
        DynamicLibrarySearchGenerator::GetForCurrentProcess(DL.getGlobalPrefix())));
  }

  static Expected&lt;std::unique_ptr&lt;MyJIT&gt;&gt; Create() {
    auto EPC = SelfExecutorProcessControl::Create();      // in-process
    if (!EPC) return EPC.takeError();
    auto ES = std::make_unique&lt;ExecutionSession&gt;(std::move(*EPC));
    JITTargetMachineBuilder JTMB(ES-&gt;getExecutorProcessControl().getTargetTriple());
    auto DL = JTMB.getDefaultDataLayoutForTarget();
    if (!DL) return DL.takeError();
    return std::make_unique&lt;MyJIT&gt;(std::move(ES), std::move(JTMB), std::move(*DL));
  }

  const DataLayout &amp;getDataLayout() const { return DL; }

  Error addModule(ThreadSafeModule TSM) {
    return CompileLayer.add(MainJD.getDefaultResourceTracker(), std::move(TSM));
  }
  Expected&lt;ExecutorSymbolDef&gt; lookup(StringRef Name) {
    return ES-&gt;lookup({&amp;MainJD}, Mangle(Name.str()));
  }
};
</code></pre>
<p>Map it to chapter 04.02&rsquo;s diagram:</p>
<pre><code>   ExecutionSession ES          ── the universe
   RTDyldObjectLinkingLayer     ── ObjectLinkingLayer (link into memory)
   IRCompileLayer + Concurrent  ── compile IR → object via TargetMachine
     IRCompiler(JTMB)
   MainJD + process generator   ── the in-memory .so + host-symbol resolution
   Mangle                        ── platform name mangling
   addModule / lookup            ── the public API LLJIT also exposes
</code></pre>
<pre><code>   ┌─────────────────────────────────────────────────────────────────────────┐
   │ That ~40 lines IS (a simplified) LLJIT. LLJIT just adds an              │
   │ IRTransformLayer slot, lazy-compilation options, better defaults, and   │
   │ JITLink instead of RuntimeDyld. Now you know what create() builds.      │
   └─────────────────────────────────────────────────────────────────────────┘
</code></pre>
<hr />
<h2 id="7-common-pitfalls-checklist">7. Common pitfalls checklist</h2>
<pre><code>  ┌─────────────────────────────────────────────────────────────────────────┐
  │ ☐ Forgot InitializeNativeTarget*/AsmPrinter → &quot;no compiler for triple&quot;. │
  │ ☐ Module DataLayout ≠ JIT DataLayout → bad codegen / link failures.     │
  │ ☐ Used the context after moving it into ThreadSafeModule → UB.          │
  │ ☐ JIT'd code calls printf but no process-symbol generator → unresolved. │
  │ ☐ printf got dead-stripped from the host → link with -rdynamic.         │
  │ ☐ Re-adding a Module with the same symbol w/o a ResourceTracker remove  │
  │   → &quot;duplicate definition&quot; error.                                       │
  │ ☐ Following an MCJIT/ExecutionEngine tutorial → wrong API era.          │
  └─────────────────────────────────────────────────────────────────────────┘
</code></pre>

<blockquote>
<p>The basic JIT compiles everything eagerly at <code>-O2</code>. Real-world JITs (JVM, V8, Julia) do
much more: compile lazily, recompile hot code at higher tiers, speculate on runtime facts
and deoptimize when wrong, and even run code in another process. This chapter explains
these techniques and how ORC supports them.</p>
</blockquote>
<hr />
<h2 id="1-lazy-compilation--compile-on-first-call">1. Lazy compilation — compile on first call</h2>
<p>Why compile a function that&rsquo;s never called? <strong>Lazy compilation</strong> defers a function&rsquo;s codegen
until it&rsquo;s actually invoked, via a <strong>stub</strong> that triggers compilation on first entry.</p>
<pre><code>   At &quot;add&quot; time, install a tiny STUB for fib instead of compiling it:

   fib_stub:  jmp *fib_ptr      ; fib_ptr initially → the &quot;compile me&quot; trampoline

   First call to fib:
     → trampoline runs: ORC materializes fib (transform→compile→link)
     → fib_ptr updated to point at the real compiled fib
     → re-dispatch into real fib
   Second call onward:
     → fib_stub jumps straight to compiled fib (one extra indirect jump, then
        often patched away)
</code></pre>
<pre><code>   ┌────────────────────────────────────────────────────────────────────────┐
   │ Lazy compilation = pay codegen cost only for code that actually runs.  │
   │ Huge for startup of large programs where most functions never execute. │
   │ ORC implements this with lazy reexports / indirect stubs + the         │
   │ on-request materialization core (chapter 04.02 §2).                    │
   └────────────────────────────────────────────────────────────────────────┘
</code></pre>
<p>In ORC, this is the difference between eager <code>LLJIT</code> and <code>LLLazyJIT</code>, or building lazy
reexports yourself with <code>lazyReexports</code> and an indirect-stubs manager.</p>
<pre><code class="language-cpp">// Conceptual: create lazy reexports so symbols compile on first lookup/call.
// LLLazyJIT wires the CompileOnDemandLayer + lazy call-through manager for you.
auto J = cantFail(LLLazyJITBuilder().create());
// addIRModule as usual; functions now compile the first time they're called.
</code></pre>
<hr />
<h2 id="2-the-compileondemandlayer-and-per-function-laziness">2. The CompileOnDemandLayer and per-function laziness</h2>
<p>ORC&rsquo;s <code>CompileOnDemandLayer</code> splits a module so each function can be materialized
independently, on demand.</p>
<pre><code>   addIRModule(M with f, g, h)
        │  CompileOnDemandLayer splits into per-function materialization units
        ▼
   JITDylib has stubs for f, g, h  (none compiled yet)
        │
   call g() ─▶ only g compiled &amp; linked; f, h still stubs
        │
   call f() ─▶ now f compiled; h still a stub forever if never called
</code></pre>
<pre><code>   Granularity ladder:
     LLJIT            : whole module compiled on first symbol lookup
     LLLazyJIT / COD  : each FUNCTION compiled on first call
     (custom)         : even finer, e.g. compile then re-split for tiering
</code></pre>
<hr />
<h2 id="3-tiered-compilation--the-heart-of-fast-jits">3. Tiered compilation — the heart of fast JITs</h2>
<p>The compile-vs-run tension (chapter 04.01 §3) is resolved by <strong>tiers</strong>: start with cheap,
fast-to-produce code; promote hot functions to expensive, fast-to-run code.</p>
<pre><code>   TIER 0: interpreter / template JIT     (instant, slow execution)
       │   counts calls/loop iterations (profiling counters)
       │   gets hot →
   TIER 1: quick JIT (-O0/-O1, fast compile, decent code)
       │   still hot, stays hot →
   TIER 2: optimizing JIT (-O2/-O3, slow compile, fast code)
       │   uses profile data gathered in lower tiers!
       ▼
   steady state: hottest code runs at top tier; cold code never leaves tier 0/1
</code></pre>
<pre><code>   ┌────────────────────────────────────────────────────────────────────────┐
   │ Tiered = &quot;spend compile time in proportion to how hot the code is.&quot;    │
   │ Cold code: cheap. Hot code: lavish optimization + the runtime profile  │
   │ gathered while it ran in lower tiers. This is the JIT analog of        │
   │ AOT's PGO+BOLT (chapter 03.05) — but automatic and continuous.         │
   └────────────────────────────────────────────────────────────────────────┘
</code></pre>
<p>The mechanism in ORC: compile a baseline version, install counting/profiling, and when a
threshold trips, <strong>re-materialize</strong> the function at a higher optimization level and <strong>hot-swap
the pointer</strong> (via the same indirection used for lazy stubs).</p>
<pre><code>   fib_ptr ──▶ baseline fib (tier 1)     [call counter ticks]
                    │ counter &gt; threshold
                    ▼  background thread compiles -O3 fib
   fib_ptr ──▶ optimized fib (tier 2)    [future calls go here]
   (the indirection slot makes the swap atomic &amp; transparent to callers)
</code></pre>
<hr />
<h2 id="4-speculative-optimization--deoptimization">4. Speculative optimization &amp; deoptimization</h2>
<p>The reason JITs can <em>beat</em> AOT: they bet on runtime observations and keep an escape hatch.</p>
<pre><code>   Observation: &quot;x has been an integer in 100% of 50,000 executions.&quot;
   Speculation: compile a fast path assuming x is an integer.
   Guard:       if (!is_int(x)) goto deopt;       ◀ cheap check
   Fast path:   &lt;optimized integer code, inlined, no boxing&gt;
   Deopt:       reconstruct interpreter state, fall back to generic code,
                maybe discard &amp; recompile without this assumption.
</code></pre>
<pre><code>   ┌─────────────────────────────────────────────────────────────────────────┐
   │ DEOPTIMIZATION = the ability to abandon optimized code mid-execution    │
   │ and resume in a safe, generic version, restoring the exact program      │
   │ state. It's what makes speculation SOUND: if the bet is wrong, you      │
   │ don't get wrong answers, you just get slower (this time).               │
   └─────────────────────────────────────────────────────────────────────────┘
</code></pre>
<p>LLVM support: <strong>stack maps</strong> and the <code>@llvm.experimental.stackmap</code> /
<code>@llvm.experimental.patchpoint</code> intrinsics let the JIT record where values live (registers,
stack slots) at guard points, so a deopt handler can reconstruct state. Patchpoints reserve
space to later overwrite a call site (e.g., to install a guard or swap a target).</p>
<pre><code>   patchpoint: emit a NOP sled of N bytes at a call site + a stackmap entry.
       │  later, the runtime can patch those bytes (e.g. redirect to deopt or
       │  to a newly-specialized callee) knowing the live-value locations.
       ▼  enables inline caches, guard insertion, on-stack replacement (OSR).
</code></pre>
<p>This is advanced and language-runtime-specific; LLVM provides the primitives, the runtime
provides the policy.</p>
<hr />
<h2 id="5-on-stack-replacement-osr">5. On-Stack Replacement (OSR)</h2>
<p>A special, important case: a function is running a long loop in tier-1 code when it gets hot.
You can&rsquo;t wait for it to return to swap in optimized code — so you replace it <strong>while it&rsquo;s on
the stack, mid-loop</strong>.</p>
<pre><code>   tier-1 frame running:  for (i=0; i&lt;1e9; i++) { ...hot... }   ◀ stuck here, hot
        │  OSR: at a loop back-edge safepoint,
        │  capture live state (i, accumulators) via stackmap,
        │  build/enter the optimized version SEEDED with that state,
        ▼  continue the loop in tier-2 code from iteration i
   tier-2 frame running:  ...optimized loop continues from i...
</code></pre>
<p>OSR is why a JIT can speed up a long-running loop that was entered before it was known to be
hot. It relies on the same stackmap machinery as deopt.</p>
<hr />
<h2 id="6-remote--out-of-process-jit-orc-tpc--orc-rt">6. Remote / out-of-process JIT (ORC TPC &amp; ORC-RT)</h2>
<p>From chapter 04.02 §5: ORC can compile in one process and execute in another via
<code>ExecutorProcessControl</code> and the ORC runtime (<code>orc-rt</code>).</p>
<pre><code>   ┌──────────────── controller process ──────────────────┐   ┌──── executor ────┐
   │ frontend → IR → optimize → compile (TargetMachine    │   │ receives objects │
   │ for the EXECUTOR's triple) → object bytes            │──▶│ allocates memory │
   │ ExecutionSession drives lookup via EPC over a channel│   │ links, relocates │
   │ (pipe/socket/shared mem)                             │◀──│ runs the code    │
   └──────────────────────────────────────────────────────┘   └──────────────────┘
</code></pre>
<pre><code>   Use cases:
     • SECURITY: JIT'd (possibly untrusted) code runs sandboxed; a crash or
       exploit can't corrupt the compiler/host.
     • CROSS-TARGET: compile on a beefy x86 host, execute on a tiny ARM board.
     • RESOURCE ISOLATION: separate the compiler's memory from the program's.
   EPC abstracts memory allocation, symbol lookup, and &quot;run this&quot; across the
   boundary so your JIT code looks almost identical to the in-process case.
</code></pre>
<hr />
<h2 id="7-choosing-a-jit-design">7. Choosing a JIT design</h2>
<pre><code>  ┌─────────────────────────────────────────┬────────────────────────────────────┐
  │ Need                                    │ Design                             │
  ├─────────────────────────────────────────┼────────────────────────────────────┤
  │ Embed codegen, run a few functions      │ LLJIT, eager, -O2                  │
  │ REPL / eval / scripting                 │ LLJIT + ResourceTrackers           │
  │ Large program, fast startup             │ LLLazyJIT (lazy per-function)      │
  │ Long-running server, max steady-state   │ tiered: baseline + background -O3  │
  │ Dynamic language (types observed)       │ speculation + deopt + stackmaps    │
  │ Long hot loops entered &quot;cold&quot;           │ + OSR                              │
  │ Untrusted code / cross-target           │ out-of-process (EPC + orc-rt)      │
  └─────────────────────────────────────────┴────────────────────────────────────┘
</code></pre>
<pre><code>   The progression of this chapter mirrors how real JITs evolved:
     eager  →  lazy  →  tiered  →  speculative+deopt  →  OSR  →  remote
   Each step trades simplicity for either lower latency or higher peak speed.
   You rarely need them all; pick the smallest design that meets your goal.
</code></pre>
<hr />
<h2 id="8-the-grand-comparison-aot-vs-jit-settled">8. The grand comparison: AOT vs JIT, settled</h2>
<pre><code>  ┌────────────────────┬───────────────────────────┬───────────────────────────┐
  │ Dimension          │ AOT (sections 03)         │ JIT (sections 04)         │
  ├────────────────────┼───────────────────────────┼───────────────────────────┤
  │ When compiled      │ before run, offline       │ during run, in-process    │
  │ Startup            │ instant                   │ warmup cost               │
  │ Peak performance   │ high (static info only)   │ potentially higher        │
  │                    │                           │ (runtime info, specialize)│
  │ Uses profiles via  │ PGO/AutoFDO + BOLT (man.) │ tiering + deopt (auto)    │
  │ Ships              │ native binary             │ source/IR + a compiler    │
  │ Memory at runtime  │ just the program          │ program + compiler        │
  │ Layout tuning      │ BOLT/Propeller post-link  │ continuous re-layout      │
  │ Restricted envs    │ works (no runtime codegen)│ may be forbidden (W^X)    │
  │ Reuses LLVM        │ optimizer + backend       │ SAME optimizer + backend  │
  │                    │ + write .o + link         │ + ORC in-memory link      │
  └────────────────────┴───────────────────────────┴───────────────────────────┘
</code></pre>
<p>The deepest point of this whole guide:</p>
<pre><code>   ┌─────────────────────────────────────────────────────────────────────────┐
   │ AOT and JIT are the SAME compiler with the delivery step swapped. You   │
   │ build ONE frontend, reuse ONE optimizer and ONE backend, and choose at  │
   │ the end whether the bytes go to a FILE (AOT) or to MEMORY you call into │
   │ (JIT). Everything else — tiering, BOLT, deopt — is policy on top.       │
   └─────────────────────────────────────────────────────────────────────────┘
</code></pre>
<hr />

<blockquote>
<p>MLIR (Multi-Level Intermediate Representation) is the most important compiler infrastructure
idea since LLVM IR itself. It generalizes LLVM&rsquo;s &ldquo;one IR in the middle&rdquo; into &ldquo;<strong>many IRs at
many abstraction levels, in one framework</strong>.&rdquo; This chapter builds the mental model before we
touch any code.</p>
</blockquote>
<hr />
<h2 id="1-the-problem-mlir-solves">1. The problem MLIR solves</h2>
<p>LLVM IR is wonderful, but it lives at <em>one</em> level: low, scalar, RISC-like, C-ish. That&rsquo;s too
low for many domains. Consider machine learning: you have tensors, convolutions, and loop
nests. If your only IR is LLVM IR, you must drop <em>all</em> that structure immediately:</p>
<pre><code>   The &quot;abstraction gap&quot; without MLIR:
   ───────────────────────────────────────────────────────────────────
   matmul(A, B)              ← your domain concept (a single tensor op)
        │
        │  ONE GIANT LEAP straight to...
        ▼
   for i: for j: for k:      ← scalar loops over individual f32 loads/stores
     C[i][j] += A[i][k]*B[k][j]
        │
        ▼
   LLVM IR: load/fmul/fadd/store, br, phi ...

   Problem: once you've lowered to loops/LLVM IR, the optimizer can no longer
   reason &quot;this is a matmul&quot; — it can't fuse two matmuls, tile for cache,
   pick a library kernel, or map to a TPU. The high-level INTENT is gone.
</code></pre>
<p>Every domain (ML, HPC, hardware design, databases, GPUs) hit the same wall and each built its
<em>own</em> ad-hoc IR and infrastructure (TensorFlow had one, XLA another, etc.) — duplicating
parsers, pass managers, SSA, location tracking, verification. MLIR&rsquo;s pitch:</p>
<pre><code>   ┌─────────────────────────────────────────────────────────────────────────┐
   │ Provide ONE infrastructure for building MANY IRs (&quot;dialects&quot;) at ANY    │
   │ abstraction level, all sharing SSA, regions, the pass manager, the      │
   │ printer/parser, verification, and lowering machinery. Then optimize     │
   │ at the RIGHT level and lower PROGRESSIVELY toward LLVM IR.              │
   └─────────────────────────────────────────────────────────────────────────┘
</code></pre>
<hr />
<h2 id="2-multi-level-optimize-where-its-natural-lower-gradually">2. &ldquo;Multi-level&rdquo;: optimize where it&rsquo;s natural, lower gradually</h2>
<p>Instead of one big leap, MLIR inserts a <em>staircase</em> of dialects. Each step is a small,
verifiable lowering, and at each level the natural optimizations are easy.</p>
<pre><code>   abstraction
     high │  tf / tosa / linalg     &quot;matmul&quot;, &quot;conv2d&quot;  ← fuse ops, pick algorithms
          │      │  lower
          │  linalg on tensors      generic loops over tensors ← tiling, fusion
          │      │  lower
          │  affine / scf + memref  explicit loop nests + memory ← loop opts, vectorize
          │      │  lower
          │  arith / vector / cf    scalar &amp; SIMD ops, branches ← classic scalar opts
          │      │  lower
     low  │  llvm dialect           1:1 with LLVM IR ← hand off to LLVM backend
          │      │  translate
          ▼  LLVM IR ──▶ AOT or JIT (sections 03 / 04!)
</code></pre>
<pre><code>   ┌─────────────────────────────────────────────────────────────────────────┐
   │ &quot;Progressive lowering&quot;: each step lowers ONE level, preserving as much  │
   │ structure as possible for as long as useful. High-level dialects keep   │
   │ domain info for domain optimizations; only near the bottom do you       │
   │ become scalar LLVM IR. Compare ch.00.02's abstraction-level diagram —   │
   │ MLIR fills in the missing middle rungs.                                 │
   └─────────────────────────────────────────────────────────────────────────┘
</code></pre>
<p>And the bottom of the staircase is the <strong>LLVM dialect</strong>, which maps 1:1 to LLVM IR — so
<strong>MLIR ultimately feeds the AOT and JIT pipelines you already built.</strong> MLIR is not a
replacement for LLVM; it&rsquo;s a tower built <em>on top of and feeding into</em> LLVM.</p>
<hr />
<h2 id="3-the-structural-model-everything-is-an-operation">3. The structural model: everything is an Operation</h2>
<p>LLVM IR has a fixed set of instructions. MLIR has <em>no</em> fixed instructions — instead a single,
recursive, extensible concept: the <strong>Operation</strong>. Dialects define which operations exist.</p>
<pre><code>   An OPERATION (Op) is the universal unit. It has:
   ┌───────────────────────────────────────────────────────────────────────┐
   │  %res:2 = &quot;dialect.opname&quot;(%in1, %in2) {attr = 42} : (T1,T2)-&gt;(R1,R2) │
   │   ─────    ──────────────  ───────────  ─────────    ───────────────  │
   │  RESULTS   OP NAME         OPERANDS     ATTRIBUTES    TYPE SIGNATURE  │
   │  (SSA      (dialect-       (SSA values   (compile-     (types of      │
   │   values)   qualified)      it consumes)  time consts)  operands/res) │
   │                                                                       │
   │  ... and optionally REGIONS (nested blocks of ops) ──────────────┐    │
   └──────────────────────────────────────────────────────────────────┼────┘
                                                                      ▼
                                              this is what makes MLIR &quot;nested&quot;
</code></pre>
<p>The five anatomy parts, each important:</p>
<pre><code>  ┌─────────────┬─────────────────────────────────────────────────────────────┐
  │ Results     │ zero or more SSA values the op defines (like LLVM).         │
  │ Operands    │ zero or more SSA values it uses (like LLVM).                │
  │ Attributes  │ COMPILE-TIME constant data (the int 42, a string, an array  │
  │             │ shape). Not SSA values — they're metadata on the op.        │
  │ Types       │ every value is typed; types are also dialect-extensible.    │
  │ Regions     │ THE KEY NEW THING: an op can CONTAIN nested blocks of ops.  │
  │             │ A function body, a loop body, an if-then are regions.       │
  └─────────────┴─────────────────────────────────────────────────────────────┘
</code></pre>
<hr />
<h2 id="4-regions-and-blocks--nested-ssa">4. Regions and blocks — nested SSA</h2>
<p>This is the biggest departure from LLVM IR. In LLVM, a function is a flat list of basic
blocks. In MLIR, an op can hold <strong>regions</strong>, each region holds <strong>blocks</strong>, each block holds
<strong>ops</strong> — recursively.</p>
<pre><code>   Operation
     └── Region(s)            an op may have 0, 1, or many regions
           └── Block(s)       a region is a list of blocks (a CFG, like LLVM)
                 └── Operation(s)   a block is a list of ops...
                       └── Region(s)   ...which may themselves have regions!
</code></pre>
<pre><code>   Example: an \`scf.for\` loop op CONTAINS a region (its body):

   %sum = scf.for %i = %c0 to %n step %c1 iter_args(%acc = %init) -&gt; f32 {
            ^bb0(%i: index, %acc: f32):          ◀── a BLOCK inside the region
              %v   = memref.load %A[%i] : memref&lt;?xf32&gt;
              %new = arith.addf %acc, %v : f32
              scf.yield %new : f32               ◀── region terminator
          }
   └──────── the loop body is a nested region, not separate basic blocks ───┘
</code></pre>
<pre><code>   ┌─────────────────────────────────────────────────────────────────────────┐
   │ Why nesting matters: it lets high-level ops (loops, conditionals,       │
   │ functions, modules, even whole device kernels) keep their STRUCTURE in  │
   │ the IR. A loop is literally one op with a body region — so a pass can   │
   │ reason about &quot;the loop&quot; as a unit, tile it, fuse it, without first      │
   │ recovering it from a flat CFG (which LLVM passes must do).              │
   └─────────────────────────────────────────────────────────────────────────┘
</code></pre>
<p>Block arguments replace PHIs: instead of <code>phi</code>, a block declares <strong>arguments</strong>, and branches
pass values to them. Same SSA semantics, cleaner model:</p>
<pre><code>   LLVM:   %x = phi [a, %bb1], [b, %bb2]
   MLIR:   ^bb3(%x: i32):   ...        ; bb3 takes an argument
           // predecessors: cf.br ^bb3(%a) and cf.br ^bb3(%b)
</code></pre>
<hr />
<h2 id="5-dialects--namespaced-sets-of-opstypesattributes">5. Dialects — namespaced sets of ops/types/attributes</h2>
<p>A <strong>dialect</strong> is a self-contained extension: a namespace bundling related operations, types,
and attributes. Dialects are how MLIR is &ldquo;many IRs.&rdquo;</p>
<pre><code>   dialect &quot;arith&quot;:   arith.addi, arith.mulf, arith.cmpi, ...      (scalar math)
   dialect &quot;scf&quot;:     scf.for, scf.if, scf.while, scf.yield        (structured control flow)
   dialect &quot;func&quot;:    func.func, func.call, func.return            (functions)
   dialect &quot;memref&quot;:  memref.alloc, memref.load, memref.store      (buffers)
   dialect &quot;linalg&quot;:  linalg.matmul, linalg.generic                (tensor algebra)
   dialect &quot;llvm&quot;:    llvm.add, llvm.call, llvm.br, ...             (mirrors LLVM IR)
   dialect &quot;gpu&quot;,&quot;spirv&quot;,&quot;vector&quot;,&quot;tensor&quot;,&quot;tosa&quot;,&quot;affine&quot;, ...    (many more)
</code></pre>
<pre><code>   ┌─────────────────────────────────────────────────────────────────────────┐
   │ Crucial property: dialects COEXIST in one module. A function can hold   │
   │ scf + arith + memref ops side by side. Lowering replaces ops of one     │
   │ dialect with ops of a lower one, gradually, until only \`llvm\` remains.  │
   │ You can also define YOUR OWN dialect for your language/domain (ch.05.04)│
   └─────────────────────────────────────────────────────────────────────────┘
</code></pre>
<hr />
<h2 id="6-what-mlir-gives-you-for-free">6. What MLIR gives you for free</h2>
<p>Define a dialect and you immediately inherit the entire shared infrastructure — the thing
each domain used to rebuild:</p>
<pre><code>  ┌──────────────────────────────────────────────────────────────────────────┐
  │ • Textual parser &amp; printer (round-trippable .mlir for every dialect).    │
  │ • SSA, dominance, the use-def graph, value/type system.                  │
  │ • A pass manager (analogous to LLVM's, ch.02) that runs on any op.       │
  │ • A generic, declarative rewrite/pattern engine for transforms &amp; lowering│
  │ • Verification: each op declares invariants; the verifier enforces them. │
  │ • Source location tracking threaded through everything.                  │
  │ • Interfaces &amp; traits for writing generic passes across dialects.        │
  │ • TableGen (ODS) to declare ops concisely instead of hand-writing C++.   │
  └──────────────────────────────────────────────────────────────────────────┘
</code></pre>
<p>This is the real payoff: a new domain IR costs you <em>op definitions and lowerings</em>, not a
whole compiler framework.</p>
<hr />
<h2 id="7-where-mlir-sits-relative-to-aotjit-the-connection">7. Where MLIR sits relative to AOT/JIT (the connection)</h2>
<p>MLIR does not replace sections 03/04 — it <strong>feeds</strong> them. The bottom of every MLIR pipeline
is &ldquo;lower to the <code>llvm</code> dialect, translate to LLVM IR, then do exactly what you already know.&rdquo;</p>
<pre><code>   your language / domain

        ├─▶ AOT: TargetMachine → .o → link  (sections 03)              │
        └─▶ JIT: ORC → memory → call        (sections 04)              │
                                          MLIR has its own JIT wrapper
                                          (mlir::ExecutionEngine) that

</code></pre>
<pre><code>   ┌─────────────────────────────────────────────────────────────────────────┐
   │ Mental model: MLIR is the MISSING UPPER FLOORS of the compiler tower.   │
   │ You climb DOWN through dialects to LLVM IR, then the elevator you built │
   │ in sections 03/04 takes you to native code. Same destination, more      │
   │ floors with better tooling on the way down.                             │
   └─────────────────────────────────────────────────────────────────────────┘
</code></pre>

<h2 id="1-reading-mlirs-generic-and-custom-syntax">1. Reading MLIR&rsquo;s generic and custom syntax</h2>
<p>Every op has a <strong>generic form</strong> (always valid, fully explicit) and usually a <strong>custom form</strong>

custom syntax confuses you.</p>
<pre><code>   GENERIC form (works for ANY op):

<p>A full module, top to bottom:</p>
<pre><code class="language-mlir">module {
  func.func @sum(%a: f32, %b: f32) -&gt; f32 {
    %0 = arith.addf %a, %b : f32
    func.return %0 : f32
  }

</code></pre>
<pre><code>   module               ── a container op (has one region)
     func.func @sum     ── a function op (has a body region + a type)
       arith.addf       ── an op from the arith dialect, results %0
       func.return      ── the region's terminator
</code></pre>
<p>Notice: <code>module</code>, <code>func.func</code>, even functions are <em>operations</em>. It&rsquo;s ops all the way down

<hr />
<h2 id="2-the-built-in-dialects-you-will-actually-use">2. The built-in dialects you will actually use</h2>
<p>You rarely invent everything; you compose existing dialects. The ones to know:</p>
<pre><code>  ┌───────────┬─────────────────────────────────────────────────────────────┐
  │ builtin   │ the always-present types/attrs: integers, floats, index,    │
  │           │ tensor&lt;&gt;, vector&lt;&gt;, the \`module\` op, function types.        │
  ├───────────┼─────────────────────────────────────────────────────────────┤
  │ func      │ func.func (definitions), func.call, func.return.            │
  ├───────────┼─────────────────────────────────────────────────────────────┤
  │ arith     │ scalar arithmetic: addi/addf/muli/mulf/cmpi/cmpf/constant.  │
  ├───────────┼─────────────────────────────────────────────────────────────┤
  │ scf       │ structured control flow: scf.for, scf.if, scf.while,        │
  │           │ scf.yield. Loops/ifs as ops-with-regions (NOT raw branches).│
  ├───────────┼─────────────────────────────────────────────────────────────┤
  │ cf        │ unstructured control flow: cf.br, cf.cond_br (raw CFG, the  │
  │           │ level just above LLVM's branches).                          │
  ├───────────┼─────────────────────────────────────────────────────────────┤
  │ memref    │ buffers/memory: memref.alloc, .load, .store, .dealloc.      │
  │           │ A memref is &quot;a pointer + shape + strides&quot; — addressable mem.│
  ├───────────┼─────────────────────────────────────────────────────────────┤
  │ tensor    │ immutable n-d values (SSA tensors); no memory location yet. │
  ├───────────┼─────────────────────────────────────────────────────────────┤
  │ vector    │ SIMD: vector&lt;8xf32&gt;, vector.contract, transfer_read/write.  │
  ├───────────┼─────────────────────────────────────────────────────────────┤
  │ affine    │ loops/accesses with affine-map constraints→ strong loop opts│
  ├───────────┼─────────────────────────────────────────────────────────────┤
  │ linalg    │ structured tensor/buffer ops: linalg.matmul, linalg.generic.│
  ├───────────┼─────────────────────────────────────────────────────────────┤
  │ llvm      │ mirrors LLVM IR; the bottom rung before translation.        │
  ├───────────┼─────────────────────────────────────────────────────────────┤
  │ gpu/spirv │ GPU kernels &amp; SPIR-V; nvvm/rocdl for vendor intrinsics.     │
  └───────────┴─────────────────────────────────────────────────────────────┘
</code></pre>
<p>A taste of <code>scf</code> + <code>arith</code> + <code>memref</code> working together (a sum-reduction):</p>
<pre><code class="language-mlir">func.func @reduce(%A: memref&lt;?xf32&gt;, %n: index) -&gt; f32 {
  %c0 = arith.constant 0 : index
  %c1 = arith.constant 1 : index
  %init = arith.constant 0.0 : f32
  %sum = scf.for %i = %c0 to %n step %c1 iter_args(%acc = %init) -&gt; f32 {
    %v = memref.load %A[%i] : memref&lt;?xf32&gt;
    %new = arith.addf %acc, %v : f32
    scf.yield %new : f32
  }
  func.return %sum : f32

</code></pre>
<pre><code>   Note how scf.for carries loop state via iter_args / yield (SSA loop-carried
   values — the MLIR analog of loop PHIs from ch.02.01's makeSumTo). The loop
   body is a REGION; the whole loop is ONE op a pass can manipulate as a unit.
</code></pre>
<hr />
<h2 id="3-the-type-system">3. The type system</h2>
<p>Types are dialect-extensible, but a rich set is built in:</p>
<pre><code>   SCALAR:   i1 i8 i32 i64 (signless, like LLVM)   index (target-width int for
                                                    loop bounds/indices)
             f16 bf16 f32 f64
   SHAPED:   tensor&lt;4x8xf32&gt;     ranked tensor (value semantics, immutable)
             tensor&lt;?x?xf32&gt;     dynamic dims with '?'
             tensor&lt;*xf32&gt;       unranked
             vector&lt;8xf32&gt;       SIMD vector (fixed length)
             memref&lt;4x8xf32&gt;     buffer in memory (reference semantics)
             memref&lt;?xf32, strided&lt;...&gt;&gt;   with layout/strides/address space
   FUNCTION: (f32, f32) -&gt; f32
   plus dialect-defined types (e.g. !llvm.ptr, !llvm.struct&lt;...&gt;, your own !toy.struct)
</code></pre>
<pre><code>   tensor vs memref — a critical distinction:
   ┌──────────────────────────────────────────────────────────────────────────┐
   │ tensor&lt;...&gt;  : an SSA VALUE. Immutable, no address. &quot;the data.&quot;          │
   │ memref&lt;...&gt;  : a BUFFER reference. Has a location, you load/store to it. │
   │ &quot;Bufferization&quot; is the lowering that turns tensors (values) into memrefs │
   │ (memory) — a key step toward LLVM, which only knows memory &amp; pointers.   │
   └──────────────────────────────────────────────────────────────────────────┘
</code></pre>
<p>Custom types are spelled with a leading <code>!</code>: <code>!llvm.ptr</code>, <code>!toy.matrix&lt;2x3xf64&gt;</code>.</p>
<hr />
<h2 id="4-attributes--compile-time-constant-data">4. Attributes — compile-time constant data</h2>
<p>Attributes are the op&rsquo;s <em>static</em> metadata (chapter 05.01 §3): not SSA values, but constants
baked into the op.</p>
<pre><code>   %c = arith.constant 42 : i32
                       ──
                       this 42 is an ATTRIBUTE (IntegerAttr), not an operand.

   linalg ops carry indexing_maps, iterator_types as ARRAY/AFFINE-MAP attributes.
   func.func carries its name (@sum) and function type as attributes.
</code></pre>
<pre><code>   Common attribute kinds:
     IntegerAttr, FloatAttr            42, 3.14
     StringAttr                        &quot;hello&quot;
     ArrayAttr                         [1, 2, 3]
     DictionaryAttr                    {fastmath = ..., name = ...}
     TypeAttr                          a type used as data
     AffineMapAttr                     (d0,d1)-&gt;(d1,d0)  (a transpose map)
     DenseElementsAttr                 a whole constant tensor's contents
   Spelled with a leading '#' for custom: #toy.fancy&lt;...&gt;
</code></pre>
<p>Attributes are <em>uniqued</em> (interned) in the <code>MLIRContext</code>, like LLVM constants.</p>
<hr />
<h2 id="5-traits--declarative-op-properties">5. Traits — declarative op properties</h2>
<p>A <strong>trait</strong> is a reusable property you attach to an op; the framework and passes then treat
the op generically. Traits encode invariants and enable optimizations without per-op code.</p>
<pre><code>  ┌──────────────────────────┬──────────────────────────────────────────────────┐
  │ Pure / NoMemoryEffect    │ op has no side effects → dead-code elimination,  │
  │ (MemoryEffectsTrait)     │ CSE, hoisting all work automatically.            │
  │ Commutative              │ a+b == b+a → canonicalization can reorder.       │
  │ SameOperandsAndResultType│ verifier checks all operands/results share type. │
  │ Terminator               │ op must end a block (like LLVM terminators).     │
  │ SingleBlock /            │ region-structure constraints on container ops.   │
  │ SingleBlockImplicitTerm. │                                                  │
  │ IsolatedFromAbove        │ region can't reference SSA values from outside   │
  │                          │ (e.g. func bodies) → enables parallel passes.    │
  └──────────────────────────┴──────────────────────────────────────────────────┘
</code></pre>
<pre><code>   Why traits matter: a single generic pass like CSE or DCE works on YOUR
   custom op for free IF your op declares the right traits (e.g. Pure). You
   don't write op-specific optimization code — you DECLARE properties and
   inherit the optimizations. This is MLIR's &quot;generic transforms&quot; superpower.
</code></pre>
<hr />
<h2 id="6-interfaces--generic-behavior-across-dialects">6. Interfaces — generic behavior across dialects</h2>
<p>Where traits are static flags, <strong>interfaces</strong> are like C++ virtual methods an op implements,
letting a pass call into ops it doesn&rsquo;t know about.</p>
<pre><code>   A pass wants to &quot;lower any op to LLVM&quot; but can't know every op. Solution:
   ops implement an INTERFACE; the pass calls the interface method.

   Examples:
     LoopLikeOpInterface     &quot;what's your induction var / bounds?&quot; → LICM works
                              on scf.for, affine.for, your custom loop, uniformly.
     MemoryEffectOpInterface  &quot;what memory do you read/write?&quot; → alias/DCE.
     CallOpInterface          &quot;who do you call?&quot; → inlining, call graph.
     LLVMTranslationInterface &quot;translate yourself to LLVM IR.&quot;
</code></pre>
<pre><code>   ┌─────────────────────────────────────────────────────────────────────────┐
   │ Traits   = declarative PROPERTIES (compile-time flags) → free generic   │
   │            transforms (DCE, CSE, canonicalization).                     │
   │ Interfaces = behavioral CONTRACTS (methods) → passes operate on unknown │
   │            ops by asking them questions. Together they're how ONE pass  │
   │            serves MANY dialects without knowing them in advance.        │
   └─────────────────────────────────────────────────────────────────────────┘
</code></pre>
<hr />
<h2 id="7-the-mlircontext-ops-and-the-c-object-model">7. The MLIRContext, ops, and the C++ object model</h2>
<p>Just as LLVM has <code>LLVMContext</code>/<code>Module</code>/<code>Instruction</code>, MLIR has:</p>
<pre><code>   MLIRContext      owns dialects, uniqued types &amp; attributes (like LLVMContext)
   ModuleOp         the top-level container (an op with one region)
   Operation*       the generic op object; everything is one
   OpBuilder        the builder/cursor (MLIR's IRBuilder analog) for creating ops
   Value            an SSA value (an op result or block argument)
   Type / Attribute uniqued, immutable, value-typed handles
   Block / Region   the nesting structure
</code></pre>
<p>Creating IR in C++ (the analog of chapter 01.03&rsquo;s codegen, but for MLIR):</p>

#include &quot;mlir/IR/BuiltinOps.h&quot;

using namespace mlir;

MLIRContext ctx;
ctx.loadDialect&lt;func::FuncDialect, arith::ArithDialect&gt;();
OpBuilder b(&amp;ctx);

auto loc = b.getUnknownLoc();

auto fnType = b.getFunctionType({f32, f32}, {f32});
auto module = ModuleOp::create(loc);
b.setInsertionPointToEnd(module.getBody());

auto fn = b.create&lt;func::FuncOp&gt;(loc, &quot;add&quot;, fnType);

<blockquote>
<p>The whole point of MLIR is to <em>transform</em> and <em>progressively lower</em> IR. This chapter covers
the rewrite engine (pattern-based transformation), canonicalization, and the <strong>dialect
conversion</strong> framework — the machinery that turns high-level dialects into LLVM-dialect IR
step by step, with <em>legality</em> tracking so you can&rsquo;t accidentally stop halfway.</p>
</blockquote>
<hr />
<h2 id="1-two-kinds-of-transformation">1. Two kinds of transformation</h2>
<pre><code>  ┌──────────────────────────────────────────────────────────────────────────┐
  │ (A) WITHIN-dialect rewrites: simplify/canonicalize ops, fuse, fold.      │
  │     &quot;x + 0 → x&quot;, &quot;fuse two linalg.generic into one&quot;. Optional, optimize. │
  ├──────────────────────────────────────────────────────────────────────────┤
  │ (B) CROSS-dialect CONVERSION (lowering): replace ops of dialect X with   │
  │     ops of a lower dialect Y, until target dialect is reached. This is   │
  │     the staircase from ch.05.01. Has LEGALITY rules to ensure completion.│
  └──────────────────────────────────────────────────────────────────────────┘
</code></pre>
<p>Both are expressed with <strong>rewrite patterns</strong>, but conversion adds a <em>target legality</em> concept
that drives lowering to a fixed point.</p>
<hr />
<h2 id="2-rewrite-patterns--the-unit-of-transformation">2. Rewrite patterns — the unit of transformation</h2>
<p>A pattern matches some op(s) and replaces them with others. The base mechanism:</p>
<pre><code class="language-cpp">#include &quot;mlir/IR/PatternMatch.h&quot;
using namespace mlir;

// Rewrite: arith.addf %x, 0.0  -&gt;  %x   (additive identity)
struct AddZeroFold : public OpRewritePattern&lt;arith::AddFOp&gt; {
  using OpRewritePattern::OpRewritePattern;

  LogicalResult matchAndRewrite(arith::AddFOp op,
                                PatternRewriter &amp;rewriter) const override {
    // Is the RHS a constant 0.0?
    auto cst = op.getRhs().getDefiningOp&lt;arith::ConstantOp&gt;();
    if (!cst) return failure();
    auto fattr = dyn_cast&lt;FloatAttr&gt;(cst.getValue());
    if (!fattr || !fattr.getValue().isZero()) return failure();

    rewriter.replaceOp(op, op.getLhs());   // replace the addf with its LHS
    return success();
  }
};
</code></pre>
<pre><code>   matchAndRewrite contract:
     return failure()  → &quot;this pattern doesn't apply here&quot; (try others)
     return success()  → &quot;I matched and rewrote&quot; (via the rewriter)
   ALWAYS mutate IR through the PatternRewriter (replaceOp, eraseOp,
   create&lt;...&gt;, replaceAllUsesWith) — NEVER edit ops directly during a
   rewrite, or the driver's bookkeeping (worklist, undo) breaks.
</code></pre>
<pre><code>   The rewrite DRIVER applies patterns repeatedly to a fixed point:
     worklist ← all ops
     while worklist not empty:
        op ← pop; try each applicable pattern;
        if one succeeds, push affected/neighbor ops back (they may now match)
     stop when no pattern applies anywhere.
</code></pre>
<p>You collect patterns into a set and run them:</p>
<pre><code class="language-cpp">RewritePatternSet patterns(&amp;ctx);
patterns.add&lt;AddZeroFold&gt;(&amp;ctx);
// optionally also: dialect/op canonicalization patterns
(void)applyPatternsAndFoldGreedily(module, std::move(patterns));
</code></pre>
<hr />
<h2 id="3-canonicalization-and-folding">3. Canonicalization and folding</h2>
<p>MLIR builds two simplification mechanisms into ops themselves:</p>
<pre><code>   • FOLD: an op can implement \`fold()\` to compute a constant result or return
     an existing value, with NO new ops. e.g. arith.addi %x, 0 folds to %x.
   • CANONICALIZE: ops register canonicalization PATTERNS to put themselves
     in a normal form (e.g. move constants to the right, collapse chains).

   The \`-canonicalize\` pass runs all ops' folders + canonicalization patterns.
</code></pre>
<pre><code>   ┌──────────────────────────────────────────────────────────────────────────┐
   │ Declaring \`hasCanonicalizer\`/\`hasFolder\` on your op (ch.05.04) means     │
   │ the standard -canonicalize and -cse passes improve YOUR dialect for      │
   │ free — the same &quot;declare properties, inherit transforms&quot; theme as traits.│
   └──────────────────────────────────────────────────────────────────────────┘
</code></pre>
<p>CLI to apply:</p>
<pre><code class="language-bash">&gt;&gt;&gt; mlir-opt input.mlir -canonicalize -cse -o out.mlir
</code></pre>
<hr />
<h2 id="4-dialect-conversion--the-lowering-framework">4. Dialect Conversion — the lowering framework</h2>
<p>Lowering needs more than &ldquo;apply patterns until stuck.&rdquo; It needs a notion of <strong>what&rsquo;s
allowed in the output</strong> so the process drives toward a target and <em>fails loudly</em> if it can&rsquo;t
get there. That&rsquo;s the <strong>DialectConversion</strong> framework, built on three pieces:</p>
<pre><code>   ┌──────────────────────┬─────────────────────────────────────────────────────┐
   │ ConversionTarget     │ declares which ops/dialects are LEGAL (allowed to   │
   │                      │ remain) vs ILLEGAL (must be converted away).        │
   ├──────────────────────┼─────────────────────────────────────────────────────┤
   │ ConversionPatterns   │ how to rewrite illegal ops into legal ones          │
   │ (OpConversionPattern)│ (like rewrite patterns, but type-aware).            │
   ├──────────────────────┼─────────────────────────────────────────────────────┤
   │ TypeConverter        │ how to convert TYPES (e.g. memref&lt;?xf32&gt; → an       │
   │                      │ llvm.struct describing ptr+sizes+strides).          │
   └──────────────────────┴─────────────────────────────────────────────────────┘
</code></pre>
<pre><code>   The conversion driver's job:
     &quot;Make every op legal. For each illegal op, find a conversion pattern that
      rewrites it (converting operand/result TYPES via the TypeConverter).
      Repeat until ALL ops are legal. If some illegal op has no pattern →
      ERROR (conversion failed) — you can't silently end up half-lowered.&quot;
</code></pre>
<h3 id="two-conversion-modes">Two conversion modes</h3>
<pre><code>   PARTIAL conversion (applyPartialConversion):

     where another pass finishes the job.

     EVERY op must end up legal, or the whole conversion fails. Used for the
     final &quot;everything must be llvm dialect now&quot; step.
</code></pre>

#include &quot;mlir/Transforms/DialectConversion.h&quot;
using namespace mlir;

ConversionTarget target(ctx);
target.addLegalDialect&lt;LLVM::LLVMDialect&gt;();   // llvm ops are the goal: legal
target.addIllegalDialect&lt;arith::ArithDialect, // these MUST be converted away

                         scf::SCFDialect&gt;();

LLVMTypeConverter typeConverter(&amp;ctx);         // knows memref→struct, index→i64, ...

RewritePatternSet patterns(&amp;ctx);
// populate with the standard lowering patterns for each dialect:
arith::populateArithToLLVMConversionPatterns(typeConverter, patterns);
populateFuncToLLVMConversionPatterns(typeConverter, patterns);
populateSCFToControlFlowConversionPatterns(patterns);          // scf → cf first
cf::populateControlFlowToLLVMConversionPatterns(typeConverter, patterns);

</code></pre>
<pre><code>   ┌──────────────────────────────────────────────────────────────────────────┐

   └──────────────────────────────────────────────────────────────────────────┘
</code></pre>

<h2 id="5-a-worked-progressive-lowering-pipeline">5. A worked progressive-lowering pipeline</h2>
<p>Lowering a typical <code>scf + arith + memref</code> module to the LLVM dialect is done as a <em>sequence</em>
of conversion passes, each closing one abstraction gap:</p>
<pre><code>   Linalg/Tensor (high)
      │ -linalg-bufferize / -one-shot-bufferize   tensors → memrefs
      ▼

      │ -convert-linalg-to-loops (if any)         structured → scf loops
      │ -convert-scf-to-cf                          scf.for/if → cf.br/cond_br
      ▼
   cf + arith + memref
      │ -convert-arith-to-llvm                      scalar math → llvm dialect
      │ -finalize-memref-to-llvm                    memref → llvm ptr/struct
      │ -convert-func-to-llvm                        func → llvm.func
      │ -convert-cf-to-llvm                          branches → llvm.br
      ▼
   llvm dialect ONLY  ──▶ translate to LLVM IR (ch.05.05)
</code></pre>
<p>On the CLI (the exact recipe you&rsquo;ll actually run, order matters):</p>

      -convert-arith-to-llvm \\
      -convert-func-to-llvm \\

</code></pre>

<h2 id="6-type-conversion-in-depth-the-memref-example">6. Type conversion in depth (the memref example)</h2>
<p>LLVM has no notion of &ldquo;a 2-D buffer with strides.&rdquo; So the <code>TypeConverter</code> lowers a <code>memref</code>

                                            i64,        ; offset
                                            array&lt;2 x i64&gt;,  ; sizes [d0, d1]
                                            array&lt;2 x i64&gt;)&gt; ; strides
   (this layout is the &quot;MemRef descriptor&quot; — a runtime record of the buffer)
</code></pre>
<pre><code>   ┌──────────────────────────────────────────────────────────────────────────┐
   │ Lowering isn't just ops — it's TYPES too. A high-level type (memref,     │
   │ tensor, your custom type) becomes a low-level representation (struct of  │
   │ pointers/ints). The TypeConverter centralizes this so every conversion   │
   │ pattern agrees on the representation.                                    │
   └──────────────────────────────────────────────────────────────────────────┘
</code></pre>
<hr />
<h2 id="7-writing-a-lowering-as-a-pass">7. Writing a lowering as a Pass</h2>
<p>Conversions are packaged as passes so they slot into the MLIR PassManager (mirrors LLVM&rsquo;s
ch.02):</p>
<pre><code class="language-cpp">#include &quot;mlir/Pass/Pass.h&quot;
struct MyToLLVMPass : public PassWrapper&lt;MyToLLVMPass, OperationPass&lt;ModuleOp&gt;&gt; {
  void getDependentDialects(DialectRegistry &amp;reg) const override {
    reg.insert&lt;LLVM::LLVMDialect&gt;();           // we PRODUCE llvm dialect

  void runOnOperation() override {

    target.addLegalDialect&lt;LLVM::LLVMDialect&gt;();

<blockquote>
<p>To use MLIR for <em>your</em> language or domain, you define a dialect: your own ops, types, and
attributes. You <em>could</em> write these in C++ by hand, but MLIR provides <strong>ODS</strong> (Operation
Definition Specification) in <strong>TableGen</strong> — a declarative DSL that generates the C++ for you.
We build a small <code>toy</code> dialect end to end.</p>
</blockquote>
<hr />
<h2 id="1-why-tablegen--ods">1. Why TableGen / ODS</h2>
<p>Hand-writing an op in C++ means writing: a class, a builder, the verifier, the parser, the
printer, accessors, trait wiring — ~150 lines of boilerplate <em>per op</em>. ODS lets you <em>declare</em>
the op in ~10 lines; <code>mlir-tblgen</code> generates all that C++.</p>
<pre><code>   YOU WRITE (TableGen .td):                 mlir-tblgen GENERATES (C++ .h.inc/.cpp.inc):
   ──────────────────────────                ──────────────────────────────────────────
   def AddOp : Toy_Op&lt;&quot;add&quot;, [Pure]&gt; {       class AddOp : public Op&lt;AddOp, ...&gt; {
     let arguments = (ins F64Tensor:$lhs,       // accessors getLhs()/getRhs()
                          F64Tensor:$rhs);       // builders build(...)
     let results   = (outs F64Tensor:$res);      // verifier verifyInvariants()
   }                                            // parser/printer
                                              };  // trait wiring (Pure → DCE/CSE)
</code></pre>
<pre><code>   ┌─────────────────────────────────────────────────────────────────────────┐
   │ ODS is to MLIR ops what a schema is to a database: a single declarative │
   │ source of truth from which the framework generates correct, consistent  │
   │ C++. You edit the .td; the build regenerates the boilerplate.           │
   └─────────────────────────────────────────────────────────────────────────┘
</code></pre>
<hr />
<h2 id="2-declaring-the-dialect">2. Declaring the dialect</h2>
<p>First, the dialect itself — its namespace and a couple of registration knobs:</p>
<pre><code class="language-tablegen">// ToyDialect.td
include &quot;mlir/IR/OpBase.td&quot;
include &quot;mlir/Interfaces/SideEffectInterfaces.td&quot;

def Toy_Dialect : Dialect {
  let name = &quot;toy&quot;;                       // ops will be &quot;toy.add&quot;, etc.
  let cppNamespace = &quot;::toy&quot;;             // generated C++ lives in namespace toy
  let summary = &quot;A tiny tutorial dialect.&quot;;
  let useDefaultTypePrinterParser = 1;    // auto syntax for custom types
}

// A base class so every Toy op shares the dialect + the Op template.
class Toy_Op&lt;string mnemonic, list&lt;Trait&gt; traits = []&gt;
    : Op&lt;Toy_Dialect, mnemonic, traits&gt;;
</code></pre>
<pre><code>   Dialect.name = &quot;toy&quot;  →  every op is namespaced &quot;toy.&lt;mnemonic&gt;&quot; in the IR.
   cppNamespace          →  generated classes: ::toy::AddOp, ::toy::ConstantOp...
</code></pre>
<hr />
<h2 id="3-defining-operations">3. Defining operations</h2>
<p>A constant op (carries an attribute, produces a tensor) and an add op (two tensors → tensor):</p>
<pre><code class="language-tablegen">// ToyOps.td
include &quot;ToyDialect.td&quot;
include &quot;mlir/Interfaces/InferTypeOpInterface.td&quot;

// toy.constant: a tensor literal. Result computed from an attribute.
def ConstantOp : Toy_Op&lt;&quot;constant&quot;, [Pure]&gt; {
  let summary = &quot;constant tensor&quot;;
  let arguments = (ins F64ElementsAttr:$value);   // the constant data (attribute)
  let results   = (outs F64Tensor:$result);
  // Custom assembly: \`toy.constant dense&lt;...&gt; : tensor&lt;...&gt;\`
  let assemblyFormat = &quot;$value attr-dict \`:\` type($result)&quot;;
  let hasVerifier = 1;                            // we'll write a C++ verifier
}

// toy.add: elementwise add of two f64 tensors.
def AddOp : Toy_Op&lt;&quot;add&quot;, [Pure]&gt; {
  let summary = &quot;elementwise tensor add&quot;;
  let arguments = (ins F64Tensor:$lhs, F64Tensor:$rhs);
  let results   = (outs F64Tensor:$result);
  let assemblyFormat = &quot;$lhs \`,\` $rhs attr-dict \`:\` type($result)&quot;;
  // Convenience builder: result type inferred from lhs.
  let builders = [
    OpBuilder&lt;(ins &quot;mlir::Value&quot;:$lhs, &quot;mlir::Value&quot;:$rhs), [{
      build($_builder, $_state, lhs.getType(), lhs, rhs);
    }]&gt;
  ];
}

// toy.print: a side-effecting op (NOT Pure) — prints a tensor.
def PrintOp : Toy_Op&lt;&quot;print&quot;&gt; {
  let summary = &quot;print a tensor&quot;;
  let arguments = (ins F64Tensor:$input);
  let assemblyFormat = &quot;$input attr-dict \`:\` type($input)&quot;;
}
</code></pre>
<p>Each ODS field maps to a part of the op anatomy from chapter 05.01 §3:</p>
<pre><code>   arguments (ins ...)   → operands (Value) AND attributes (compile-time)
   results   (outs ...)  → result values
   traits [Pure, ...]    → declarative properties (free DCE/CSE for Pure ops)
   assemblyFormat        → the custom textual syntax (auto parser+printer!)
   builders              → convenience C++ constructors
   hasVerifier           → you provide verify() in C++ for extra invariants
</code></pre>
<pre><code>   The resulting IR you can now write/parse:
   ─────────────────────────────────────────────────────────────
   %0 = toy.constant dense&lt;[1.0, 2.0, 3.0]&gt; : tensor&lt;3xf64&gt;
   %1 = toy.add %0, %0 : tensor&lt;3xf64&gt;
   toy.print %1 : tensor&lt;3xf64&gt;
</code></pre>
<hr />
<h2 id="4-the-verifier--declaring-op-invariants">4. The verifier — declaring op invariants</h2>
<p><code>hasVerifier = 1</code> means you write a C++ method enforcing constraints the type system can&rsquo;t.
For <code>ConstantOp</code>, check that the attribute&rsquo;s shape matches the result type:</p>
<pre><code class="language-cpp">// ToyOps.cpp
llvm::LogicalResult toy::ConstantOp::verify() {
  auto attrType = llvm::cast&lt;mlir::RankedTensorType&gt;(getValue().getType());
  auto resType  = llvm::cast&lt;mlir::RankedTensorType&gt;(getResult().getType());
  if (attrType.getShape() != resType.getShape())
    return emitOpError(&quot;attribute shape &quot;)
           &lt;&lt; attrType.getShape() &lt;&lt; &quot; != result shape &quot; &lt;&lt; resType.getShape();
  return llvm::success();
}
</code></pre>
<pre><code>   The verifier runs automatically (mlir-opt -verify-each, pass boundaries).
   It's your op's contract — malformed toy.constant is rejected with a good
   diagnostic, exactly like LLVM's verifier rejects malformed IR (ch.00.03).
</code></pre>
<hr />
<h2 id="5-registering-and-the-c-glue">5. Registering and the C++ glue</h2>
<p>A little non-generated C++ ties it together (these <code>.inc</code> files are produced by
<code>mlir-tblgen</code>):</p>
<pre><code class="language-cpp">// ToyDialect.h
#include &quot;mlir/IR/Dialect.h&quot;
#include &quot;mlir/IR/OpDefinition.h&quot;
#include &quot;ToyOpsDialect.h.inc&quot;          // generated: dialect class decl
#define GET_OP_CLASSES
#include &quot;ToyOps.h.inc&quot;                  // generated: op class decls (AddOp, ...)

// ToyDialect.cpp
#include &quot;ToyDialect.h&quot;
#include &quot;ToyOpsDialect.cpp.inc&quot;         // generated: dialect definitions
void toy::ToyDialect::initialize() {

</code></pre>
<p>Load it in a tool/driver:</p>
<pre><code class="language-cpp">mlir::MLIRContext ctx;
ctx.getOrLoadDialect&lt;toy::ToyDialect&gt;();
// now you can parse/build toy.* ops
</code></pre>
<hr />
<h2 id="6-the-build-wiring-cmake--mlir-tblgen">6. The build wiring (CMake + mlir-tblgen)</h2>
<p>CMake invokes <code>mlir-tblgen</code> to turn <code>.td</code> into <code>.inc</code>, then compiles your dialect lib:</p>
<pre><code class="language-cmake"># CMakeLists.txt (dialect library)

mlir_tablegen(ToyOpsDialect.cpp.inc -gen-dialect-defs -dialect=toy)

</code></pre>

<p>Beyond ops, you can declare custom <em>types</em> and <em>attributes</em> the same way:</p>
<pre><code class="language-tablegen">def Toy_StructType : TypeDef&lt;Toy_Dialect, &quot;Struct&quot;&gt; {
  let mnemonic = &quot;struct&quot;;
  let parameters = (ins ArrayRefParameter&lt;&quot;mlir::Type&quot;&gt;:$elementTypes);
  let assemblyFormat = &quot;\`&lt;\` $elementTypes \`&gt;\`&quot;;   // !toy.struct&lt;f64, f64&gt;

</code></pre>
<pre><code>   Now !toy.struct&lt;f64, f64&gt; is a first-class type in your dialect, with
   generated storage, uniquing, parser/printer. Same ODS leverage as ops.

void toy::TransposeOp::getCanonicalizationPatterns(RewritePatternSet &amp;p, MLIRContext *c) {

<hr />
<h2 id="1-the-llvm-dialect-is-not-llvm-ir-but-mirrors-it">1. The LLVM dialect is not LLVM IR (but mirrors it)</h2>
<p>A subtle but vital distinction:</p>
<pre><code>   ┌─────────────────────────────────────────────────────────────────────────┐
   │ The \`llvm\` DIALECT is MLIR ops (llvm.add, llvm.call, llvm.br, ...) that │
   │ MODEL LLVM IR within MLIR's world (regions, MLIRContext, ops).          │
   │                                                                         │
   │ LLVM IR is the actual llvm::Module / llvm::Instruction in LLVMContext.  │
   │                                                                         │
   │ TRANSLATION converts the former into the latter. It is a near-1:1,      │
   │ mechanical mapping — NOT an optimization, just a representation change. │
   └─────────────────────────────────────────────────────────────────────────┘
</code></pre>
<pre><code>   MLIR llvm dialect                    LLVM IR
   ──────────────────                   ─────────────
   llvm.func @f(%x: i32) -&gt; i32 {  ──▶  define i32 @f(i32 %x) {
     %0 = llvm.add %x, %x : i32           %0 = add i32 %x, %x
     llvm.return %0 : i32                 ret i32 %0
   }                                    }
</code></pre>
<p>So the pipeline is: lower <em>to</em> the llvm dialect (chapter 05.03), then <em>translate</em> the llvm
dialect to LLVM IR.</p>
<pre><code>   high dialects ──[dialect conversion, ch.05.03]──▶ llvm dialect
                                                         │
                                                    [translation]
                                                         ▼
                                                   llvm::Module (real LLVM IR)
                                                         │
                                          ┌──────────────┴──────────────┐
                                          ▼                             ▼
                                   AOT (section 03)              JIT (section 04)
</code></pre>
<hr />
<h2 id="2-translating-in-c">2. Translating in C++</h2>
<p>The function <code>translateModuleToLLVMIR</code> does the conversion. You must register the LLVM

<pre><code class="language-cpp">#include &quot;mlir/Target/LLVMIR/Dialect/Builtin/BuiltinToLLVMIRTranslation.h&quot;
#include &quot;mlir/Target/LLVMIR/Dialect/LLVMIR/LLVMToLLVMIRTranslation.h&quot;
#include &quot;mlir/Target/LLVMIR/Export.h&quot;          // translateModuleToLLVMIR
#include &quot;llvm/IR/LLVMContext.h&quot;
#include &quot;llvm/IR/Module.h&quot;
using namespace mlir;

std::unique_ptr&lt;llvm::Module&gt;
toLLVMIR(ModuleOp mlirModule, llvm::LLVMContext &amp;llvmCtx) {
  // 1. Register translation interfaces (which dialects can translate themselves).
  registerBuiltinDialectTranslation(*mlirModule-&gt;getContext());
  registerLLVMDialectTranslation(*mlirModule-&gt;getContext());

  // 2. Translate: MLIR (llvm dialect) → llvm::Module.
  std::unique_ptr&lt;llvm::Module&gt; llvmModule =

}

<h2 id="4-jit-ing-mlir-directly-mlirexecutionengine">4. JIT-ing MLIR directly: <code>mlir::ExecutionEngine</code></h2>
<p>MLIR ships a convenience JIT that wraps everything (lower-to-LLVM-IR + ORC from section 04)

<pre><code class="language-cpp">#include &quot;mlir/ExecutionEngine/ExecutionEngine.h&quot;
#include &quot;mlir/ExecutionEngine/OptUtils.h&quot;
#include &quot;mlir/Target/LLVMIR/Dialect/LLVMIR/LLVMToLLVMIRTranslation.h&quot;
#include &quot;mlir/Target/LLVMIR/Dialect/Builtin/BuiltinToLLVMIRTranslation.h&quot;
#include &quot;llvm/Support/TargetSelect.h&quot;
using namespace mlir;

int runMLIR(ModuleOp module /* already lowered to llvm dialect */) {

  llvm::InitializeNativeTargetAsmPrinter();
  registerBuiltinDialectTranslation(*module-&gt;getContext());
  registerLLVMDialectTranslation(*module-&gt;getContext());

  auto optPipeline = makeOptimizingTransformer(/*optLevel=*/2, /*sizeLevel=*/0,
                                               /*targetMachine=*/nullptr);

  opts.transformer = optPipeline;

  if (!maybeEngine) { llvm::errs() &lt;&lt; &quot;engine create failed\\n&quot;; return 1; }

  int result = 0;
  if (engine-&gt;invoke(&quot;main&quot;, result)) { llvm::errs() &lt;&lt; &quot;invoke failed\\n&quot;; return 1; }
