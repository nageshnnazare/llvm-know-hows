<blockquote>
<p>Sections 03/04 treated the backend as a black box (&ldquo;<code>TargetMachine</code> turns IR into bytes&rdquo;).
Now we open it. The backend is itself a pipeline: LLVM IR → SelectionDAG → MachineInstr →
MC → bytes. Understanding it explains <em>why</em> certain IR compiles the way it does, and is
essential if you ever add a target or debug bad codegen.</p>
</blockquote>
<hr />
<h2 id="1-the-journey-from-ir-to-bytes">1. The journey from IR to bytes</h2>
<pre><code>   LLVM IR (target-independent, SSA, virtual values)
        │  ① Instruction Selection (ISel): match IR → target machine ops
        ▼
   SelectionDAG  (or GlobalISel path)     — per basic block DAG of target ops
        │  ② Scheduling: order DAG nodes into a linear list
        ▼
   MachineInstr (MIR), VIRTUAL registers  — target ops, infinite virtual regs
        │  ③ Register Allocation: map virtual regs → physical regs (+spills)
        ▼
   MachineInstr (MIR), PHYSICAL registers
        │  ④ Prologue/Epilogue, frame finalization, late peepholes
        ▼
   MachineInstr (final)
        │  ⑤ MC Layer: encode each instruction to bytes; build sections/relocs
        ▼
   object file (.o)  or  bytes in memory (JIT)
</code></pre>
<p>Each representation is <em>lower</em> than the last (recall the abstraction-level diagram from
chapter 00.02). The backend&rsquo;s job is to commit, step by step, to a specific machine.</p>
<pre><code>   target-INDEPENDENT  ────────────────────────────▶  target-SPECIFIC
   LLVM IR        SelectionDAG       MachineInstr           MC/bytes
   &quot;add i32&quot;      &quot;X86 ADD32rr&quot;      &quot;%vreg0 = ADD32rr&quot;     0x01 0xC8...
   virtual        target opcode      virtual regs           real bytes
</code></pre>
<hr />
<h2 id="2-stage-①--instruction-selection-the-big-one">2. Stage ① — Instruction Selection (the big one)</h2>
<p>ISel translates target-independent IR operations into target machine instructions. LLVM has
two frameworks:</p>
<pre><code>  ┌─────────────────────┬──────────────────────────────────────────────────────┐
  │ SelectionDAG        │ the mature, default path. Builds a per-block DAG of  │
  │                     │ operations, legalizes it, then pattern-matches DAG   │
  │                     │ subtrees to machine instructions. High quality.      │
  ├─────────────────────┼──────────────────────────────────────────────────────┤
  │ GlobalISel          │ newer, operates on a global (whole-function) basis   │
  │                     │ without building a separate DAG; faster compile, used│
  │                     │ at -O0 on some targets (esp. AArch64). Covered next  │
  │                     │ chapter.                                             │
  └─────────────────────┴──────────────────────────────────────────────────────┘
</code></pre>
<p>The SelectionDAG idea, visualized for <code>a*b + c</code>:</p>
<pre><code>   IR:  %m = mul i32 %a, %b
        %r = add i32 %m, %c

   DAG (data flows UP to the root):
                  (add)
                 ╱     ╲
              (mul)    [c]
             ╱    ╲
          [a]      [b]

   Pattern matching: the target may have a single &quot;multiply-add&quot; instruction.
   ISel matches the (add (mul a b) c) SUBTREE and emits ONE machine op:
                  X86: (no fused int madd, so) IMUL + ADD
                  ARM: MLA  Rd, Ra, Rb, Rc      ◀ one instruction for the whole tree!
</code></pre>
<pre><code>   ┌──────────────────────────────────────────────────────────────────────────┐
   │ ISel = tree/DAG pattern matching. The target describes its instructions  │
   │ as PATTERNS over IR/DAG operations (in TableGen .td files). ISel covers  │
   │ the DAG with the lowest-cost set of patterns. This is why &quot;the same IR   │
   │ becomes different instructions on different CPUs&quot; — different patterns.  │
   └──────────────────────────────────────────────────────────────────────────┘
</code></pre>
<p>SelectionDAG&rsquo;s internal sub-phases:</p>
<pre><code>   build DAG ─▶ legalize types (e.g. i64 on 32-bit → split into i32 pairs)
             ─▶ legalize operations (unsupported ops → libcalls or expansions)
             ─▶ DAG combine (peephole on the DAG)
             ─▶ select (match patterns → machine ops)
             ─▶ schedule (linearize the DAG into an instruction order)
</code></pre>
<p>&ldquo;Legalization&rdquo; is key: it rewrites operations the target <em>can&rsquo;t</em> do natively into ones it
can (e.g., a 128-bit add → several 64-bit adds with carry; a float divide → a library call).</p>
<hr />
<h2 id="3-stage-②--scheduling">3. Stage ② — Scheduling</h2>
<p>The DAG expresses <em>data dependencies</em>, not an order. Scheduling picks a linear order that
respects dependencies while minimizing stalls (using the target&rsquo;s latency/port model).</p>
<pre><code>   DAG (partial order)            Scheduled (total order)
   ──────────────────             ────────────────────────
   load A ─┐                      load A      ; start early (high latency)
   load B ─┤ both feed add        load B      ; overlap with A's latency
           ▼                      add  A, B   ; now both ready
          add                     ...
   Goal: hide latencies, keep execution ports busy, reduce register pressure.
</code></pre>
<p>This is where the <code>TargetMachine</code>&rsquo;s scheduling model (instruction latencies, throughput)
earns its keep. At <code>-O0</code> scheduling is minimal (fast compile); at <code>-O2+</code> it&rsquo;s careful.</p>
<hr />
<h2 id="4-stage-③--register-allocation-its-own-chapter">4. Stage ③ — Register Allocation (its own chapter)</h2>
<p>After ISel/scheduling, code uses <strong>infinite virtual registers</strong>. Real CPUs have a fixed,
small set. Register allocation maps virtual → physical, inserting <strong>spills</strong> (store to stack,
reload later) when there aren&rsquo;t enough. This is so important it gets
<a href="03-register-allocation.md">03-register-allocation.md</a> to itself.</p>
<pre><code>   before:  %vreg0 = ADD %vreg1, %vreg2     (unlimited virtual regs)
   after:   eax    = ADD ecx, edx           (mapped to physical regs)
            ...or if no reg free: spill some vreg to [rsp+8], reload before use.
</code></pre>
<hr />
<h2 id="5-stage-④--frame-finalization-prologueepilogue">5. Stage ④ — Frame finalization, prologue/epilogue</h2>
<p>Now that we know which physical registers and how much stack are used, the backend inserts
function prologue/epilogue and resolves stack-relative addresses.</p>
<pre><code>   prologue (entry):  push rbp; mov rbp, rsp; sub rsp, &lt;framesize&gt;
                      (save callee-saved regs used; set up frame pointer)
   ... body ...
   epilogue (return): add rsp, &lt;framesize&gt;; pop rbp; ret
                      (restore callee-saved regs; tear down frame)
</code></pre>
<pre><code>   This is where ABI/calling-convention details (which regs are callee-saved,
   how args/return are passed — recall ch.03.04's runtime) get baked into code.
   The TargetMachine knows the convention for the triple.
</code></pre>
<hr />
<h2 id="6-stage-⑤--the-mc-layer-instructions-become-bytes">6. Stage ⑤ — The MC layer: instructions become bytes</h2>
<p>The <strong>MC</strong> (Machine Code) layer is LLVM&rsquo;s assembler/disassembler core. It takes final
<code>MachineInstr</code>s and encodes them into actual bytes, organizing them into sections with
symbols and relocations (exactly the object-file structure from chapter 03.04).</p>
<pre><code>   MachineInstr: ADD32rr eax, ecx
        │  MCInst (abstract encoded instruction)
        ▼
   MCCodeEmitter: encode to bytes  →  0x01 0xC8
        │  MCStreamer writes into sections
        ▼
   .text: [...0x01 0xC8...]   .symtab: [main, ...]   .rela.text: [...]
        │
        ▼
   ObjectWriter (ELF/Mach-O/COFF) → .o file
   ── or ── (JIT) the bytes are kept in memory for ORC to link (section 04)
</code></pre>
<pre><code>   ┌─────────────────────────────────────────────────────────────────────────┐
   │ The MC layer is shared by the assembler (llvm-mc), the integrated       │
   │ assembler in the compiler, AND the JIT. AOT writes its output to a      │
   │ file; the JIT keeps it in memory — SAME MC layer, different sink.       │
   │ This is, again, &quot;AOT and JIT share the backend&quot; made concrete.          │
   └─────────────────────────────────────────────────────────────────────────┘
</code></pre>
<hr />
<h2 id="7-watching-the-pipeline-with-tools">7. Watching the pipeline with tools</h2>
<p>You can stop the backend at each stage and inspect it — the best way to build intuition:</p>
<pre><code class="language-bash"># See the SelectionDAG (requires a debug build of LLVM):
&gt;&gt;&gt; llc -view-isel-dags in.ll          # opens a graph of the DAG
&gt;&gt;&gt; llc -debug-only=isel in.ll         # textual ISel trace

&gt;&gt;&gt; llc -stop-after=finalize-isel in.ll -o before-ra.mir   # virtual regs
&gt;&gt;&gt; llc -stop-before=regallocfast    in.ll -o pre-ra.mir
&gt;&gt;&gt; llc -print-after-all in.ll 2&gt; backend-trace.txt        # firehose

# Final assembly and object:
&gt;&gt;&gt; llc in.ll -o out.s                 # assembly
&gt;&gt;&gt; llc -filetype=obj in.ll -o out.o   # object
&gt;&gt;&gt; llvm-objdump -d out.o              # disassemble to confirm
</code></pre>
<pre><code>   -stop-after / -stop-before let you snapshot MIR at any pipeline point.
   Reading the MIR before vs after register allocation makes stage ③ tangible:
   you literally see %vreg names turn into eax/ecx/etc.
</code></pre>
<hr />
<h2 id="8-how-this-connects-to-aot-and-jit">8. How this connects to AOT and JIT</h2>
<p>You&rsquo;ve now seen what <code>TargetMachine::addPassesToEmitFile</code> (chapter 03.02) actually builds:
stages ①–⑤. And the JIT&rsquo;s <code>IRCompileLayer</code> (chapter 04.02) runs the <em>same</em> stages, sending

<pre><code>   addPassesToEmitFile (AOT)  ─┐
                               ├─▶ builds the SAME stage ①–⑤ pipeline
   IRCompileLayer (JIT)       ─┘    on the SAME TargetMachine
                                    only the final sink differs (.o vs memory)
</code></pre>
<p>That symmetry — one backend, two sinks — is the structural payoff of LLVM&rsquo;s design and the
thread that ties this whole guide together.</p>

<blockquote>
<p>Instruction selection is where target-independent IR becomes target-specific machine
instructions. It&rsquo;s the most intricate part of the backend. We dig into how SelectionDAG
matches patterns, how targets <em>describe</em> their instructions in TableGen, and how the newer
GlobalISel differs.</p>
</blockquote>
<hr />
<h2 id="1-the-fundamental-problem">1. The fundamental problem</h2>
<pre><code>   Given:   target-independent IR operation(s)
   Find:    the cheapest sequence of THIS target's instructions that computes
            the same result, respecting the target's registers and constraints.

   It's a COVERING problem: tile the computation DAG with available
   instruction &quot;patterns,&quot; minimizing total cost.
</code></pre>
<pre><code>   computation:  result = (a * b) + c
                       (add (mul a b) c)

   Target A (has multiply-accumulate):       Target B (no madd):
   ┌────────────────────────────────┐         ┌──────────────────────────────┐
   │ cover whole tree with ONE op:  │         │ cover with TWO ops:          │
   │   MLA r, a, b, c               │         │   MUL t, a, b                │
   │                                │         │   ADD r, t, c                │
   └────────────────────────────────┘         └──────────────────────────────┘
   Same IR, different coverings → different (optimal) instruction sequences.
</code></pre>
<hr />
<h2 id="2-selectiondag-in-detail">2. SelectionDAG in detail</h2>
<p>For each basic block, LLVM builds a <strong>DAG</strong> (directed acyclic graph) where nodes are
operations and edges are data (and chain) dependencies.</p>
<pre><code>   IR block:
     %0 = load i32, ptr %p
     %1 = mul i32 %0, 4
     store i32 %1, ptr %q

   SelectionDAG (data edges ──, chain edges for ordering ╌╌):
                                 [EntryToken]
                                      ╎ (chain)
              ┌──────────── (load %p) ╌╌╌╌╌╌╌╌╌┐
              │ value                          ╎ chain
              ▼                                ▼
          (mul, 4)                        (store) ◀── needs %1
              │                               ╎
              └───────────────────────────────┘
   Chain edges enforce memory ordering (the load must precede the store);
   data edges carry SSA values.
</code></pre>
<p>The four SelectionDAG phases (recall chapter 06.01 §2), now elaborated:</p>
<pre><code>  ┌─────────────────┬──────────────────────────────────────────────────────────┐
  │ Build           │ IR → initial &quot;illegal&quot; DAG (uses generic ISD nodes).     │
  │ Legalize types  │ make every value type natively supported: split (i128 →  │
  │                 │ 2×i64), promote (i1 → i8), expand, scalarize vectors.    │
  │ Legalize ops    │ make every operation supported: unsupported op → expand  │
  │                 │ into supported ops, or a runtime LIBCALL (e.g. __divdi3).│
  │ Combine         │ DAG-level peephole (fold, simplify) — runs a few times.  │
  │ Select          │ match DAG patterns → target nodes (the actual ISel).     │
  │ Schedule        │ linearize DAG → ordered MachineInstrs.                   │
  └─────────────────┴──────────────────────────────────────────────────────────┘
</code></pre>
<pre><code>   Legalization examples you can SEE:
     i64 add on a 32-bit target  → ADD + ADC (add-with-carry) pair
     frem (float remainder)       → call to fmodf  (a libcall — no HW op)
     &lt;8 x i32&gt; on SSE2 (4-wide)  → two &lt;4 x i32&gt; ops (vector splitting)
</code></pre>
<hr />
<h2 id="3-how-targets-describe-instructions-tablegen-patterns">3. How targets describe instructions: TableGen patterns</h2>
<p>The magic of &ldquo;the same IR → different instructions per target&rdquo; is that each backend
<em>declares its instructions as patterns</em> in <code>.td</code> files. <code>llvm-tblgen</code> compiles these into a
matcher.</p>
<pre><code class="language-tablegen">// Simplified: an x86 32-bit register-register add.
def ADD32rr : I&lt;0x01, MRMDestReg, (outs GR32:$dst),
                (ins GR32:$src1, GR32:$src2),
                &quot;add{l}\\t{$src2, $dst|$dst, $src2}&quot;,
                // THE PATTERN: this instruction implements (add src1, src2)
                [(set GR32:$dst, (add GR32:$src1, GR32:$src2))]&gt;;
                 ───────────────────────────────────────────
                 &quot;when you see an \`add\` of two GR32 values producing a GR32,
                  you MAY select this ADD32rr instruction.&quot;
</code></pre>
<pre><code>   ┌──────────────────────────────────────────────────────────────────────────┐
   │ The bracketed [(set $dst, (add $src1, $src2))] is a DAG PATTERN. The     │
   │ instruction-selection table is BUILT from all such patterns across the   │
   │ target. ISel walks the input DAG and finds matching patterns, preferring │
   │ those that cover more nodes at lower cost. Add an instruction = add a    │
   │ pattern; no hand-written matcher needed.                                 │
   └──────────────────────────────────────────────────────────────────────────┘
</code></pre>
<p>Complex patterns cover subtrees — this is how multiply-add, load-and-op, and addressing
modes get matched as single instructions:</p>
<pre><code class="language-tablegen">   // A fused multiply-add pattern covering (add (mul a b) c):
   [(set RegClass:$dst, (add (mul RegClass:$a, RegClass:$b), RegClass:$c))]
   // matches the WHOLE subtree → one MADD/FMA instruction.

   // x86 complex addressing: (load (add base (shl index, scale)))
   //  → a single mov with a [base + index*scale] memory operand.
</code></pre>
<hr />
<h2 id="4-selection-dag--machineinstr">4. Selection DAG → MachineInstr</h2>
<p>After matching, the DAG nodes are target instructions; scheduling linearizes them into
<code>MachineInstr</code>s with virtual registers:</p>
<pre><code>   selected DAG (target nodes)        →     MachineInstr stream (virtual regs)
   ─────────────────────────                ──────────────────────────────────
   (X86::MOV32rm %p)                        %0:gr32 = MOV32rm %p, ...
   (X86::SHL32ri %0, 2)                     %1:gr32 = SHL32ri %0, 2
   (X86::MOV32mr %q, %1)                    MOV32mr %q, ..., %1
   note: still VIRTUAL registers (%0, %1) — regalloc (next chapter) assigns real ones.
</code></pre>
<hr />
<h2 id="5-globalisel--the-alternative-pipeline">5. GlobalISel — the alternative pipeline</h2>
<p>SelectionDAG works per-basic-block and builds a separate DAG data structure, which costs
compile time. <strong>GlobalISel</strong> operates on the whole function directly in MachineIR, in four
passes, no separate DAG:</p>
<pre><code>   GlobalISel pipeline:
   ┌─────────────────────────────────────────────────────────────────────────┐
   │ IRTranslator   : LLVM IR → generic MachineInstr (gMIR), virtual regs    │
   │ Legalizer      : make gMIR ops legal for the target (like DAG legalize) │
   │ RegBankSelect  : assign each vreg to a register BANK (e.g. GPR vs FPR)  │
   │ InstructionSelect: gMIR → real target MachineInstrs (pattern match)     │
   └─────────────────────────────────────────────────────────────────────────┘
</code></pre>
<pre><code>   SelectionDAG                       GlobalISel
   ─────────────────────────          ─────────────────────────────────
   per-basic-block                    whole-function (global)
   builds a separate DAG              works in MIR directly (no DAG)
   mature, best codegen at -O2+       faster compile, improving quality
   default on most targets            default at -O0 on AArch64; opt-in else
   reuses TableGen patterns ─────────▶ ALSO reuses many TableGen patterns
</code></pre>
<pre><code>   ┌─────────────────────────────────────────────────────────────────────────┐
   │ Why GlobalISel? SelectionDAG's per-block DAG construction is slow and   │
   │ loses cross-block context. GlobalISel is faster (good for -O0 / JIT     │
   │ baseline tiers) and global. It's gradually replacing SelectionDAG, but  │
   │ SelectionDAG still wins on peak -O2/-O3 quality on most targets today.  │
   └─────────────────────────────────────────────────────────────────────────┘
</code></pre>
<p>GlobalISel&rsquo;s relevance to <em>this guide</em>: a JIT baseline tier (chapter 04.04) wants fast
compiles, so GlobalISel (or fast SelectionDAG mode) is a natural fit, with optimizing tiers
using full SelectionDAG.</p>
<hr />
<h2 id="6-seeing-it-happen">6. Seeing it happen</h2>
<pre><code class="language-bash"># Watch SelectionDAG build/legalize/select (debug LLVM build):
&gt;&gt;&gt; llc -debug-only=isel -O2 in.ll -o /dev/null 2&gt; isel.log
&gt;&gt;&gt; llc -view-dag-combine1-dags in.ll    # DAG after first combine (graphviz)
&gt;&gt;&gt; llc -view-sched-dags in.ll           # DAG handed to the scheduler

# Use GlobalISel instead of SelectionDAG (where supported):
&gt;&gt;&gt; llc -global-isel in.ll -o out.s

# Stop right after selection to see virtual-register MachineIR:
&gt;&gt;&gt; llc -stop-after=finalize-isel in.ll -o selected.mir
</code></pre>
<p>Reading <code>selected.mir</code> shows target opcodes with virtual registers — the exact handoff to
register allocation.</p>
<hr />

</ol>

<blockquote>
<p>After instruction selection, code uses unlimited <em>virtual</em> registers. Real CPUs have a
handful of <em>physical</em> registers. Register allocation is the (NP-hard) problem of mapping
one to the other, spilling to memory when necessary. It&rsquo;s one of the most performance-
critical backend stages. We build intuition with live ranges, interference, and LLVM&rsquo;s
greedy allocator.</p>
</blockquote>
<hr />
<h2 id="1-the-problem">1. The problem</h2>
<pre><code>   ISel output: infinite virtual registers
     %v0 = ...    %v1 = ...    %v2 = ...   ... %v99 = ...

   Reality (x86-64 integer regs): ~16 physical registers
     rax rbx rcx rdx rsi rdi rbp rsp r8 r9 r10 r11 r12 r13 r14 r15
     (and some are reserved: rsp = stack pointer, etc.)

   GOAL: assign each virtual reg a physical reg such that two virtual regs
   that are &quot;alive at the same time&quot; never share a physical reg. When you
   run out, SPILL: keep some value in memory, load it just before use.
</code></pre>
<pre><code>   ┌────────────────────────────────────────────────────────────────────────┐
   │ Bad allocation = lots of spills = lots of loads/stores = slow code.    │
   │ Register allocation quality is often the single biggest factor in      │
   │ -O0 vs -O2 performance. This is where &quot;use the stack&quot; becomes &quot;use a   │
   │ register&quot; — the inverse of the frontend's alloca trick (ch.00.04).     │
   └────────────────────────────────────────────────────────────────────────┘
</code></pre>
<hr />
<h2 id="2-live-ranges-and-liveness">2. Live ranges and liveness</h2>
<p>A virtual register is <strong>live</strong> from its definition to its last use. Liveness analysis (an IR/
MIR analysis) computes these ranges.</p>
<pre><code>   instr               %a   %b   %c
   ─────────────────   ───  ───  ───
   %a = ...            ●def
   %b = ...            │    ●def
   %c = add %a, %b     │use │use ●def      ← %a, %b, %c all live here
   ...= %c             │    │    │use
                       ▼    ▼    ▼
   live ranges:       [a]  [b]  [c]
                      a and b OVERLAP (both live at the add) → they INTERFERE
                      c starts where a,b end → c can REUSE a's or b's register
</code></pre>
<pre><code>   LIVE RANGE: the set of program points where a value must be retained.
   Two values INTERFERE if their live ranges overlap (both needed simultaneously);
   interfering values cannot share a physical register.
</code></pre>
<hr />
<h2 id="3-the-interference-graph-the-classic-model">3. The interference graph (the classic model)</h2>
<p>Model registers as <strong>graph coloring</strong>: nodes = virtual regs, edges = interference, colors =
physical registers. A valid allocation = a proper coloring with K colors (K = #physical
regs).</p>
<pre><code>   live ranges:  a──b overlap, b──c overlap, a──c do NOT overlap

   interference graph:        coloring with 2 registers (R1, R2):
        a ─── b                   a = R1
              │                   b = R2   (b interferes with a → different)
              c                   c = R1   (c interferes with b, NOT a → reuse R1)

   2 colors suffice here. If the graph needed 3 colors but we have 2 regs,
   we must SPILL one node to memory to make it colorable.
</code></pre>
<pre><code>   ┌─────────────────────────────────────────────────────────────────────────┐
   │ Graph coloring with K colors is NP-hard in general, so allocators use   │
   │ HEURISTICS. Chaitin-Briggs (classic) builds the interference graph,     │
   │ simplifies it (remove low-degree nodes), and spills when stuck. LLVM's  │
   │ default is a different, faster approach: the Greedy allocator.          │
   └─────────────────────────────────────────────────────────────────────────┘
</code></pre>
<hr />
<h2 id="4-spilling">4. Spilling</h2>
<p>When there aren&rsquo;t enough registers, <strong>spill</strong> a value: store it to a stack slot after it&rsquo;s
computed, and reload it right before each use. Costly, so allocators spill the <em>cheapest</em>
(least-used, coldest) values.</p>
<pre><code>   before (want %v in a reg but none free):
       %v = expensive_compute
       ... many other live values ...
       use %v

   after spilling %v:
       %v = expensive_compute
       store %v -&gt; [stack_slot]        ◀ spill (write to memory)
       ... other values use the freed register ...
       %v.reload = load [stack_slot]    ◀ reload before use
       use %v.reload
</code></pre>
<pre><code>   Spill cost heuristic ≈ (number of uses × loop depth weight) / live-range size.
   Spill values that are used rarely and span a long range; KEEP in registers
   the hot, frequently-used values (especially inside loops).
</code></pre>
<hr />
<h2 id="5-llvms-allocators">5. LLVM&rsquo;s allocators</h2>
<pre><code>  ┌──────────────────────┬─────────────────────────────────────────────────────┐
  │ Fast (regallocfast)  │ -O0. Allocates per-basic-block, minimal analysis.   │
  │                      │ Fast compile, poor code. Good for JIT baseline tier.│
  ├──────────────────────┼─────────────────────────────────────────────────────┤
  │ Greedy (default)     │ -O1+. Global, priority-based: allocates large/hot   │
  │                      │ live ranges first, splits ranges, evicts &amp; re-tries,│
  │                      │ spills as last resort. The production workhorse.    │
  ├──────────────────────┼─────────────────────────────────────────────────────┤
  │ Basic / PBQP         │ alternative/experimental allocators (PBQP solves a  │
  │                      │ partitioned quadratic problem; niche).              │
  └──────────────────────┴─────────────────────────────────────────────────────┘
</code></pre>
<p>The Greedy allocator&rsquo;s loop, conceptually:</p>
<pre><code>   priority queue of live ranges (largest/hottest first)
       │
   pop a live range LR:
       try to assign a free physical reg
         │ success → done
         │ no free reg →
       can we EVICT a lower-priority range from a reg? → evict it (it re-queues)
         │ no good eviction →
       can we SPLIT LR into smaller pieces that fit? → split, re-queue pieces
         │ no →
       SPILL LR to the stack.
   repeat until queue empty.
</code></pre>
<pre><code>   ┌─────────────────────────────────────────────────────────────────────────┐
   │ &quot;Live-range splitting&quot; is Greedy's key trick: instead of spilling a     │
   │ whole value, split its live range so part lives in a register (where    │
   │ it's hot) and part in memory (where it's cold). Finer-grained than      │
   │ all-or-nothing coloring → better code.                                  │
   └─────────────────────────────────────────────────────────────────────────┘
</code></pre>
<hr />
<h2 id="6-register-classes-and-constraints">6. Register classes and constraints</h2>
<p>Not all registers are interchangeable. Targets define <strong>register classes</strong> and instructions
constrain which class their operands use.</p>
<pre><code>   x86 register classes (examples):
     GR32   : 32-bit general regs (eax, ecx, ...)
     GR64   : 64-bit general regs (rax, rcx, ...)
     FR64   : xmm regs for doubles
     ...
   An instruction like ADD32rr requires GR32 operands; a float op requires FR*.
   The allocator must respect the class: you can't put a double in eax.

   Plus hard constraints:
     • Fixed regs: x86 division uses eax/edx specifically; calls pass args in
       rdi,rsi,... per the ABI; the allocator must honor these.
     • Callee-saved vs caller-saved: affects prologue/epilogue (ch.06.01 §5).
     • Two-address ops: some x86 ops overwrite an operand (dst = dst op src).
</code></pre>
<hr />
<h2 id="7-coalescing">7. Coalescing</h2>
<p>A frequent opportunity: ISel emits lots of <code>copy</code> instructions (e.g., from PHI elimination —
recall PHIs become copies on edges, chapter 00.04 §3). <strong>Coalescing</strong> assigns the source and
destination of a copy the <em>same</em> register, deleting the copy.</p>
<pre><code>   before:  %v1 = COPY %v0        (if %v0, %v1 don't interfere)
            use %v1
   after coalescing: %v0 and %v1 share a register → COPY deleted
            use %v0

   PHI elimination inserts copies on CFG edges; coalescing removes most of
   them, which is why well-allocated code has few register moves.
</code></pre>
<pre><code>   The tension: coalescing %v0 and %v1 MERGES their live ranges, which can
   make the merged range harder to color (more interference). Allocators
   coalesce conservatively to avoid causing new spills.
</code></pre>
<hr />
<h2 id="8-seeing-register-allocation">8. Seeing register allocation</h2>
<pre><code class="language-bash"># MIR before allocation (virtual regs) vs after (physical regs):
&gt;&gt;&gt; llc -stop-before=greedy in.ll -o pre-ra.mir     # %0, %1 virtual
&gt;&gt;&gt; llc -stop-after=greedy  in.ll -o post-ra.mir    # eax, ecx physical

# Force the fast allocator (see worse code, like -O0 / JIT baseline):
&gt;&gt;&gt; llc -regalloc=fast in.ll -o fast.s
&gt;&gt;&gt; llc -regalloc=greedy -O2 in.ll -o greedy.s
&gt;&gt;&gt; diff fast.s greedy.s        # compare spill counts &amp; quality

# Spill statistics:
&gt;&gt;&gt; llc -O2 -stats in.ll -o /dev/null 2&gt;&amp;1 | grep -i spill
</code></pre>
<p>Diffing <code>pre-ra.mir</code> and <code>post-ra.mir</code> is the single most illuminating exercise: you watch
virtual registers collapse onto the real register file, and see spills appear when pressure
is high.</p>
<hr />
<h2 id="9-why-this-matters-for-aot-and-jit">9. Why this matters for AOT and JIT</h2>
<pre><code>   AOT (-O2): use Greedy — spend compile time for the best register use,
              since you compile once, offline.
   JIT baseline tier: use Fast — minimize compile latency; accept spills,
              because this code may be replaced by an optimized tier anyway.
   JIT optimizing tier: use Greedy — the hot code deserves great allocation.
</code></pre>
<p>This mirrors the tiering theme from chapter 04.04: <strong>register allocation is one of the knobs
you trade between compile speed and code speed.</strong> The same <code>TargetMachine</code>, different
allocator, different point on the curve.</p>
<hr />
<h2 id="mental-model-checkpoint">Mental model checkpoint</h2>
<ol>
<li>State the register allocation problem in one sentence.</li>
<li>What is a live range, and when do two values interfere?</li>
<li>How is allocation modeled as graph coloring, and what do nodes/edges/colors represent?</li>
<li>What is a spill, and which values should an allocator prefer to spill?</li>
<li>Describe the Greedy allocator&rsquo;s assign/evict/split/spill loop.</li>
<li>What is live-range splitting and why is it better than whole-value spilling?</li>
<li>What are register classes and two kinds of hard constraints the allocator must respect?</li>
<li>What is coalescing, where do the copies come from, and what&rsquo;s the risk of over-coalescing?</li>

  { name: `30. Capstone / One Language Three Backends`, path: `07-capstone/01-one-language-three-backends.md`, dir: `07-capstone`, words: 1269, mins: 6, body: `<h1 id="0701--capstone--one-language-three-backends">07.01 · Capstone — One Language, Three Backends</h1>
<blockquote>
<p>Time to tie everything together. We take the <strong>Toy</strong> language from section 01 and ship it
three ways from the <em>same frontend</em>: as an <strong>AOT</strong> compiler, as a <strong>JIT</strong> REPL, and via an
<strong>MLIR</strong> pipeline. Seeing the shared spine and the three divergent tails cements the entire
guide.</p>
</blockquote>
<hr />
<h2 id="1-the-shared-spine">1. The shared spine</h2>
<p>All three share the frontend (lexer → parser → AST) from section 01. They diverge only at
&ldquo;what do we do with the produced IR?&rdquo;</p>
<pre><code>   prog.toy
      │  Lexer (01.01)
      ▼
   tokens
      │  Parser (01.02)
      ▼
   AST
      │
      ├──────────────── codegen to LLVM IR (01.03) ────────────────┐
      │                                                            │
      │                                          codegen to MLIR (05.02/04)
      ▼                                                            ▼
   llvm::Module  ◀─────────── (MLIR path lowers + translates to here, 05.05)
      │
      │  optimize (02.02) — SHARED
      ▼
   optimized llvm::Module
      │
      ├──────────────┬──────────────────────┐
      ▼              ▼                       ▼
   AOT (§2)        JIT (§3)              (MLIR fed in above) (§4)
   .o → link       ORC → call
</code></pre>
<pre><code>   ┌─────────────────────────────────────────────────────────────────────────┐
   │ ~80% of the code (frontend + optimization) is shared verbatim. The      │
   │ three &quot;backends&quot; are thin: AOT ≈ 40 lines (object emit + link), JIT ≈   │
   │ 30 lines (LLJIT add+lookup+call), MLIR ≈ a dialect + lowering passes.   │
   └─────────────────────────────────────────────────────────────────────────┘
</code></pre>
<hr />
<h2 id="2-backend-a--aot-compile-now-run-later">2. Backend A — AOT (compile now, run later)</h2>
<p>Reusing chapter 03.03&rsquo;s driver. The shape:</p>
<pre><code class="language-cpp">// toyc-aot.cpp
int main(int argc, char **argv) {
  InitializeModule();
  runFrontend(openFile(argv[1]));        // section 01 frontend → TheModule
  verifyModule(*TheModule, &amp;errs());

  optimizeModule(*TheModule, /*O=*/2);   // section 02.02 — SHARED
  synthesizeMain(*TheModule, ...);       // entry point (03.03)
  moduleToObjectFile(*TheModule, &quot;out.o&quot;);// section 03.02 → object on disk
  linkExecutable(&quot;out.o&quot;, &quot;prog&quot;);       // section 03.04 → executable
  // compiler exits; nothing of ours runs at program runtime.
}
</code></pre>
<pre><code>   $ ./toyc-aot prog.toy
   wrote out.o ; linking → prog
   $ ./prog                 # AOT: native binary, no compiler present
   50.000000
</code></pre>
<pre><code>   Characteristics realized:
     • instant startup, no compiler shipped (ch.03.01)
     • could cross-compile by swapping the triple (ch.03.02 §6)
     • could BOLT the binary with a profile for more speed (ch.03.05)
</code></pre>
<hr />
<h2 id="3-backend-b--jit-repl-compile-now-run-now">3. Backend B — JIT REPL (compile now, run now)</h2>
<p>Reusing chapter 04.03&rsquo;s REPL. The shape:</p>
<pre><code class="language-cpp">// toyc-jit.cpp
int main() {
  InitializeNativeTarget(); InitializeNativeTargetAsmPrinter();
  TheJIT = cantFail(LLJITBuilder().create());
  addProcessSymbolsGenerator(TheJIT);    // so toy code can call printf/sin (04.03)
  InitializeModule(); getNextToken();
  MainLoop();   // each top-level expr → codegen → addIRModule → lookup → CALL
}
</code></pre>
<pre><code>   $ ./toyc-jit
   ready&gt; def fib(n) if n&lt;2 then n else fib(n-1)+fib(n-2);
   ready&gt; fib(10);
   Evaluated to 55.000000          ◀ compiled to native &amp; executed IMMEDIATELY
   ready&gt; fib(20);
   Evaluated to 6765.000000        ◀ reuses the already-JIT'd fib
</code></pre>
<pre><code>   Characteristics realized:
     • interactive: define &amp; call in the same process (ch.04.01)
     • cross-module symbol resolution via the JITDylib (ch.04.02)
     • could add an IRTransformLayer for a cheap pipeline (ch.04.03 §5)
     • could go tiered: baseline fib, reoptimize when hot (ch.04.04)
</code></pre>
<p>The <em>only</em> real difference from AOT: instead of writing <code>out.o</code>, we <code>addIRModule</code> to ORC,
<code>lookup</code> the symbol, and call the returned pointer. Same frontend, same optimizer.</p>
<hr />
<h2 id="4-backend-c--via-mlir-model-high-lower-down">4. Backend C — via MLIR (model high, lower down)</h2>
<p>For a language as simple as Toy, MLIR is overkill — but the <em>exercise</em> shows the on-ramp. We
codegen to a small <code>toy</code> dialect (or directly to <code>arith</code>/<code>func</code>/<code>scf</code>), then lower to LLVM IR
and reuse A or B.</p>
<pre><code>   AST
     │ codegen to MLIR (OpBuilder, ch.05.02): func.func + arith + scf ops
     ▼
   toy.mlir  (arith/func/scf dialects)
     │ mlir-opt: -convert-scf-to-cf -convert-arith-to-llvm
     │           -convert-func-to-llvm -reconcile-unrealized-casts  (ch.05.03)
     ▼
   llvm-dialect.mlir
     │ mlir-translate --mlir-to-llvmir  (ch.05.05)
     ▼
   out.ll  (LLVM IR)  ──▶ now identical to backend A or B!
</code></pre>
<pre><code class="language-cpp">// toyc-mlir.cpp (sketch)
int main(int argc, char **argv) {
  MLIRContext ctx;
  ctx.loadDialect&lt;func::FuncDialect, arith::ArithDialect, scf::SCFDialect&gt;();
  ModuleOp module = codegenToMLIR(parseFile(argv[1]), ctx);   // ch.05.02 style

  PassManager pm(&amp;ctx);                       // ch.05.03
  pm.addPass(createConvertSCFToCFPass());
  pm.addPass(createArithToLLVMConversionPass());
  pm.addPass(createConvertFuncToLLVMPass());
  pm.addPass(createReconcileUnrealizedCastsPass());
  if (failed(pm.run(module))) return 1;

  llvm::LLVMContext llvmCtx;
  auto llvmModule = toLLVMIR(module, llvmCtx);  // ch.05.05 → llvm::Module
  // From here: optimizeModule + (moduleToObjectFile | LLJIT) — backends A or B!
}
</code></pre>
<pre><code>   Characteristics realized:
     • domain ops could be optimized at a high level before lowering (05.01)
     • multiple targets (CPU/GPU) reachable from one dialect (05.05 §6)
     • for Toy specifically: more machinery than payoff — which is the LESSON.
       Use MLIR when your domain has structure worth modeling (05.05 §6 table).
</code></pre>
<hr />
<h2 id="5-the-three-side-by-side">5. The three, side by side</h2>
<pre><code>  ┌────────────────┬───────────────────┬───────────────────┬───────────────────┐
  │                │ AOT (A)           │ JIT (B)           │ MLIR (C)          │
  ├────────────────┼───────────────────┼───────────────────┼───────────────────┤
  │ frontend       │ section 01        │ section 01        │ section 01        │
  │ produce IR     │ → llvm::Module    │ → llvm::Module    │ → MLIR → llvm::Mod│
  │ optimize       │ 02.02 (-O2)       │ 02.02 (cheap+tier)│ MLIR opts + 02.02 │
  │ deliver        │ object → link     │ ORC → fn ptr      │ lower → A or B    │
  │ runs           │ later, separate   │ now, in-process   │ either            │
  │ extra powers   │ BOLT/PGO/LTO      │ tiering/deopt/OSR │ multi-target,     │
  │                │                   │                   │ domain opts       │
  │ new code lines │ ~40               │ ~30               │ dialect+passes    │
  └────────────────┴───────────────────┴───────────────────┴───────────────────┘
</code></pre>
<pre><code>   ┌─────────────────────────────────────────────────────────────────────────┐
   │ THE LESSON OF THE WHOLE GUIDE, PROVEN: you wrote ONE compiler. The      │
   │ frontend and optimizer are shared. AOT, JIT, and MLIR are three         │
   │ endings to the same story, chosen by what you do with the Module —      │
   │ write it, call it, or model-and-lower into it.                          │
   └─────────────────────────────────────────────────────────────────────────┘
</code></pre>
<hr />
<h2 id="6-suggested-exercises-to-make-it-yours">6. Suggested exercises (to make it yours)</h2>
<pre><code>  1. Add a \`for\` loop to Toy: extend the lexer (01.01), parser (01.02),
     and codegen a loop with PHIs (ch.02.01 makeSumTo is your template).
  2. Add mutable variables with \`var\`/\`=\`: use the alloca + mem2reg trick
     (ch.00.04 §5, ch.01.03 §7). Confirm mem2reg builds PHIs for you.
  3. AOT: add a \`--emit-llvm\` and \`--emit-asm\` flag (call print / llc-equiv).
  4. JIT: add a tiered mode — compile at -O0 first, recompile hot functions
     at -O2 in a background thread, hot-swap the pointer (ch.04.04 §3).
  5. JIT: add ResourceTrackers so redefining a function works (ch.04.03 §4).
  6. MLIR: define a real \`toy\` dialect in ODS (ch.05.04) with a canonicalizer
     (e.g. constant folding) and watch -canonicalize simplify your IR.
  7. Backend: run \`llc -stop-after=greedy\` on your generated IR and read the
     MIR before/after register allocation (ch.06.03 §8).
  8. Measure: AOT-compile fib, then BOLT it with a perf profile (ch.03.05);
     compare to the JIT'd tiered version's steady-state speed.
</code></pre>
<hr />
<h2 id="7-where-to-go-next-beyond-this-guide">7. Where to go next (beyond this guide)</h2>
<pre><code>  • Read LLVM's own Kaleidoscope tutorial chapters 1–9 (you now understand
    every line, and can spot where it's pre-opaque-pointer / pre-ORCv2).
  • Read MLIR's &quot;Toy&quot; tutorial chapters 1–7 (the dialect + lowering you sketched).
  • Add debug info (DWARF) so gdb/lldb can step your language (DIBuilder).
  • Implement a garbage collector / exception model if your language needs them
    (LLVM has statepoints, the Itanium EH ABI, etc.).
  • Study a real LLVM-based language: Rust (rustc_codegen_llvm), Julia, Swift,
    Clang itself — all use the exact pipeline you built.
  • Contribute a small pass or fix to LLVM/MLIR; you have the mental model now.
</code></pre>
<pre><code>   ┌─────────────────────────────────────────────────────────────────────────┐
   │ You set out to become an LLVM expert. You now have: a mental model of   │
   │ the three-phase design; fluency in IR and SSA; a working frontend;      │
   │ command of the pass infrastructure; the ability to build AOT, JIT, and  │
   │ MLIR compilers; knowledge of post-link tooling (BOLT et al.); and a     │
   │ tour of the backend's guts. The rest is practice and depth. Go build.   │
   └─────────────────────────────────────────────────────────────────────────┘
</code></pre>
<hr />
<h2 id="mental-model-checkpoint-the-whole-guide">Mental model checkpoint (the whole guide)</h2>
<ol>
<li>What fraction of the three backends is shared, and what specifically differs?</li>
<li>For Toy, why is the AOT/JIT difference only &ldquo;write the Module vs call into it&rdquo;?</li>
<li>Why is MLIR overkill for Toy, and what would justify it?</li>
<li>Recite the single unifying sentence: AOT, JIT, and MLIR are ____.</li>
<li>Pick one exercise and sketch which chapters you&rsquo;d revisit to do it.</li>
</ol>
<p>← Back to the <a href="../README.md">guide index</a> · Buildable code in <a href="../examples/README.md">../examples/README.md</a></p>` },

<p>Each example&rsquo;s <code>README.md</code> explains exactly what it does, the expected output, and which

  { name: `32. Examples / Hello Ir / Hello Ir`, path: `examples/01-hello-ir/hello_ir.cpp`, dir: `examples/01-hello-ir`, words: 134, mins: 1, body: `<h1 id="hello_ircpp">hello_ir.cpp</h1>
<pre><code class="language-cpp">// hello_ir.cpp — build an LLVM Module in memory and print it.
// Demonstrates: LLVMContext, Module, IRBuilder, FunctionType, BasicBlock,
//               instruction creation, and the verifier (chapters 00.05, 02.01).
#include &quot;llvm/IR/IRBuilder.h&quot;
#include &quot;llvm/IR/LLVMContext.h&quot;
#include &quot;llvm/IR/Module.h&quot;
#include &quot;llvm/IR/Verifier.h&quot;
#include &quot;llvm/Support/raw_ostream.h&quot;

int main() {
  llvm::LLVMContext ctx;
  auto mod = std::make_unique&lt;llvm::Module&gt;(&quot;hello&quot;, ctx);
  llvm::IRBuilder&lt;&gt; b(ctx);

  // i32 square_plus_one(i32 x) { return x*x + 1; }
  auto *i32 = b.getInt32Ty();
  auto *fty = llvm::FunctionType::get(i32, {i32}, /*isVarArg=*/false);
  auto *fn = llvm::Function::Create(fty, llvm::Function::ExternalLinkage,
                                    &quot;square_plus_one&quot;, mod.get());
  fn-&gt;getArg(0)-&gt;setName(&quot;x&quot;);

  auto *entry = llvm::BasicBlock::Create(ctx, &quot;entry&quot;, fn);
  b.SetInsertPoint(entry);
  llvm::Value *x = fn-&gt;getArg(0);
  llvm::Value *mul = b.CreateMul(x, x, &quot;mul&quot;);
  llvm::Value *add = b.CreateAdd(mul, b.getInt32(1), &quot;add&quot;);
  b.CreateRet(add);

  // Verify the function is well-formed, then print the whole module as .ll text.
  if (llvm::verifyFunction(*fn, &amp;llvm::errs())) {
    llvm::errs() &lt;&lt; &quot;function failed verification!\\n&quot;;
    return 1;
  }
  mod-&gt;print(llvm::outs(), nullptr);
  return 0;
}

</code></pre>` },
  { name: `33. Examples / Hello Ir`, path: `examples/01-hello-ir/README.md`, dir: `examples/01-hello-ir`, words: 168, mins: 1, body: `<h1 id="example-01--hello-ir">Example 01 · Hello, IR</h1>
<p>The &ldquo;hello world&rdquo; of LLVM: construct a <code>Module</code> in memory with <code>IRBuilder</code>, verify it, and
print it as textual <code>.ll</code>. No optimization, no codegen — just the core IR-building API.</p>
<p><strong>Concepts:</strong> <code>LLVMContext</code>, <code>Module</code>, <code>IRBuilder</code>, <code>FunctionType</code>, <code>Function</code>, <code>BasicBlock</code>,
<code>CreateMul</code>/<code>CreateAdd</code>/<code>CreateRet</code>, <code>verifyFunction</code>. See chapters
<a href="../../00-foundations/05-environment-setup.md">00.05</a> and
<a href="../../02-ir-and-passes/01-ir-builder.md">02.01</a>.</p>
<h2 id="build--run">Build &amp; run</h2>
<pre><code class="language-bash">./build.sh
# or manually:
cmake -S . -B build -DLLVM_DIR=$(llvm-config --cmakedir)
cmake --build build
./build/hello_ir
</code></pre>
<h2 id="expected-output">Expected output</h2>
<pre><code class="language-llvm">; ModuleID = 'hello'
source_filename = &quot;hello&quot;

define i32 @square_plus_one(i32 %x) {
entry:
  %mul = mul i32 %x, %x
  %add = add i32 %mul, 1
  ret i32 %add
}
</code></pre>
<h2 id="what-to-notice">What to notice</h2>
<ul>
<li>Every value is typed (<code>i32</code>).</li>
<li><code>CreateMul</code>/<code>CreateAdd</code> return <code>Value*</code> you immediately reuse — the use-def graph forming.</li>
<li>
<p>The function ends in a terminator (<code>ret</code>) — the basic-block rule from
  <a href="../../00-foundations/03-llvm-ir-essentials.md">00.03</a>.</p>
</li>
<li>
<p>This exact <code>Module</code> is what examples 02 (AOT) and 03 (JIT) take to the next stage.</p>
</li>
</ul>` },
  { name: `34. Examples / Aot Objgen / Aot`, path: `examples/02-aot-objgen/aot.cpp`, dir: `examples/02-aot-objgen`, words: 347, mins: 2, body: `<h1 id="aotcpp">aot.cpp</h1>
<pre><code class="language-cpp">// aot.cpp — full AOT in one file: build IR, optimize, emit a native .o.
// Demonstrates: TargetMachine, data layout, the new-PM optimization pipeline,
//               and addPassesToEmitFile (chapters 02.02, 03.02, 03.03).
//
// After running, link the produced object with the tiny C driver:
//   cc aot_out.o driver.c -o prog &amp;&amp; ./prog
#include &quot;llvm/IR/IRBuilder.h&quot;
#include &quot;llvm/IR/LLVMContext.h&quot;
#include &quot;llvm/IR/LegacyPassManager.h&quot;
#include &quot;llvm/IR/Module.h&quot;
#include &quot;llvm/IR/Verifier.h&quot;
#include &quot;llvm/MC/TargetRegistry.h&quot;
#include &quot;llvm/Passes/PassBuilder.h&quot;
#include &quot;llvm/Support/FileSystem.h&quot;
#include &quot;llvm/Support/TargetSelect.h&quot;
#include &quot;llvm/Support/raw_ostream.h&quot;
#include &quot;llvm/Target/TargetMachine.h&quot;
#include &quot;llvm/TargetParser/Host.h&quot;

using namespace llvm;

// Build:  i32 square_plus_one(i32 x) { return x*x + 1; }
static void buildIR(Module &amp;M, LLVMContext &amp;ctx) {
  IRBuilder&lt;&gt; b(ctx);
  auto *i32 = b.getInt32Ty();
  auto *fn = Function::Create(FunctionType::get(i32, {i32}, false),
                              Function::ExternalLinkage, &quot;square_plus_one&quot;, &amp;M);
  fn-&gt;getArg(0)-&gt;setName(&quot;x&quot;);
  auto *entry = BasicBlock::Create(ctx, &quot;entry&quot;, fn);
  b.SetInsertPoint(entry);
  Value *x = fn-&gt;getArg(0);
  b.CreateRet(b.CreateAdd(b.CreateMul(x, x, &quot;mul&quot;), b.getInt32(1), &quot;add&quot;));
}

// Run the standard -O2 pipeline (new PassManager).
static void optimize(Module &amp;M) {
  LoopAnalysisManager LAM;
  FunctionAnalysisManager FAM;
  CGSCCAnalysisManager CGAM;
  ModuleAnalysisManager MAM;
  PassBuilder PB;
  PB.registerModuleAnalyses(MAM);
  PB.registerCGSCCAnalyses(CGAM);
  PB.registerFunctionAnalyses(FAM);
  PB.registerLoopAnalyses(LAM);
  PB.crossRegisterProxies(LAM, FAM, CGAM, MAM);
  ModulePassManager MPM = PB.buildPerModuleDefaultPipeline(OptimizationLevel::O2);
  MPM.run(M, MAM);
}

int main() {
  LLVMContext ctx;
  Module M(&quot;aot_demo&quot;, ctx);

  // 1. Register the host backend.
  InitializeNativeTarget();
  InitializeNativeTargetAsmPrinter();

  // 2. Look up the target for this machine and build a TargetMachine.
  std::string triple = sys::getDefaultTargetTriple();
  M.setTargetTriple(triple);
  std::string err;
  const Target *target = TargetRegistry::lookupTarget(triple, err);
  if (!target) { errs() &lt;&lt; &quot;lookupTarget: &quot; &lt;&lt; err &lt;&lt; &quot;\\n&quot;; return 1; }

  TargetOptions opts;
  TargetMachine *TM =
      target-&gt;createTargetMachine(triple, &quot;generic&quot;, &quot;&quot;, opts, Reloc::PIC_);

  // 3. The module's data layout MUST match the TargetMachine.
  M.setDataLayout(TM-&gt;createDataLayout());

  // 4. Build and optimize the IR.
  buildIR(M, ctx);
  if (verifyModule(M, &amp;errs())) { errs() &lt;&lt; &quot;bad IR\\n&quot;; return 1; }
  optimize(M);

  errs() &lt;&lt; &quot;--- optimized IR ---\\n&quot;;
  M.print(errs(), nullptr);

  // 5. Emit a native object file via the (legacy) codegen pass manager.
  std::error_code EC;
  raw_fd_ostream dest(&quot;aot_out.o&quot;, EC, sys::fs::OF_None);
  if (EC) { errs() &lt;&lt; &quot;open aot_out.o: &quot; &lt;&lt; EC.message() &lt;&lt; &quot;\\n&quot;; return 1; }

  legacy::PassManager codegenPM;
  if (TM-&gt;addPassesToEmitFile(codegenPM, dest, nullptr,
                              CodeGenFileType::ObjectFile)) {
    errs() &lt;&lt; &quot;cannot emit object file\\n&quot;;
    return 1;
  }
  codegenPM.run(M);
  dest.flush();

  errs() &lt;&lt; &quot;\\nwrote aot_out.o\\n&quot;
         &lt;&lt; &quot;link &amp; run with:\\n  cc aot_out.o driver.c -o prog &amp;&amp; ./prog\\n&quot;;
  return 0;
}

</code></pre>` },
  { name: `35. Examples / Aot Objgen / Driver`, path: `examples/02-aot-objgen/driver.c`, dir: `examples/02-aot-objgen`, words: 68, mins: 1, body: `<h1 id="driverc">driver.c</h1>
<pre><code class="language-c">/* driver.c — a tiny C main that calls the AOT-compiled function from aot_out.o.

  { name: `36. Examples / Aot Objgen`, path: `examples/02-aot-objgen/README.md`, dir: `examples/02-aot-objgen`, words: 205, mins: 1, body: `<h1 id="example-02--aot--ir-to-a-native-object-file">Example 02 · AOT — IR to a native object file</h1>
<p>The complete AOT story in one program: build IR, run the <code>-O2</code> pipeline, create a
<code>TargetMachine</code>, and emit a real <code>.o</code> via <code>addPassesToEmitFile</code>. Then a tiny C <code>driver.c</code>
links against it and runs — proving the compiler is gone by runtime.</p>
<p><strong>Concepts:</strong> <code>TargetMachine</code>, target triple, <code>createDataLayout</code>, the new-PM <code>-O2</code> pipeline,
the legacy codegen PassManager, <code>CodeGenFileType::ObjectFile</code>, linking &amp; symbols. See
chapters <a href="../../02-ir-and-passes/02-optimization-passes.md">02.02</a>,
<a href="../../03-aot/02-target-machine-codegen.md">03.02</a>,
<a href="../../03-aot/03-building-an-aot-compiler.md">03.03</a>,
<a href="../../03-aot/04-linking-and-runtime.md">03.04</a>.</p>
<h2 id="build--run">Build &amp; run</h2>
<pre><code class="language-bash">./build.sh
# manual:
cmake -S . -B build -DLLVM_DIR=$(llvm-config --cmakedir)
cmake --build build
./build/aot                       # emits aot_out.o
cc aot_out.o driver.c -o prog     # link with the C driver
./prog
</code></pre>
<h2 id="expected-output">Expected output</h2>
<pre><code>square_plus_one(0) = 1
square_plus_one(1) = 2
square_plus_one(2) = 5
square_plus_one(3) = 10
square_plus_one(4) = 17
</code></pre>
<h2 id="what-to-notice">What to notice</h2>
<ul>
<li>
<p>Two pass managers coexist: <strong>new PM</strong> for IR optimization, <strong>legacy PM</strong> for codegen — see
  <a href="../../03-aot/02-target-machine-codegen.md">03.02 §5</a>.</p>
</li>
<li>
<p><code>aot_out.o</code> has <code>square_plus_one</code> as a <strong>defined</strong> symbol; <code>driver.c</code> references it as
  <strong>undefined</strong>; the linker matches them (<a href="../../03-aot/04-linking-and-runtime.md">03.04</a>).</p>
</li>
<li>
<p>Inspect the artifact:
  <code>bash
  llvm-objdump -d aot_out.o        # see the machine code
  llvm-nm aot_out.o                 # T square_plus_one (defined in text)</code></p>
</li>
<li>
<p><code>./prog</code> runs with <strong>no compiler present</strong> — the definition of AOT.</p>
</li>
</ul>` },
  { name: `37. Examples / Lljit / Jit`, path: `examples/03-lljit/jit.cpp`, dir: `examples/03-lljit`, words: 277, mins: 1, body: `<h1 id="jitcpp">jit.cpp</h1>
<pre><code class="language-cpp">// jit.cpp — build a function and JIT-compile + call it in-process with ORC LLJIT.
// Demonstrates: LLJIT, ThreadSafeModule, addIRModule, lookup, calling a
//               JIT'd function pointer (chapters 04.02, 04.03).
#include &quot;llvm/ExecutionEngine/Orc/LLJIT.h&quot;
#include &quot;llvm/ExecutionEngine/Orc/ThreadSafeModule.h&quot;
#include &quot;llvm/IR/IRBuilder.h&quot;
#include &quot;llvm/IR/LLVMContext.h&quot;
#include &quot;llvm/IR/Module.h&quot;
#include &quot;llvm/Support/InitLLVM.h&quot;
#include &quot;llvm/Support/TargetSelect.h&quot;
#include &quot;llvm/Support/raw_ostream.h&quot;

using namespace llvm;
using namespace llvm::orc;

// Build a module with: i32 times_plus(i32 x) { return x*3 + 7; }
static ThreadSafeModule makeModule(const DataLayout &amp;DL) {
  auto ctx = std::make_unique&lt;LLVMContext&gt;();
  auto M = std::make_unique&lt;Module&gt;(&quot;jit_demo&quot;, *ctx);
  M-&gt;setDataLayout(DL); // MUST match the JIT's target

  IRBuilder&lt;&gt; b(*ctx);
  auto *i32 = b.getInt32Ty();
  auto *fn = Function::Create(FunctionType::get(i32, {i32}, false),
                              Function::ExternalLinkage, &quot;times_plus&quot;, M.get());
  fn-&gt;getArg(0)-&gt;setName(&quot;x&quot;);
  auto *entry = BasicBlock::Create(*ctx, &quot;entry&quot;, fn);
  b.SetInsertPoint(entry);
  Value *x = fn-&gt;getArg(0);
  Value *mul = b.CreateMul(x, b.getInt32(3), &quot;mul&quot;);
  b.CreateRet(b.CreateAdd(mul, b.getInt32(7), &quot;add&quot;));

  return ThreadSafeModule(std::move(M), std::move(ctx));
}

int main(int argc, char **argv) {
  InitLLVM X(argc, argv);

  // The JIT uses the backend → initialize host codegen.
  InitializeNativeTarget();
  InitializeNativeTargetAsmPrinter();

  // 1. Build the JIT (picks the host TargetMachine, assembles the layer stack).
  auto jitOrErr = LLJITBuilder().create();
  if (!jitOrErr) { logAllUnhandledErrors(jitOrErr.takeError(), errs(), &quot;[jit] &quot;); return 1; }
  std::unique_ptr&lt;LLJIT&gt; J = std::move(*jitOrErr);

  // 2. Add a module built with the JIT's data layout.
  if (auto err = J-&gt;addIRModule(makeModule(J-&gt;getDataLayout()))) {
    logAllUnhandledErrors(std::move(err), errs(), &quot;[add] &quot;);
    return 1;
  }

  // 3. Look up the symbol → triggers compilation → returns its address.
  auto sym = J-&gt;lookup(&quot;times_plus&quot;);
  if (!sym) { logAllUnhandledErrors(sym.takeError(), errs(), &quot;[lookup] &quot;); return 1; }

  // 4. Cast to a function pointer and CALL IT — native code, right now, in-process.
  auto *times_plus = sym-&gt;toPtr&lt;int(int)&gt;();
  for (int i = 0; i &lt; 5; i++)
    outs() &lt;&lt; &quot;times_plus(&quot; &lt;&lt; i &lt;&lt; &quot;) = &quot; &lt;&lt; times_plus(i) &lt;&lt; &quot;\\n&quot;;

  return 0;
}

</code></pre>` },
  { name: `38. Examples / Lljit`, path: `examples/03-lljit/README.md`, dir: `examples/03-lljit`, words: 212, mins: 1, body: `<h1 id="example-03--jit--compile-and-call-in-process-with-orc-lljit">Example 03 · JIT — compile and call in-process with ORC LLJIT</h1>
<p>Build a function, hand it to ORC&rsquo;s <code>LLJIT</code>, look up its symbol (which triggers compilation),
and call the returned function pointer — all in the same process. Compare with example 02:
identical frontend/IR, but the bytes go to <strong>memory and a call</strong> instead of a <strong>file and a
link</strong>.</p>
<p><strong>Concepts:</strong> <code>LLJIT</code>, <code>LLJITBuilder</code>, <code>ThreadSafeModule</code>, matching <code>DataLayout</code>,
<code>addIRModule</code>, <code>lookup</code>, <code>toPtr</code>, calling JIT&rsquo;d code. See chapters
<a href="../../04-jit/01-jit-theory.md">04.01</a>, <a href="../../04-jit/02-orc-architecture.md">04.02</a>,
<a href="../../04-jit/03-building-a-jit.md">04.03</a>.</p>
<h2 id="build--run">Build &amp; run</h2>
<pre><code class="language-bash">./build.sh
# manual:
cmake -S . -B build -DLLVM_DIR=$(llvm-config --cmakedir)
cmake --build build
./build/jit
</code></pre>
<h2 id="expected-output">Expected output</h2>
<pre><code>times_plus(0) = 7
times_plus(1) = 10
times_plus(2) = 13
times_plus(3) = 16
times_plus(4) = 19
</code></pre>
<h2 id="what-to-notice">What to notice</h2>
<ul>
<li>
<p><code>J-&gt;lookup("times_plus")</code> is where compilation actually happens — <em>on request</em>
  (<a href="../../04-jit/02-orc-architecture.md">04.02 §2</a>).</p>
</li>
<li>
<p>The Module&rsquo;s <code>DataLayout</code> is set from <code>J-&gt;getDataLayout()</code> — a mandatory match
  (<a href="../../04-jit/03-building-a-jit.md">04.03 §1</a>).</p>
</li>
<li>
<p><code>times_plus(i)</code> jumps into machine code generated <em>milliseconds ago</em>, in this process.</p>
</li>
<li>
<p>This is the same <code>square_plus_one</code>-style IR as example 02 — the <strong>frontend and optimizer
  are shared; only delivery differs</strong> (<a href="../../README.md">the unifying idea</a>).</p>
</li>
<li>
<p>To let JIT&rsquo;d code call <code>printf</code>/<code>sin</code>, add a <code>DynamicLibrarySearchGenerator</code> to the main
  JITDylib (<a href="../../04-jit/03-building-a-jit.md">04.03 §2</a>).</p>
</li>
</ul>` },
  { name: `39. Examples / Custom Pass / Multoadd`, path: `examples/04-custom-pass/MulToAdd.cpp`, dir: `examples/04-custom-pass`, words: 246, mins: 1, body: `<h1 id="multoaddcpp">MulToAdd.cpp</h1>
<pre><code class="language-cpp">// MulToAdd.cpp — a new-PassManager transform pass loadable into \`opt\`.
// Rewrites \`mul %x, 2\` into \`add %x, %x\`. Demonstrates: the new-PM pass
// interface, the collect→build→RAUW→erase rewrite idiom, and the pass-plugin
// registration callback (chapter 02.02).
#include &quot;llvm/IR/IRBuilder.h&quot;
#include &quot;llvm/IR/InstIterator.h&quot;
#include &quot;llvm/IR/Instructions.h&quot;
#include &quot;llvm/IR/PassManager.h&quot;
#include &quot;llvm/Passes/PassBuilder.h&quot;
#include &quot;llvm/Passes/PassPlugin.h&quot;
#include &quot;llvm/Support/raw_ostream.h&quot;

using namespace llvm;

namespace {

struct MulToAddPass : PassInfoMixin&lt;MulToAddPass&gt; {
  PreservedAnalyses run(Function &amp;F, FunctionAnalysisManager &amp;) {
    // Collect first — we'll erase instructions, so don't mutate while iterating.
    SmallVector&lt;BinaryOperator *, 16&gt; worklist;
    for (Instruction &amp;I : instructions(F)) {
      auto *bo = dyn_cast&lt;BinaryOperator&gt;(&amp;I);
      if (!bo || bo-&gt;getOpcode() != Instruction::Mul)
        continue;
      auto *c = dyn_cast&lt;ConstantInt&gt;(bo-&gt;getOperand(1));
      if (c &amp;&amp; c-&gt;equalsInt(2))
        worklist.push_back(bo);
    }

    for (BinaryOperator *bo : worklist) {
      IRBuilder&lt;&gt; b(bo);                 // insert right before the old mul
      Value *x = bo-&gt;getOperand(0);
      Value *sum = b.CreateAdd(x, x, bo-&gt;getName() + &quot;.m2a&quot;);
      bo-&gt;replaceAllUsesWith(sum);       // redirect every user to the new add
      bo-&gt;eraseFromParent();             // delete the old mul
    }

    if (worklist.empty())
      return PreservedAnalyses::all();
    errs() &lt;&lt; &quot;[mul-to-add] rewrote &quot; &lt;&lt; worklist.size()
           &lt;&lt; &quot; mul(s) in @&quot; &lt;&lt; F.getName() &lt;&lt; &quot;\\n&quot;;
    return PreservedAnalyses::none();
  }

  // Run even on functions marked optnone, so the demo is easy to observe.
  static bool isRequired() { return true; }
};

} // namespace

// Plugin entry point: lets \`opt -passes=mul-to-add\` find this pass.
extern &quot;C&quot; LLVM_ATTRIBUTE_WEAK ::llvm::PassPluginLibraryInfo
llvmGetPassPluginInfo() {
  return {LLVM_PLUGIN_API_VERSION, &quot;MulToAdd&quot;, &quot;v1&quot;, [](PassBuilder &amp;PB) {
            PB.registerPipelineParsingCallback(
                [](StringRef name, FunctionPassManager &amp;FPM,
                   ArrayRef&lt;PassBuilder::PipelineElement&gt;) {
                  if (name == &quot;mul-to-add&quot;) {
                    FPM.addPass(MulToAddPass());
                    return true;
                  }
                  return false;
                });
          }};
}

</code></pre>` },
  { name: `40. Examples / Custom Pass`, path: `examples/04-custom-pass/README.md`, dir: `examples/04-custom-pass`, words: 229, mins: 1, body: `<h1 id="example-04--a-custom-optimization-pass-mul-to-add">Example 04 · A custom optimization pass (<code>mul-to-add</code>)</h1>
<p>A new-PassManager transform pass that rewrites <code>mul %x, 2</code> into <code>add %x, %x</code>, built as a
<strong>loadable plugin</strong> for <code>opt</code>. Shows the pass interface, the canonical
collect→build→RAUW→erase rewrite idiom, and plugin registration.</p>
<p><strong>Concepts:</strong> <code>PassInfoMixin</code>, <code>run(Function&amp;, FAM&amp;)</code>, <code>PreservedAnalyses</code>,
<code>replaceAllUsesWith</code>/<code>eraseFromParent</code>, <code>llvmGetPassPluginInfo</code>,
<code>registerPipelineParsingCallback</code>. See chapter
<a href="../../02-ir-and-passes/02-optimization-passes.md">02.02</a>.</p>
<h2 id="build--run">Build &amp; run</h2>
<pre><code class="language-bash">./build.sh
# manual:
cmake -S . -B build -DLLVM_DIR=$(llvm-config --cmakedir)
cmake --build build
opt -load-pass-plugin=./build/MulToAdd.so -passes=mul-to-add -S test.ll -o -
#                              ^ .dylib on macOS
</code></pre>
<h2 id="expected-output">Expected output</h2>
<pre><code>[mul-to-add] rewrote 1 mul(s) in @double_it
; ... (module printed) ...
define i32 @double_it(i32 %x) {
entry:
  %t.m2a = add i32 %x, %x
  ret i32 %t.m2a
}

define i32 @triple_it(i32 %x) {
entry:
  %t = mul i32 %x, 3      ; unchanged — constant was 3, not 2
  ret i32 %t
}
</code></pre>
<h2 id="what-to-notice">What to notice</h2>
<ul>
<li>
<p>We <strong>collect</strong> matching instructions into a worklist <em>before</em> mutating, because we erase
  while we&rsquo;d otherwise be iterating (<a href="../../02-ir-and-passes/02-optimization-passes.md">02.02 §6</a>).</p>
</li>
<li>
<p><code>replaceAllUsesWith</code> then <code>eraseFromParent</code> is the universal IR-rewrite move — it rewires
  the use-def graph, then deletes the dead instruction.</p>
</li>
<li>
<p>Returning <code>PreservedAnalyses::none()</code> when we changed IR tells the manager to invalidate
  cached analyses (<a href="../../02-ir-and-passes/02-optimization-passes.md">02.02 §7</a>).</p>
</li>
<li>
<p>The same pass class could be added directly in your compiler&rsquo;s pipeline (no plugin) via
  <code>FPM.addPass(MulToAddPass())</code>.</p>
</li>
<li>
<p>Compose it with built-in passes: <code>-passes='mul-to-add,instcombine'</code>.</p>
</li>
</ul>` }
];

const docSelect = document.getElementById('docSelect');
const docList = document.getElementById('docList');
const tabPanels = document.getElementById('tabPanels');
const navDocTitle = document.getElementById('navDocTitle');
let navLastY = 0;

// Prettify function in JS (matching Python's prettify)
function prettify(component) {
    let c = component.replace(/^[0-9]+[_-]/, '');
    c = c.replace(/_/g, ' ').replace(/-/g, ' ').trim();
    if (c.toLowerCase() === 'readme') return 'README';
    if (c.toLowerCase() === 'cheatsheet') return 'Cheatsheet';
    return c.replace(/\b\w/g, l => l.toUpperCase());
}

// Like prettify(), but keeps any leading "01_"/"2-" style number as a "01. "
// prefix so the sidebar mirrors the on-disk ordering of the documents.
function prettifyKeepNum(component) {
    const m = component.match(/^([0-9]+)[_-]/);
    const prefix = m ? m[1] + '. ' : '';
    return prefix + prettify(component);
}

const HTML_ESCAPES = { '&': '&amp;', '<': '&lt;', '>': '&gt;', '"': '&quot;' };
function escapeHtml(s) { return String(s == null ? '' : s).replace(/[&<>"]/g, c => HTML_ESCAPES[c]); }
function cleanName(name) { return (name || '').replace(/^\s*\d+\.\s*/, ''); }

const CLOCK_ICON = '<svg class="icon" viewBox="0 0 16 16" aria-hidden="true"><path d="M8 1.5a6.5 6.5 0 1 0 0 13 6.5 6.5 0 0 0 0-13ZM0 8a8 8 0 1 1 16 0A8 8 0 0 1 0 8Zm8.75-4.25v3.94l2.4 2.4a.75.75 0 0 1-1.06 1.06l-2.62-2.62a.75.75 0 0 1-.22-.53V3.75a.75.75 0 0 1 1.5 0Z"></path></svg>';

TAB_DATA.forEach((tab, idx) => {
    const opt = document.createElement('option');
    opt.value = String(idx);
    opt.textContent = tab.name;
    docSelect.appendChild(opt);

    const panel = document.createElement('div');
    panel.className = 'tab-content';
    panel.id = 'panel-' + idx;
    panel.dataset.dir = tab.dir || '';
    panel.innerHTML = tab.body;

    // Breadcrumb + reading-time meta line (prepended, built once).
    const meta = document.createElement('div');
    meta.className = 'doc-meta';
    const crumbs = cleanName(tab.name).split(' / ');
    const crumbHtml = crumbs.map((c, i) =>
        '<span class="crumb">' + escapeHtml(c) + '</span>' +
        (i < crumbs.length - 1 ? '<span class="crumb-sep">/</span>' : '')
    ).join('');
    const words = (tab.words || 0).toLocaleString();
    meta.innerHTML =
        '<span class="doc-breadcrumb">' + crumbHtml + '</span>' +
        '<span class="doc-reading-time">' + CLOCK_ICON +
        (tab.mins || 1) + ' min read \u00b7 ' + words + ' words</span>';
    panel.insertBefore(meta, panel.firstChild);

    tabPanels.appendChild(panel);
});

// Build directory tree structure
const docTree = { files: [], dirs: {} };
TAB_DATA.forEach((tab, idx) => {
    const parts = (tab.path || '').split('/');
    let current = docTree;
    for (let i = 0; i < parts.length - 1; i++) {
        const dirName = parts[i];
        if (!current.dirs[dirName]) {
            current.dirs[dirName] = { files: [], dirs: {} };
        }
        current = current.dirs[dirName];
    }
    current.files.push({ tab, idx });
});

// Build HTML from tree
function createTreeHtml(node, parentPath = '') {
    const ul = document.createElement('ul');
    ul.className = 'nav-list';
    
    // Sort directories and add them
    Object.keys(node.dirs).sort().forEach(dirName => {
        const dirNode = node.dirs[dirName];
        const li = document.createElement('li');
        li.className = 'nav-dir-item expanded'; // expanded by default
        
        const header = document.createElement('div');
        header.className = 'nav-dir-header';
        
        const chevron = document.createElementNS('http://www.w3.org/2000/svg', 'svg');
        chevron.setAttribute('class', 'icon chevron-icon');
        chevron.setAttribute('viewBox', '0 0 16 16');
        chevron.innerHTML = '<path d="M6.22 3.22a.75.75 0 0 1 1.06 0l4.25 4.25a.75.75 0 0 1 0 1.06l-4.25 4.25a.75.75 0 0 1-1.06-1.06L9.94 8 6.22 4.28a.75.75 0 0 1 0-1.06Z"></path>';
        
        const folder = document.createElementNS('http://www.w3.org/2000/svg', 'svg');
        folder.setAttribute('class', 'icon folder-icon');
        folder.setAttribute('viewBox', '0 0 16 16');
        folder.innerHTML = '<path d="M1.75 1A1.75 1.75 0 0 0 0 2.75v10.5C0 14.216.784 15 1.75 15h12.5A1.75 1.75 0 0 0 16 13.25v-8.5A1.75 1.75 0 0 0 14.25 3H7.58L6.06 1.48A1.75 1.75 0 0 0 4.81 1H1.75Zm0 1.5h3.06c.2 0 .39.08.53.22L6.873 4.25H14.25a.25.25 0 0 1 .25.25v8.5a.25.25 0 0 1-.25.25H1.75a.25.25 0 0 1-.25-.25v-10.5a.25.25 0 0 1 .25-.25Z"></path>';
        
        const label = document.createElement('span');
        label.className = 'dir-name';
        label.textContent = prettifyKeepNum(dirName);
        
        header.appendChild(chevron);
        header.appendChild(folder);
        header.appendChild(label);
        li.appendChild(header);
        
        const childrenContainer = createTreeHtml(dirNode, parentPath ? parentPath + '/' + dirName : dirName);
        childrenContainer.className = 'nav-dir-children';
        li.appendChild(childrenContainer);
        
        header.addEventListener('click', (e) => {
            e.stopPropagation();
            li.classList.toggle('expanded');
        });
        
        ul.appendChild(li);
    });
    
    // Sort and add files
    node.files.forEach(({ tab, idx }) => {
        const li = document.createElement('li');
        const a = document.createElement('a');
        a.href = '#tab-' + idx;
        
        // Use the basename, keeping any leading "NN_" document number prefix.
        const baseName = tab.path.split('/').pop() || tab.name;
        let displayName = baseName.replace(/\.[a-zA-Z0-9]+$/, '');
        displayName = prettifyKeepNum(displayName);
        
        a.textContent = displayName;
        a.title = tab.name;
        a.dataset.docIdx = String(idx);
        a.addEventListener('click', function(e) {
            e.preventDefault();
            activateTab(idx);
        });
        li.appendChild(a);
        ul.appendChild(li);
    });
    
    return ul;
}

const treeHtml = createTreeHtml(docTree);
while (treeHtml.firstChild) {
    docList.appendChild(treeHtml.firstChild);
}

/* ───── Cross-document link resolution (supports nested folders) ─────
   Docs may live in sub-directories and link to each other with relative
   paths ("../03_patterns/README.md"), bare files ("CHEATSHEET.md") or even a
   folder ("01_pthreads/"), which we resolve to that folder's README. */
const BY_PATH = {};        // "01_pthreads/readme.md"  -> idx
const BY_DIR_README = {};  // "01_pthreads" / ""        -> idx (README of dir)
const BY_BASENAME = {};    // "cheatsheet.md"           -> idx (only if unique)
const BASENAME_DUP = {};

TAB_DATA.forEach((tab, idx) => {
    const path = (tab.path || '').toLowerCase();
    if (path) BY_PATH[path] = idx;
    const base = path.split('/').pop();
    if (base) {
        if (Object.prototype.hasOwnProperty.call(BY_BASENAME, base)) BASENAME_DUP[base] = true;
        else BY_BASENAME[base] = idx;
    }
    if (base === 'readme.md') {
        BY_DIR_README[(tab.dir || '').toLowerCase()] = idx;
    }
});
Object.keys(BASENAME_DUP).forEach(b => { delete BY_BASENAME[b]; });

/* Join a relative href onto a base directory and normalize . / .. segments. */
function joinPath(baseDir, rel) {
    if (rel.charAt(0) === '/') { baseDir = ''; rel = rel.replace(/^\/+/, ''); }
    const parts = (baseDir ? baseDir.split('/') : []).concat(rel.split('/'));
    const out = [];
    for (const p of parts) {
        if (p === '' || p === '.') continue;
        if (p === '..') { out.pop(); continue; }
        out.push(p);
    }
    return out.join('/');
}

function mdTarget(rawHref, baseDir) {
    if (!rawHref || rawHref.charAt(0) === '#') return null;
    if (/^[a-z][a-z0-9+.-]*:\/\//i.test(rawHref) || /^(mailto|tel):/i.test(rawHref)) return null;

    let anchor = '';
    let pathPart = rawHref;
    const hashIdx = pathPart.indexOf('#');
    if (hashIdx >= 0) {
        anchor = pathPart.substring(hashIdx + 1);
        pathPart = pathPart.substring(0, hashIdx);
        try { anchor = decodeURIComponent(anchor); } catch (e) {}
    }
    const qIdx = pathPart.indexOf('?');
    if (qIdx >= 0) pathPart = pathPart.substring(0, qIdx);
    if (!pathPart) return null;

    const joined = joinPath(baseDir || '', pathPart).toLowerCase();
    let idx;
    if (/\.md$/i.test(pathPart)) {
        idx = BY_PATH[joined];
        if (idx === undefined) {
            const base = joined.split('/').pop();
            idx = BY_BASENAME[base];
        }
    } else {
        // a directory reference -> that folder's README
        idx = BY_DIR_README[joined];
    }
    if (idx === undefined) return null;
    return { idx: idx, anchor: anchor };
}

function baseDirOf(node) {
    const panel = node && node.closest ? node.closest('.tab-content') : null;
    return panel ? (panel.dataset.dir || '') : '';
}

/* Tag links so we can style internal navigation distinctly from external ones. */
function classifyLinks() {
    document.querySelectorAll('.tab-content a[href]').forEach(a => {
        const href = a.getAttribute('href');
        if (!href) return;
        if (href.charAt(0) === '#') {
            a.classList.add('anchor-link');
        } else if (mdTarget(href, baseDirOf(a))) {
            a.classList.add('xref-link');
        } else if (/^[a-z][a-z0-9+.-]*:\/\//i.test(href)) {
            a.target = '_blank';
            a.rel = 'noopener noreferrer';
        }
    });
}
classifyLinks();

docSelect.addEventListener('change', () => {
    activateTab(parseInt(docSelect.value, 10));
});

/* Previous / next document buttons in the navbar. */
const docPrevBtn = document.getElementById('docPrev');
const docNextBtn = document.getElementById('docNext');
if (docPrevBtn) docPrevBtn.addEventListener('click', () => {
    const i = currentTabIdx();
    if (i > 0) { pushHistory(); activateTab(i - 1); }
});
if (docNextBtn) docNextBtn.addEventListener('click', () => {
    const i = currentTabIdx();
    if (i < TAB_DATA.length - 1) { pushHistory(); activateTab(i + 1); }

function updateDocNav(idx) {
    if (docPrevBtn) docPrevBtn.disabled = (idx <= 0);
    if (docNextBtn) docNextBtn.disabled = (idx >= TAB_DATA.length - 1);

/* ───── Syntax highlighting ───── */

function addCopyButton(pre, block) {
    const btn = document.createElement('button');
    btn.className = 'code-copy-btn';
    btn.type = 'button';
    btn.textContent = 'Copy';
    btn.addEventListener('click', () => {
        const text = block.innerText;
        const done = () => {
            btn.textContent = 'Copied';
            btn.classList.add('copied');
            setTimeout(() => { btn.textContent = 'Copy'; btn.classList.remove('copied'); }, 1600);
        };
        if (navigator.clipboard && navigator.clipboard.writeText) {
            navigator.clipboard.writeText(text).then(done).catch(() => fallbackCopy(text, done));
        } else {
            fallbackCopy(text, done);
        }
    });
    pre.appendChild(btn);
}

function fallbackCopy(text, done) {
    const ta = document.createElement('textarea');
    ta.value = text;
    ta.style.position = 'fixed';
    ta.style.opacity = '0';
    document.body.appendChild(ta);
    ta.select();
    try { document.execCommand('copy'); done(); } catch (e) {}
    document.body.removeChild(ta);
}

function highlightAllCode() {
    document.querySelectorAll('.tab-content pre code').forEach(block => {
        if (block.dataset.highlighted === '1') return;
        const pre = block.closest('pre');
        const langClass = Array.from(block.classList).find(c => c.startsWith('language-'));
        if (langClass) {
            const lang = langClass.replace('language-', '');
            const label = document.createElement('span');
            label.className = 'code-lang-label';
            label.textContent = lang;
            pre.appendChild(label);
        }
        hljs.highlightElement(block);
        addCopyButton(pre, block);
        block.dataset.highlighted = '1';
    });
}

highlightAllCode();

/* ───── Wrap tables so they scroll horizontally on narrow screens ───── */
function wrapTables() {
    document.querySelectorAll('.tab-content table').forEach(table => {
        if (table.parentElement && table.parentElement.classList.contains('table-scroll')) return;
        const wrap = document.createElement('div');
        wrap.className = 'table-scroll';
        table.parentNode.insertBefore(wrap, table);
        wrap.appendChild(table);
    });
}
